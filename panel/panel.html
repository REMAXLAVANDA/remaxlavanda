<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RE/MAX LAVANDA - Ofis Yönetim Sistemi</title>
<style>
:root {
  --red: #DC1C2E;
  --blue: #003DA5;
  --darkblue: #0C2749;
  --gray: #404041;
  --lightgray: #F5F6F8;
  --border: #E3E6EB;
  --green: #1C8C4B;
  --orange: #C9821A;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--lightgray); color: var(--gray); min-height: 100vh; }

/* LOGIN */
.login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, var(--darkblue), var(--blue)); }
.login-box { background: white; border-radius: 20px; padding: 48px 40px; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; }
.login-logo { font-size: 22px; font-weight: 800; color: var(--darkblue); margin-bottom: 4px; }
.login-sub { font-size: 12px; color: #999; margin-bottom: 32px; }
.login-box input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; margin-bottom: 12px; outline: none; }
.login-box input:focus { border-color: var(--blue); }
.btn-login { width: 100%; padding: 13px; background: var(--darkblue); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
.btn-login:hover { background: var(--blue); }
.login-error { color: var(--red); font-size: 12px; margin-top: 8px; }

/* HEADER */
.header { background: linear-gradient(135deg, var(--darkblue), var(--blue)); color: white; padding: 16px 20px; }
.header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 17px; font-weight: 800; }
.subtitle { font-size: 11px; opacity: 0.8; margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.user-badge { background: rgba(255,255,255,0.15); padding: 6px 14px; border-radius: 20px; font-size: 12px; }
.last-login { font-size: 10px; opacity: 0.7; margin-top: 2px; }
.btn-header { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: white; padding: 6px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; }
.btn-header:hover { background: rgba(255,255,255,0.25); }

/* TABS */
.tab-bar { background: white; border-bottom: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.tabs { display: flex; max-width: 1400px; margin: 0 auto; padding: 0 20px; overflow-x: auto; }
.tab { padding: 14px 18px; font-size: 13px; font-weight: 500; border: none; background: none; cursor: pointer; color: #999; border-bottom: 3px solid transparent; white-space: nowrap; }
.tab:hover { color: var(--darkblue); }
.tab.active { color: var(--darkblue); border-bottom-color: var(--red); font-weight: 600; }

/* CONTENT */
.content { max-width: 1400px; margin: 0 auto; padding: 24px 20px; }

/* CARDS */
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 20px; }
.card { background: white; border: 1px solid var(--border); border-radius: 14px; padding: 18px; }
.card h3 { font-size: 11px; color: #999; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.card-stat { font-size: 28px; font-weight: 800; color: var(--darkblue); }
.card-sub { font-size: 11px; color: #bbb; margin-top: 4px; }
.card.red .card-stat { color: var(--red); }
.card.green .card-stat { color: var(--green); }
.card.orange .card-stat { color: var(--orange); }
.card.blue .card-stat { color: var(--blue); }

/* 2 KOLON LAYOUT */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media(max-width: 1100px) { .two-col { grid-template-columns: 1fr; } }
.col-box { background: white; border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
.col-box h2 { font-size: 15px; font-weight: 700; color: var(--darkblue); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid var(--red); }

/* DATE FILTER */
.date-filter-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
.date-filter-bar label { font-size: 11px; font-weight: 700; color: #666; }
.date-filter-bar input, .date-filter-bar select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; outline: none; }
.filter-btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: 8px; background: white; font-size: 11px; cursor: pointer; font-weight: 600; color: #666; }
.filter-btn.active { background: var(--darkblue); color: white; border-color: var(--darkblue); }

/* TABLE */
.table-header { display: flex; justify-content: space-between; align-items: center; margin: 16px 0 10px 0; }
.table-title { font-size: 14px; font-weight: 700; color: var(--darkblue); }
.table-actions { display: flex; gap: 8px; }
.table-wrap { background: white; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.search-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.search-bar input, .search-bar select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; outline: none; }
table { width: 100%; border-collapse: collapse; }
th { background: var(--lightgray); padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 700; border-bottom: 1px solid var(--border); color: #666; text-transform: uppercase; }
td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafafa; }

/* MINI TABLE (özet için) */
.mini-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
.mini-table th { font-size: 11px; font-weight: 700; color: #666; padding: 8px; background: var(--lightgray); border-bottom: 1px solid var(--border); text-align: left; }
.mini-table td { font-size: 12px; padding: 8px; border-bottom: 1px solid #f5f5f5; }
.mini-table tr:last-child td { border-bottom: none; }

/* BADGE */
.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-arandi { background: #E8F0FE; color: #1a56db; }
.badge-cagrildi { background: #FEF3C7; color: #92400e; }
.badge-gorusuldu { background: #EDE9FE; color: #5b21b6; }
.badge-1gorusme { background: #E0F2FE; color: #0369a1; }
.badge-2gorusme { background: #F0FDF4; color: #15803d; }
.badge-sicak { background: #FBEEDB; color: var(--orange); }
.badge-soguk { background: #F0F0F0; color: #555; }
.badge-kazanildi { background: #E2F2E8; color: var(--green); }
.badge-kaybedildi { background: #FBE3E5; color: var(--red); }
.badge-beklemede { background: #FEF3C7; color: #92400e; }
.badge-randevu { background: #EDE9FE; color: #5b21b6; }
.badge-olumsuz { background: #FBE3E5; color: var(--red); }
.badge-karalist { background: #1a1a1a; color: white; }

/* BUTTONS */
.btn { padding: 8px 16px; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }
.btn-primary { background: var(--darkblue); color: white; }
.btn-primary:hover { background: var(--blue); }
.btn-ghost { background: white; color: var(--gray); border: 1px solid var(--border); }
.btn-sm { padding: 4px 10px; font-size: 11px; border-radius: 6px; }
.btn-wa { background: #25D366; color: white; border: none; border-radius: 6px; padding: 4px 8px; font-size: 11px; cursor: pointer; text-decoration: none; }

/* FORM */
.form-wrap { background: white; border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 16px; }
.form-wrap h3 { font-size: 15px; font-weight: 700; color: var(--darkblue); margin-bottom: 20px; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group label { font-size: 11px; font-weight: 700; color: #666; text-transform: uppercase; }
.form-group input, .form-group select, .form-group textarea { padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; outline: none; font-family: inherit; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--blue); }
.form-group textarea { resize: vertical; min-height: 70px; }
.form-actions { margin-top: 16px; display: flex; gap: 8px; align-items: center; }
.status-select { padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; cursor: pointer; background: white; }

/* TAKVIM */
.calendar-wrap { background: white; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.calendar-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--lightgray); }
.calendar-nav { display: flex; gap: 8px; align-items: center; }
.cal-btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: 8px; background: white; cursor: pointer; font-size: 13px; }
.cal-title { font-size: 16px; font-weight: 700; color: var(--darkblue); }
.time-grid { display: grid; grid-template-columns: 60px 1fr; }
.time-col { border-right: 1px solid var(--border); }
.time-slot { height: 60px; display: flex; align-items: flex-start; justify-content: center; padding-top: 4px; font-size: 11px; color: #999; border-bottom: 1px solid #f0f0f0; }
.event-col { position: relative; }
.event-row { height: 60px; border-bottom: 1px solid #f0f0f0; position: relative; }
.event-item { position: absolute; left: 4px; right: 4px; background: var(--blue); color: white; border-radius: 6px; padding: 4px 8px; font-size: 11px; font-weight: 600; cursor: pointer; overflow: hidden; z-index: 1; }
.event-item.confirmed { background: var(--green); }
.event-item.pending { background: var(--orange); }

/* MODAL */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: white; border-radius: 16px; padding: 32px; width: 520px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-height: 90vh; overflow-y: auto; }
.modal h3 { font-size: 16px; font-weight: 700; color: var(--darkblue); margin-bottom: 20px; }
.modal-actions { margin-top: 20px; display: flex; gap: 8px; justify-content: flex-end; }

/* UTILS */
.hidden { display: none; }
.loading { text-align: center; padding: 40px; color: #999; }
.success-msg { background: #E2F2E8; color: var(--green); padding: 10px 14px; border-radius: 8px; margin: 8px 0; font-size: 13px; }
.error-msg { background: #FBE3E5; color: var(--red); padding: 10px 14px; border-radius: 8px; margin: 8px 0; font-size: 13px; }
.dup-warning { background: #fff8e1; border: 1px solid #ffc107; border-radius: 8px; padding: 10px 14px; margin-bottom: 10px; font-size: 12px; color: #856404; }
.token-link { font-family: monospace; font-size: 10px; background: #f0f0f0; padding: 3px 6px; border-radius: 4px; color: var(--blue); word-break: break-all; }
.rate-bar { display: inline-block; height: 8px; background: var(--green); border-radius: 4px; vertical-align: middle; margin-right: 6px; }
.section-divider { height: 1px; background: var(--border); margin: 16px 0; }
.today-badge { background: var(--red); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-left: 6px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">RE/MAX LAVANDA</div>
    <div class="login-sub">Ofis Yönetim Sistemi</div>
    <input type="text" id="loginUser" placeholder="Kullanıcı adı" />

</div>

<!-- MAIN APP -->
<div id="mainApp" class="hidden">
  <div class="header">
    <div class="header-content">
      <div>
        <div class="logo">RE/MAX LAVANDA</div>
        <div class="subtitle">Ofis Yönetim Sistemi</div>
      </div>

<div id="passwordModal" class="modal-overlay">

    <div class="form-group" style="margin-bottom:12px"><label>Yeni Şifre</label><input type="password" id="newPass" /></div>

<div id="editModal" class="modal-overlay">

    <h3 id="editModalTitle">Düzenle</h3>

    <div id="editModalMsg"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="hideEditModal()">İptal</button>
      <button class="btn btn-primary" onclick="saveEdit()">Kaydet</button>
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://vfqkmluqjaihpgxhqlqt.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmcWttbHVxamFpaHBneGhxbHF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NTE4ODMsImV4cCI6MjA5ODMyNzg4M30.6jsmD-om_q2ac9zbrHORO8FU9TUjvqAsBh9ux1xhiD8';

let USERS = JSON.parse(localStorage.getItem('rmx_users') || 'null') || {
  'admin': { pass: 'lavanda2024', role: 'admin', name: 'Admin' },
  'ofis': { pass: '1234', role: 'ofis', name: 'Ofis' }
};

let SOURCES_LEAD = JSON.parse(localStorage.getItem('rmx_sources_lead') || '["Sponsorlu","Remax","Selen","Referans","Diğer"]');
let SOURCES_RECRUIT = JSON.parse(localStorage.getItem('rmx_sources_recruit') || '["Leman","Eren","Secret","Remax","Halk Eğitim","Kariyer","Sahibinden","Seminer","Diğer"]');

function saveSources() {
  localStorage.setItem('rmx_sources_lead', JSON.stringify(SOURCES_LEAD));
  localStorage.setItem('rmx_sources_recruit', JSON.stringify(SOURCES_RECRUIT));
}

let currentUser = null;
let allData = { leads: [], recruiting: [], danismanlar: [] };
let editingRecord = null;
let editingTable = null;
let calendarDate = new Date();

const urlParams = new URLSearchParams(window.location.search);
const urlToken = urlParams.get('token');

function saveUsers() { localStorage.setItem('rmx_users', JSON.stringify(USERS)); }

async function api(table, method, body, filter) {
  let url = SB_URL + '/rest/v1/' + table;
  if (filter) url += '?' + filter;
  const opts = {
    method: method || 'GET',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': method === 'POST' ? 'return=representation' : (method === 'PATCH' ? 'return=representation' : '') }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (!res.ok) { const err = await res.text(); throw new Error(err); }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function loadData() {
  const [leads, recruiting, danismanlar] = await Promise.all([
    api('gd_leads', 'GET', null, 'select=*&order=created_at.desc'),
    api('recruiting_candidates', 'GET', null, 'select=*&order=created_at.desc'),
    api('danismanlar', 'GET', null, 'select=*&order=created_at.asc')
  ]);
  allData.leads = leads || [];
  allData.recruiting = recruiting || [];
  allData.danismanlar = danismanlar || [];
}

function capitalize(str) {
  if (!str) return '';
  return str.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
}

function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  if (USERS[u] && USERS[u].pass === p) {
    currentUser = { ...USERS[u], username: u };
    const now = new Date().toLocaleString('tr-TR');
    localStorage.setItem('lastLogin_' + u, now);
    startApp();
  } else {
    document.getElementById('loginError').textContent = 'Kullanıcı adı veya şifre hatalı!';
  }
}

function doLogout() {
  currentUser = null;
  document.getElementById('mainApp').classList.add('hidden');
  document.getElementById('loginPage').classList.remove('hidden');
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
}

async function startApp() {
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('userBadge').textContent = '👤 ' + currentUser.name;
  const last = localStorage.getItem('lastLogin_' + currentUser.username);
  if (last) document.getElementById('lastLoginInfo').textContent = 'Son giriş: ' + last;
  try {
    await loadData();
    renderTabs();
    const firstTab = currentUser.role === 'admin' ? 'ozet' : currentUser.role === 'ofis' ? 'lead-giris' : 'danisman-panel';
    renderContent(firstTab);
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="error-msg">❌ Bağlantı hatası: ' + e.message + '</div>';
  }
}

async function checkToken() {
  if (!urlToken) return false;
  try {
    await loadData();
    const d = allData.danismanlar.find(x => x.token === urlToken);
    if (d) {
      currentUser = { role: 'danisman', name: d.ad, danismanId: d.id, danismanAd: d.ad };
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('mainApp').classList.remove('hidden');
      document.getElementById('userBadge').textContent = '👤 ' + d.ad;
      renderTabs();
      renderContent('danisman-panel');
      return true;
    }
  } catch(e) {}
  return false;
}

function renderTabs() {
  const nav = document.getElementById('navTabs');
  nav.innerHTML = '';
  let tabs = [];
  const todayCount = allData.recruiting.filter(r => r.randevu_tarihi === today()).length;
  const todayBadge = todayCount > 0 ? '<span class="today-badge">' + todayCount + '</span>' : '';

  if (currentUser.role === 'admin') {
    tabs = [
      { id: 'ozet', label: '📊 Özet' },
      { id: 'gd-leads', label: '👤 GD Leads' },
      { id: 'recruiting', label: '👥 Recruiting' },
      { id: 'takvim', label: '📅 Takvim' + todayBadge },
      { id: 'danismanlar', label: '🔑 Danışmanlar' },
      { id: 'ayarlar', label: '⚙️ Ayarlar' }
    ];
  } else if (currentUser.role === 'ofis') {
    tabs = [
      { id: 'lead-giris', label: '➕ GD Lead Ekle' },
      { id: 'lead-listesi', label: '📋 Son Leadler' },
      { id: 'recruit-giris', label: '➕ Aday Ekle' },
      { id: 'takvim', label: '📅 Takvim' + todayBadge }
    ];
  } else if (currentUser.role === 'danisman') {
    tabs = [{ id: 'danisman-panel', label: '📋 Portföylerim' }];
  }

  tabs.forEach(function(t, i) {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.innerHTML = t.label;
    btn.onclick = function() {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      btn.classList.add('active');
      renderContent(t.id);
    };
    nav.appendChild(btn);
  });
}

function badge(durum) {
  const map = {
    'Arandı':'arandi','Çağrıldı':'cagrildi','Görüşüldü':'gorusuldu',
    '1. Görüşme':'1gorusme','2. Görüşme':'2gorusme',
    'Sıcak':'sicak','Soğuk':'soguk','Kazanıldı':'kazanildi',
    'Kaybedildi':'kaybedildi','Beklemede':'beklemede','Randevu':'randevu',
    'Olumsuz':'olumsuz','Kara Liste':'karalist'
  };
  const cls = map[durum] || 'soguk';
  return '<span class="badge badge-' + cls + '">' + (durum || '—') + '</span>';
}

function waBtn(tel) {
  if (!tel) return '';
  const clean = tel.replace(/\D/g,'');
  const num = clean.startsWith('0') ? '90'+clean.slice(1) : (clean.startsWith('90') ? clean : '90'+clean);
  return '<a href="https://wa.me/' + num + '" target="_blank" class="btn-wa">💬</a> ';
}

function today() { return new Date().toISOString().split('T')[0]; }
function weekAgo() { const d = new Date(); d.setDate(d.getDate()-7); return d.toISOString().split('T')[0]; }

function getDateRange(period) {
  const now = new Date();
  const end = now.toISOString().split('T')[0];
  let start;
  if (period === 'week') { const d = new Date(); d.setDate(d.getDate()-7); start = d.toISOString().split('T')[0]; }
  else if (period === 'month') { const d = new Date(now.getFullYear(), now.getMonth(), 1); start = d.toISOString().split('T')[0]; }
  else if (period === '3month') { const d = new Date(); d.setMonth(d.getMonth()-3); start = d.toISOString().split('T')[0]; }
  else if (period === 'year') { start = now.getFullYear() + '-01-01'; }
  return { start, end };
}

function renderContent(tabId) {
  const c = document.getElementById('content');
  if (tabId === 'ozet') renderOzet(c);
  else if (tabId === 'gd-leads') renderGDLeads(c);
  else if (tabId === 'recruiting') renderRecruiting(c);
  else if (tabId === 'takvim') renderTakvim(c);
  else if (tabId === 'danismanlar') renderDanismanlar(c);
  else if (tabId === 'ayarlar') renderAyarlar(c);
  else if (tabId === 'lead-giris') renderLeadGiris(c);
  else if (tabId === 'lead-listesi') renderLeadListesi(c);
  else if (tabId === 'recruit-giris') renderRecruitGiris(c);
  else if (tabId === 'danisman-panel') renderDanismanPanel(c);
}

// ============ ÖZET ============
function renderOzet(c, period, customStart, customEnd) {
  period = period || 'month';
  let range = getDateRange(period);
  if (period === 'custom' && customStart && customEnd) { range = { start: customStart, end: customEnd }; }

  const leads = allData.leads.filter(l => l.tarih >= range.start && l.tarih <= range.end);
  const recruits = allData.recruiting.filter(r => (r.created_at||'').slice(0,10) >= range.start && (r.created_at||'').slice(0,10) <= range.end);

  const totalL = leads.length;
  const wonL = leads.filter(l => l.durum === 'Kazanıldı').length;
  const rateL = totalL > 0 ? Math.round(wonL/totalL*100) : 0;
  const hotL = leads.filter(l => l.durum === 'Sıcak').length;

  const totalR = recruits.length;
  const okR = recruits.filter(r => !['Olumsuz','Kara Liste'].includes(r.durum)).length;
  const rateR = totalR > 0 ? Math.round(okR/totalR*100) : 0;

  // Danışman bazlı
  const byD = {};
  leads.forEach(l => {
    if (l.danisman) {
      if (!byD[l.danisman]) byD[l.danisman] = {t:0,k:0};
      byD[l.danisman].t++;
      if (l.durum === 'Kazanıldı') byD[l.danisman].k++;
    }
  });

  // Lead kaynak bazlı
  const byLS = {};
  leads.forEach(l => { const k=l.kaynak||'Diğer'; if(!byLS[k]) byLS[k]={t:0,k:0}; byLS[k].t++; if(l.durum==='Kazanıldı') byLS[k].k++; });

  // Recruit kaynak bazlı
  const byRS = {};
  recruits.forEach(r => { const k=r.kaynak||'Diğer'; if(!byRS[k]) byRS[k]={t:0,ok:0}; byRS[k].t++; if(!['Olumsuz','Kara Liste'].includes(r.durum)) byRS[k].ok++; });

  const periods = [{id:'week',label:'Bu Hafta'},{id:'month',label:'Bu Ay'},{id:'3month',label:'3 Ay'},{id:'year',label:'Bu Yıl'},{id:'custom',label:'Özel'}];

  let html = '<div class="date-filter-bar">';
  periods.forEach(p => { html += '<button class="filter-btn' + (period===p.id?' active':'') + '" onclick="renderOzetPeriod(\'' + p.id + '\')">' + p.label + '</button>'; });
  html += '<span id="customDateRange" class="' + (period==='custom'?'':'hidden') + '" style="display:' + (period==='custom'?'flex':'none') + ';gap:6px;align-items:center">';
  html += '<input type="date" id="ozet_start" value="' + range.start + '" />';
  html += '<span>—</span>';
  html += '<input type="date" id="ozet_end" value="' + range.end + '" />';
  html += '<button class="btn btn-primary btn-sm" onclick="applyCustomDate()">Uygula</button></span>';
  html += '</div>';

  html += '<div class="two-col">';

  // SOL — GD LEADS
  html += '<div class="col-box"><h2>👤 GD Leads Raporu</h2>';
  html += '<div class="grid" style="grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">';
  html += '<div class="card"><h3>Toplam</h3><div class="card-stat">' + totalL + '</div></div>';
  html += '<div class="card green"><h3>Kazanılan</h3><div class="card-stat">' + wonL + '</div></div>';
  html += '<div class="card blue"><h3>Dönüşüm</h3><div class="card-stat">' + rateL + '%</div></div>';
  html += '</div>';

  html += '<div class="table-title" style="margin-bottom:8px">Danışman Başarı Oranları</div>';
  html += '<table class="mini-table"><thead><tr><th>Danışman</th><th>Lead</th><th>Kazanılan</th><th>Oran</th><th></th></tr></thead><tbody>';
  html += Object.entries(byD).sort((a,b)=>b[1].k/Math.max(b[1].t,1)-a[1].k/Math.max(a[1].t,1)).map(([ad,d]) => {
    const r = d.t > 0 ? Math.round(d.k/d.t*100) : 0;
    return '<tr><td><strong>' + ad + '</strong></td><td>' + d.t + '</td><td>' + d.k + '</td><td>' + r + '%</td><td><div class="rate-bar" style="width:' + r + 'px;max-width:60px"></div></td></tr>';
  }).join('') || '<tr><td colspan="5" style="text-align:center;color:#999">Veri yok</td></tr>';
  html += '</tbody></table>';

  html += '<div class="section-divider"></div>';
  html += '<div class="table-title" style="margin-bottom:8px">Kaynak Başarı Oranları</div>';
  html += '<table class="mini-table"><thead><tr><th>Kaynak</th><th>Lead</th><th>Kazanılan</th><th>Oran</th></tr></thead><tbody>';
  html += Object.entries(byLS).sort((a,b)=>b[1].t-a[1].t).map(([k,d]) => {
    const r = d.t > 0 ? Math.round(d.k/d.t*100) : 0;
    return '<tr><td>' + k + '</td><td>' + d.t + '</td><td>' + d.k + '</td><td>' + r + '%</td></tr>';
  }).join('') || '<tr><td colspan="4" style="text-align:center;color:#999">Veri yok</td></tr>';
  html += '</tbody></table></div>';

  // SAĞ — RECRUITING
  html += '<div class="col-box"><h2>👥 Recruiting Raporu</h2>';
  html += '<div class="grid" style="grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">';
  html += '<div class="card"><h3>Toplam</h3><div class="card-stat">' + totalR + '</div></div>';
  html += '<div class="card green"><h3>Aktif</h3><div class="card-stat">' + okR + '</div></div>';
  html += '<div class="card blue"><h3>Oran</h3><div class="card-stat">' + rateR + '%</div></div>';
  html += '</div>';

  const byRD = {};
  recruits.forEach(r => {
    const d = r.durum||'Belirsiz';
    byRD[d] = (byRD[d]||0) + 1;
  });

  html += '<div class="table-title" style="margin-bottom:8px">Durum Dağılımı</div>';
  html += '<table class="mini-table"><thead><tr><th>Durum</th><th>Aday</th><th>%</th></tr></thead><tbody>';
  html += Object.entries(byRD).sort((a,b)=>b[1]-a[1]).map(([d,n]) => {
    const r = totalR > 0 ? Math.round(n/totalR*100) : 0;
    return '<tr><td>' + badge(d) + '</td><td>' + n + '</td><td>' + r + '%</td></tr>';
  }).join('') || '<tr><td colspan="3" style="text-align:center;color:#999">Veri yok</td></tr>';
  html += '</tbody></table>';

  html += '<div class="section-divider"></div>';
  html += '<div class="table-title" style="margin-bottom:8px">Kaynak Başarı Oranları</div>';
  html += '<table class="mini-table"><thead><tr><th>Kaynak</th><th>Aday</th><th>Aktif</th><th>Oran</th></tr></thead><tbody>';
  html += Object.entries(byRS).sort((a,b)=>b[1].t-a[1].t).map(([k,d]) => {
    const r = d.t > 0 ? Math.round(d.ok/d.t*100) : 0;
    return '<tr><td>' + k + '</td><td>' + d.t + '</td><td>' + d.ok + '</td><td>' + r + '%</td></tr>';
  }).join('') || '<tr><td colspan="4" style="text-align:center;color:#999">Veri yok</td></tr>';
  html += '</tbody></table></div>';

  html += '</div>';
  c.innerHTML = html;
}

function renderOzetPeriod(p) {
  const c = document.getElementById('content');
  const customEl = document.getElementById('customDateRange');
  if (p === 'custom') {
    if (customEl) customEl.style.display = 'flex';
  }
  renderOzet(c, p);
}

function applyCustomDate() {
  const s = document.getElementById('ozet_start').value;
  const e = document.getElementById('ozet_end').value;
  renderOzet(document.getElementById('content'), 'custom', s, e);
}

function renderLeadsRows(list) {
  return list.map(l => '<tr><td>' + (l.tarih||'—') + '</td><td><strong>' + (l.ad||'') + '</strong></td><td>' + waBtn(l.telefon) + (l.telefon||'') + '</td><td>' + (l.kaynak||'—') + '</td><td>' + badge(l.durum) + '</td><td>' + (l.danisman||'—') + '</td><td>' + (l.sonraki_takip||'—') + '</td><td><button class="btn btn-sm btn-ghost" onclick="editRecord(\'gd_leads\',\'' + l.id + '\')">✏️</button></td></tr>').join('');
}

function filterLeads() {
  const ad = (document.getElementById('srch_ad')||{value:''}).value.toLowerCase();
  const durum = (document.getElementById('srch_durum')||{value:''}).value;
  const dan = (document.getElementById('srch_dan')||{value:''}).value;
  const filtered = allData.leads.filter(l => (!ad||(l.ad||'').toLowerCase().includes(ad)) && (!durum||l.durum===durum) && (!dan||l.danisman===dan));
  const body = document.getElementById('leadsBody');
  if (body) body.innerHTML = renderLeadsRows(filtered);
}

function showLeadForm() { document.getElementById('leadFormWrap').classList.remove('hidden'); }
function hideLeadForm() { document.getElementById('leadFormWrap').classList.add('hidden'); }

function quickAddDanisman() { document.getElementById('quickDanWrap').classList.remove('hidden'); }

async function saveQuickDanisman() {
  const ad = capitalize(document.getElementById('quick_dan_ad').value.trim());
  if (!ad) return;
  const token = generateToken();
  try {
    await api('danismanlar', 'POST', { ad, token });
    await loadData();
    document.getElementById('f_danisman').value = ad;
    document.getElementById('quickDanMsg').innerHTML = '<div class="success-msg">✅ ' + ad + ' eklendi!</div>';
    const danList = document.getElementById('danList');
    if (danList) danList.innerHTML = allData.danismanlar.map(d => '<option value="' + d.ad + '">' + d.ad + '</option>').join('');
    setTimeout(() => { document.getElementById('quickDanWrap').classList.add('hidden'); document.getElementById('quickDanMsg').innerHTML = ''; }, 1500);
  } catch(e) { document.getElementById('quickDanMsg').innerHTML = '<div class="error-msg">❌ ' + e.message + '</div>'; }
}

function addSource(type) {
  const name = prompt('Yeni kaynak adı:');
  if (!name || !name.trim()) return;
  const cap = capitalize(name.trim());
  if (type === 'lead') { if (!SOURCES_LEAD.includes(cap)) { SOURCES_LEAD.push(cap); saveSources(); } }
  else { if (!SOURCES_RECRUIT.includes(cap)) { SOURCES_RECRUIT.push(cap); saveSources(); } }
  alert(cap + ' eklendi!');
  renderContent(type === 'lead' ? 'gd-leads' : 'recruiting');
}

function checkDup(val, type) {
  if (val.length < 3) return;
  const warnEl = document.getElementById(type === 'lead' ? 'leadDupWarn' : 'recruitDupWarn');
  if (!warnEl) return;
  const existing = type === 'lead' ? allData.leads.find(l => (l.ad||'').toLowerCase().includes(val.toLowerCase())) : allData.recruiting.find(r => (r.ad||'').toLowerCase().includes(val.toLowerCase()));
  if (existing) warnEl.innerHTML = '<div class="dup-warning">⚠️ Bu isimde kayıt mevcut! <strong>' + existing.ad + '</strong> — ' + (existing.durum||'—') + ' — ' + (existing.tarih||'') + '</div>';
  else warnEl.innerHTML = '';
}

async function saveLead() {
  const ad = capitalize(document.getElementById('f_ad').value.trim());
  if (!ad) { document.getElementById('leadFormMsg').innerHTML = '<div class="error-msg">Ad zorunlu!</div>'; return; }
  const danAd = capitalize(document.getElementById('f_danisman').value.trim());
  if (danAd && !allData.danismanlar.find(d => d.ad === danAd)) {
    try { await api('danismanlar', 'POST', { ad: danAd, token: generateToken() }); } catch(e) {}
  }
  const data = { ad, telefon: document.getElementById('f_tel').value.trim(), kaynak: document.getElementById('f_kaynak').value, danisman: danAd||null, durum: document.getElementById('f_durum').value, aciklama: document.getElementById('f_aciklama').value.trim(), tarih: today(), sonraki_takip: document.getElementById('f_takip').value||null };
  try {
    await api('gd_leads', 'POST', data);
    document.getElementById('leadFormMsg').innerHTML = '<div class="success-msg">✅ Lead eklendi!</div>';
    await loadData();
    setTimeout(() => { hideLeadForm(); renderContent('gd-leads'); }, 900);
  } catch(e) { document.getElementById('leadFormMsg').innerHTML = '<div class="error-msg">❌ ' + e.message + '</div>'; }
}

// ============ TAKVİM ============
function renderTakvim(c) {
  const dateStr = calendarDate.toLocaleDateString('tr-TR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  const todayStr = calendarDate.toISOString().split('T')[0];
  const dayEvents = allData.recruiting.filter(r => r.randevu_tarihi === todayStr && r.randevu_saati);
  const allDayEvents = allData.recruiting.filter(r => r.randevu_tarihi === todayStr && !r.randevu_saati);

  let html = '<div class="calendar-wrap">';
  html += '<div class="calendar-header"><div class="cal-title">📅 ' + dateStr + '</div><div class="calendar-nav"><button class="cal-btn" onclick="changeCalDay(-1)">◀</button><button class="cal-btn" onclick="goToday()">Bugün</button><button class="cal-btn" onclick="changeCalDay(1)">▶</button></div></div>';

  if (allDayEvents.length > 0) {
    html += '<div style="padding:12px 16px;background:#f0f8ff;border-bottom:1px solid var(--border)">';
    html += '<div style="font-size:12px;font-weight:700;color:#666;margin-bottom:8px">SAAT BELİRTİLMEYEN RANDEVULAR</div>';
    html += allDayEvents.map(r => '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="background:var(--orange);color:white;padding:3px 10px;border-radius:6px;font-size:12px;font-weight:600">' + r.ad + '</span>' + badge(r.durum) + '<span style="font-size:12px;color:#666">' + (r.aciklama||'') + '</span>' + waBtn(r.telefon) + '</div>').join('');
    html += '</div>';
  }

  html += '<div class="time-grid">';
  html += '<div class="time-col">';
  for (let h = 8; h <= 20; h++) {
    html += '<div class="time-slot">' + h.toString().padStart(2,'0') + ':00</div>';
  }
  html += '</div>';
  html += '<div class="event-col">';
  for (let h = 8; h <= 20; h++) {
    const hStr = h.toString().padStart(2,'0');
    const slotEvents = dayEvents.filter(r => r.randevu_saati && r.randevu_saati.startsWith(hStr));
    html += '<div class="event-row">';
    if (slotEvents.length > 0) {
      slotEvents.forEach((r, idx) => {
        const isOk = !['Olumsuz','Kara Liste'].includes(r.durum);
        html += '<div class="event-item ' + (isOk?'confirmed':'') + '" style="top:2px;left:' + (idx*120+4) + 'px;width:110px" onclick="editRecord(\'recruiting_candidates\',\'' + r.id + '\')">';
        html += r.randevu_saati + ' — ' + r.ad;
        html += '</div>';
      });
    }
    html += '</div>';
  }
  html += '</div></div></div>';
  c.innerHTML = html;
}

function showDanForm() { document.getElementById('danFormWrap').classList.remove('hidden'); }
function hideDanForm() { document.getElementById('danFormWrap').classList.add('hidden'); }
function generateToken() { const c='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789'; let t=''; for(let i=0;i<14;i++) t+=c[Math.floor(Math.random()*c.length)]; return t; }

async function saveDanisman() {
  const ad = capitalize(document.getElementById('d_ad').value.trim());
  if (!ad) { document.getElementById('danFormMsg').innerHTML = '<div class="error-msg">Ad zorunlu!</div>'; return; }
  try {
    await api('danismanlar', 'POST', { ad, token: generateToken() });
    document.getElementById('danFormMsg').innerHTML = '<div class="success-msg">✅ Eklendi!</div>';
    await loadData();
    setTimeout(() => { hideDanForm(); renderContent('danismanlar'); }, 900);
  } catch(e) { document.getElementById('danFormMsg').innerHTML = '<div class="error-msg">❌ ' + e.message + '</div>'; }
}

function copyLink(link) {
  navigator.clipboard.writeText(link).then(() => alert('Kopyalandı!')).catch(() => { const ta=document.createElement('textarea');ta.value=link;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('Kopyalandı!'); });
}

function filterOfisLeads() {
  const s = document.getElementById('df_s').value;

  const body = document.getElementById('ofisLeadsBody');
  if (body) body.innerHTML = filtered.map(l => '<tr><td>' + (l.tarih||'—') + '</td><td><strong>' + (l.ad||'') + '</strong></td><td>' + waBtn(l.telefon) + (l.telefon||'') + '</td><td>' + badge(l.durum) + '</td><td>' + (l.danisman||'—') + '</td></tr>').join('');

    html += '<div class="form-group"><label>Ad Soyad</label><input id="e_ad" value="' + (record.ad||'') + '" oninput="this.value=capitalize(this.value)" /></div>';

function changePassword() {
  const old = document.getElementById('oldPass').value;
  const n1 = document.getElementById('newPass').value;
  const n2 = document.getElementById('newPass2').value;
  if (USERS[currentUser.username].pass !== old) { document.getElementById('passMsg').innerHTML = '<div class="error-msg">Mevcut şifre hatalı!</div>'; return; }
  if (n1 !== n2) { document.getElementById('passMsg').innerHTML = '<div class="error-msg">Şifreler eşleşmiyor!</div>'; return; }
  if (n1.length < 4) { document.getElementById('passMsg').innerHTML = '<div class="error-msg">En az 4 karakter!</div>'; return; }
  USERS[currentUser.username].pass = n1; saveUsers();
  document.getElementById('passMsg').innerHTML = '<div class="success-msg">✅ Şifre güncellendi!</div>';
  setTimeout(hidePasswordModal, 1500);
}

// ============ CSV ============
function exportCSV(type) {
  const data = type === 'leads' ? allData.leads : allData.recruiting;
  if (!data.length) { alert('Veri yok!'); return; }
  const keys = Object.keys(data[0]).filter(k => k !== 'id');
  let csv = keys.join(',') + '\n';
  data.forEach(row => { csv += keys.map(k => '"' + (row[k]||'').toString().replace(/"/g,'""') + '"').join(',') + '\n'; });
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=(type==='leads'?'gd_leads':'recruiting')+'_'+today()+'.csv'; a.click();
}
