<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RE/MAX LAVANDA - Ofis Yönetim Sistemi</title>
<style>
:root {
  --red: #DC1C2E;
  --blue: #003DA5;
  --darkblue: #0C2749;
  --gray: #404041;
  --lightgray: #F5F6F8;
  --border: #E3E6EB;
  --green: #1C8C4B;
  --orange: #C9821A;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--lightgray); color: var(--gray); min-height: 100vh; }

/* LOGIN */
.login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-box { background: white; border-radius: 16px; padding: 40px; width: 360px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); text-align: center; }
.login-logo { font-size: 22px; font-weight: 700; color: var(--darkblue); margin-bottom: 4px; }
.login-sub { font-size: 13px; color: #999; margin-bottom: 32px; }
.login-box input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; margin-bottom: 12px; outline: none; }
.login-box input:focus { border-color: var(--blue); }
.btn-primary { width: 100%; padding: 12px; background: var(--darkblue); color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-primary:hover { background: var(--blue); }
.login-error { color: var(--red); font-size: 13px; margin-top: 8px; }

/* HEADER */
.header { background: linear-gradient(135deg, var(--darkblue), var(--blue)); color: white; padding: 20px; }
.header-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 18px; font-weight: 700; }
.subtitle { font-size: 11px; opacity: 0.85; margin-top: 3px; }
.user-info { display: flex; align-items: center; gap: 12px; }
.user-badge { background: rgba(255,255,255,0.2); padding: 6px 14px; border-radius: 20px; font-size: 12px; }
.logout-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }

/* TABS */
.tabs { display: flex; background: white; border-bottom: 1px solid var(--border); max-width: 1200px; margin: 0 auto; padding: 0 20px; overflow-x: auto; }
.tab { padding: 14px 18px; font-size: 13px; font-weight: 500; border: none; background: none; cursor: pointer; color: #999; border-bottom: 3px solid transparent; white-space: nowrap; }
.tab.active { color: var(--darkblue); border-bottom-color: var(--red); }

/* CONTENT */
.content { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

/* CARDS */
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
.card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.card h3 { font-size: 13px; color: #888; margin-bottom: 8px; font-weight: 500; }
.card-stat { font-size: 32px; font-weight: 700; color: var(--darkblue); }
.card-sub { font-size: 12px; color: #999; margin-top: 4px; }
.card.red .card-stat { color: var(--red); }
.card.green .card-stat { color: var(--green); }

/* TABLE */
.table-wrap { background: white; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-top: 16px; }
.section-title { font-size: 15px; font-weight: 700; color: var(--darkblue); margin: 20px 0 12px 0; display: flex; justify-content: space-between; align-items: center; }
table { width: 100%; border-collapse: collapse; }
th { background: var(--lightgray); padding: 11px 12px; text-align: left; font-size: 11px; font-weight: 600; border-bottom: 1px solid var(--border); color: #666; }
td { padding: 11px 12px; font-size: 13px; border-bottom: 1px solid #f5f5f5; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafafa; }

/* BADGE */
.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-arandi { background: #E8F0FE; color: #1a56db; }
.badge-cagrildi { background: #FEF3C7; color: #92400e; }
.badge-gorusuldu { background: #EDE9FE; color: #5b21b6; }
.badge-sicak { background: #FBEEDB; color: var(--orange); }
.badge-soguk { background: #F0F0F0; color: #555; }
.badge-kazanildi { background: #E2F2E8; color: var(--green); }
.badge-kaybedildi { background: #FBE3E5; color: var(--red); }
.badge-beklemede { background: #FEF3C7; color: #92400e; }
.badge-olumsuz { background: #FBE3E5; color: var(--red); }

/* FORM */
.form-wrap { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
.form-wrap h3 { font-size: 15px; font-weight: 700; color: var(--darkblue); margin-bottom: 20px; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: 12px; font-weight: 600; color: #666; }
.form-group input, .form-group select, .form-group textarea { padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; outline: none; font-family: inherit; }
.form-group input:focus, .form-group select:focus { border-color: var(--blue); }
.form-group textarea { resize: vertical; min-height: 80px; }
.form-actions { margin-top: 16px; display: flex; gap: 8px; }
.btn-save { padding: 10px 24px; background: var(--darkblue); color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-save:hover { background: var(--blue); }
.btn-cancel { padding: 10px 20px; background: white; color: #666; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; cursor: pointer; }
.btn-add { padding: 8px 16px; background: var(--darkblue); color: white; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }
.btn-add:hover { background: var(--blue); }

/* STATUS SELECT */
.status-select { padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; cursor: pointer; background: white; }

/* SOURCE CHART */
.source-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-top: 12px; }
.source-card { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
.source-card .source-name { font-size: 12px; color: #888; margin-bottom: 6px; }
.source-card .source-num { font-size: 24px; font-weight: 700; color: var(--darkblue); }

/* TOKEN LINK */
.token-link { font-family: monospace; font-size: 11px; background: #f5f5f5; padding: 4px 8px; border-radius: 4px; color: var(--blue); }
.copy-btn { padding: 3px 8px; background: var(--blue); color: white; border: none; border-radius: 4px; font-size: 11px; cursor: pointer; margin-left: 6px; }

.hidden { display: none; }
.loading { text-align: center; padding: 40px; color: #999; }
.success-msg { background: #E2F2E8; color: var(--green); padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; }
.error-msg { background: #FBE3E5; color: var(--red); padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">RE/MAX LAVANDA</div>
    <div class="login-sub">Ofis Yönetim Sistemi</div>
    <input type="text" id="loginUser" placeholder="Kullanıcı adı" />
    <input type="password" id="loginPass" placeholder="Şifre" />
    <button class="btn-primary" onclick="doLogin()">Giriş Yap</button>
    <div id="loginError" class="login-error"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" class="hidden">
  <div class="header">
    <div class="header-content">
      <div>
        <div class="logo">RE/MAX LAVANDA</div>
        <div class="subtitle">Ofis Yönetim Sistemi</div>
      </div>
      <div class="user-info">
        <div class="user-badge" id="userBadge">👤</div>
        <button class="logout-btn" onclick="doLogout()">Çıkış</button>
      </div>
    </div>
  </div>

  <div class="tabs" id="navTabs"></div>
  <div class="content" id="content"><div class="loading">Yükleniyor...</div></div>
</div>

<script>
const SUPABASE_URL = 'https://vfqkmluqjaihpgxhqlqt.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmcWttbHVxamFpaHBneGhxbHF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NTE4ODMsImV4cCI6MjA5ODMyNzg4M30.6jsmD-om_q2ac9zbrHORO8FU9TUjvqAsBh9ux1xhiD8';

// KULLANICI TANIMLARI
const USERS = {
  'admin': { pass: 'lavanda2024', role: 'admin', name: 'Admin (Ahmet)' },
  'asistan': { pass: 'asistan123', role: 'asistan', name: 'Asistan' }
};

let currentUser = null;
let allData = { leads: [], recruiting: [], danismanlar: [] };

// TOKEN'DAN DANIŞMAN KONTROLÜ
const urlParams = new URLSearchParams(window.location.search);
const urlToken = urlParams.get('token');

// API
async function api(table, method, body, filter) {
  let url = SUPABASE_URL + '/rest/v1/' + table;
  if (filter) url += '?' + filter;
  const opts = {
    method: method || 'GET',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : ''
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function loadData() {
  const [leads, recruiting, danismanlar] = await Promise.all([
    api('gd_leads', 'GET', null, 'select=*&order=created_at.desc'),
    api('recruiting_candidates', 'GET', null, 'select=*&order=created_at.desc'),
    api('danismanlar', 'GET', null, 'select=*&order=created_at.desc')
  ]);
  allData.leads = leads || [];
  allData.recruiting = recruiting || [];
  allData.danismanlar = danismanlar || [];
}

// LOGIN
function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  
  if (USERS[u] && USERS[u].pass === p) {
    currentUser = { ...USERS[u], username: u };
    startApp();
  } else {
    document.getElementById('loginError').textContent = 'Kullanıcı adı veya şifre hatalı!';
  }
}

function doLogout() {
  currentUser = null;
  document.getElementById('mainApp').classList.add('hidden');
  document.getElementById('loginPage').classList.remove('hidden');
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
}

async function startApp() {
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('userBadge').textContent = '👤 ' + currentUser.name;
  
  try {
    await loadData();
    renderTabs();
    renderContent(currentUser.role === 'admin' ? 'ozet' : 'lead-giris');
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="error-msg">❌ Bağlantı hatası: ' + e.message + '</div>';
  }
}

// TOKEN İLE GİRİŞ (Danışman)
async function checkToken() {
  if (!urlToken) return false;
  try {
    await loadData();
    const d = allData.danismanlar.find(x => x.token === urlToken);
    if (d) {
      currentUser = { role: 'danisman', name: d.ad, danismanId: d.id, danismanAd: d.ad };
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('mainApp').classList.remove('hidden');
      document.getElementById('userBadge').textContent = '👤 ' + d.ad;
      renderTabs();
      renderContent('danisman-panel');
      return true;
    }
  } catch(e) {}
  return false;
}

function renderTabs() {
  const nav = document.getElementById('navTabs');
  nav.innerHTML = '';
  
  let tabs = [];
  if (currentUser.role === 'admin') {
    tabs = [
      { id: 'ozet', label: '📊 Özet' },
      { id: 'gd-leads', label: '👤 GD Leads' },
      { id: 'recruiting', label: '👥 Recruiting' },
      { id: 'danismanlar', label: '🔑 Danışmanlar' },
      { id: 'kaynaklar', label: '📈 Kaynaklar' }
    ];
  } else if (currentUser.role === 'asistan') {
    tabs = [
      { id: 'lead-giris', label: '➕ GD Lead Ekle' },
      { id: 'recruit-giris', label: '➕ Aday Ekle' }
    ];
  } else if (currentUser.role === 'danisman') {
    tabs = [
      { id: 'danisman-panel', label: '📋 Bana Atananlar' }
    ];
  }
  
  tabs.forEach(function(t, i) {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.textContent = t.label;
    btn.onclick = function() {
      document.querySelectorAll('.tab').forEach(function(x) { x.classList.remove('active'); });
      btn.classList.add('active');
      renderContent(t.id);
    };
    nav.appendChild(btn);
  });
}

function badge(durum) {
  const map = {
    'Arandı': 'arandi', 'Çağrıldı': 'cagrildi', 'Görüşüldü': 'gorusuldu',
    'Sıcak': 'sicak', 'Soğuk': 'soguk', 'Kazanıldı': 'kazanildi',
    'Kaybedildi': 'kaybedildi', 'Beklemede': 'beklemede', 'Olumsuz': 'olumsuz'
  };
  const cls = map[durum] || 'soguk';
  return '<span class="badge badge-' + cls + '">' + (durum || '—') + '</span>';
}

function renderContent(tabId) {
  const c = document.getElementById('content');
  
  if (tabId === 'ozet') renderOzet(c);
  else if (tabId === 'gd-leads') renderGDLeads(c);
  else if (tabId === 'recruiting') renderRecruiting(c);
  else if (tabId === 'danismanlar') renderDanismanlar(c);
  else if (tabId === 'kaynaklar') renderKaynaklar(c);
  else if (tabId === 'lead-giris') renderLeadGiris(c);
  else if (tabId === 'recruit-giris') renderRecruitGiris(c);
  else if (tabId === 'danisman-panel') renderDanismanPanel(c);
}

// ÖZET
function renderOzet(c) {
  const open = allData.leads.filter(l => !['Kazanıldı','Kaybedildi'].includes(l.durum)).length;
  const won = allData.leads.filter(l => l.durum === 'Kazanıldı').length;
  const hot = allData.leads.filter(l => l.durum === 'Sıcak').length;
  const activeR = allData.recruiting.filter(r => r.durum !== 'Olumsuz').length;
  
  // Danışman bazlı özet
  const byDanisman = {};
  allData.leads.forEach(l => {
    if (l.danisman) {
      if (!byDanisman[l.danisman]) byDanisman[l.danisman] = { toplam: 0, kazanildi: 0, acik: 0 };
      byDanisman[l.danisman].toplam++;
      if (l.durum === 'Kazanıldı') byDanisman[l.danisman].kazanildi++;
      else byDanisman[l.danisman].acik++;
    }
  });
  
  c.innerHTML = '<div class="grid">'
    + '<div class="card"><h3>Toplam GD Lead</h3><div class="card-stat">' + allData.leads.length + '</div><div class="card-sub">Tüm zamanlar</div></div>'
    + '<div class="card red"><h3>Açık Leads</h3><div class="card-stat">' + open + '</div><div class="card-sub">Takip ediliyor</div></div>'
    + '<div class="card green"><h3>Kazanılan</h3><div class="card-stat">' + won + '</div><div class="card-sub">Başarılı</div></div>'
    + '<div class="card"><h3>🔥 Sıcak</h3><div class="card-stat">' + hot + '</div><div class="card-sub">Yakın takip</div></div>'
    + '<div class="card"><h3>Aktif Adaylar</h3><div class="card-stat">' + activeR + '</div><div class="card-sub">Recruiting</div></div>'
    + '</div>'
    + '<div class="section-title">Danışman Performansı</div>'
    + '<div class="table-wrap"><table><thead><tr><th>Danışman</th><th>Toplam</th><th>Açık</th><th>Kazanılan</th><th>Oran</th></tr></thead><tbody>'
    + Object.entries(byDanisman).map(function([ad, d]) {
        const oran = d.toplam > 0 ? Math.round(d.kazanildi / d.toplam * 100) : 0;
        return '<tr><td><strong>' + ad + '</strong></td><td>' + d.toplam + '</td><td>' + d.acik + '</td><td>' + d.kazanildi + '</td><td>' + oran + '%</td></tr>';
      }).join('')
    + '</tbody></table></div>'
    + '<div class="section-title" style="margin-top:20px">Son GD Leads</div>'
    + '<div class="table-wrap"><table><thead><tr><th>Ad</th><th>Kaynak</th><th>Durum</th><th>Danışman</th></tr></thead><tbody>'
    + allData.leads.slice(0,8).map(l => '<tr><td><strong>' + (l.ad||'') + '</strong></td><td>' + (l.kaynak||'—') + '</td><td>' + badge(l.durum) + '</td><td>' + (l.danisman||'—') + '</td></tr>').join('')
    + '</tbody></table></div>';
}

// GD LEADS (ADMIN)
function renderGDLeads(c) {
  const danismanOptions = allData.danismanlar.map(d => '<option value="' + d.ad + '">' + d.ad + '</option>').join('');
  
  c.innerHTML = '<div class="section-title">👤 GD Leads (' + allData.leads.length + ') <button class="btn-add" onclick="showLeadForm()">+ Yeni Lead</button></div>'
    + '<div id="leadForm" class="hidden form-wrap">'
    + '<h3>Yeni GD Lead</h3>'
    + '<div class="form-grid">'
    + '<div class="form-group"><label>Ad Soyad *</label><input id="f_ad" placeholder="Ad Soyad" /></div>'
    + '<div class="form-group"><label>Telefon</label><input id="f_tel" placeholder="5XX XXX XX XX" /></div>'
    + '<div class="form-group"><label>Kaynak</label><select id="f_kaynak"><option>Sponsorlu</option><option>Remax</option><option>Selen</option><option>Diğer</option></select></div>'
    + '<div class="form-group"><label>Danışman</label><select id="f_danisman"><option value="">— Seç —</option>' + danismanOptions + '</select></div>'
    + '<div class="form-group"><label>Durum</label><select id="f_durum"><option>Arandı</option><option>Çağrıldı</option><option>Görüşüldü</option><option>Sıcak</option><option>Soğuk</option><option>Kazanıldı</option><option>Kaybedildi</option></select></div>'
    + '</div>'
    + '<div class="form-group" style="margin-top:12px"><label>Açıklama</label><textarea id="f_aciklama" placeholder="Not..."></textarea></div>'
    + '<div class="form-actions"><button class="btn-save" onclick="saveLead()">Kaydet</button><button class="btn-cancel" onclick="hideLeadForm()">İptal</button></div>'
    + '<div id="leadFormMsg"></div>'
    + '</div>'
    + '<div class="table-wrap"><table><thead><tr><th>Tarih</th><th>Ad</th><th>Telefon</th><th>Kaynak</th><th>Açıklama</th><th>Durum</th><th>Danışman</th></tr></thead><tbody>'
    + allData.leads.map(l => '<tr><td>' + (l.tarih||'—') + '</td><td><strong>' + (l.ad||'') + '</strong></td><td>' + (l.telefon||'—') + '</td><td>' + (l.kaynak||'—') + '</td><td>' + (l.aciklama||'—') + '</td><td>' + badge(l.durum) + '</td><td>' + (l.danisman||'—') + '</td></tr>').join('')
    + '</tbody></table></div>';
}

function showLeadForm() { document.getElementById('leadForm').classList.remove('hidden'); }
function hideLeadForm() { document.getElementById('leadForm').classList.add('hidden'); }

async function saveLead() {
  const ad = document.getElementById('f_ad').value.trim();
  if (!ad) { document.getElementById('leadFormMsg').innerHTML = '<div class="error-msg">Ad zorunlu!</div>'; return; }
  
  const data = {
    ad: ad,
    telefon: document.getElementById('f_tel').value.trim(),
    kaynak: document.getElementById('f_kaynak').value,
    danisman: document.getElementById('f_danisman').value || null,
    durum: document.getElementById('f_durum').value,
    aciklama: document.getElementById('f_aciklama').value.trim(),
    tarih: new Date().toISOString().split('T')[0]
  };
  
  try {
    await api('gd_leads', 'POST', data);
    document.getElementById('leadFormMsg').innerHTML = '<div class="success-msg">✅ Lead eklendi!</div>';
    await loadData();
    setTimeout(() => { hideLeadForm(); renderContent('gd-leads'); }, 1000);
  } catch(e) {
    document.getElementById('leadFormMsg').innerHTML = '<div class="error-msg">❌ Hata: ' + e.message + '</div>';
  }
}

// RECRUITING (ADMIN)
function renderRecruiting(c) {
  c.innerHTML = '<div class="section-title">👥 Recruiting (' + allData.recruiting.length + ') <button class="btn-add" onclick="showRecruitForm()">+ Yeni Aday</button></div>'
    + '<div id="recruitForm" class="hidden form-wrap">'
    + '<h3>Yeni Aday</h3>'
    + '<div class="form-grid">'
    + '<div class="form-group"><label>Ad Soyad *</label><input id="r_ad" placeholder="Ad Soyad" /></div>'
    + '<div class="form-group"><label>Telefon</label><input id="r_tel" placeholder="5XX XXX XX XX" /></div>'
    + '<div class="form-group"><label>Kaynak</label><select id="r_kaynak"><option>Leman</option><option>Eren</option><option>Secret</option><option>Remax</option><option>Halk Eğitim</option><option>Kariyer</option><option>Sahibinden</option><option>Diğer</option></select></div>'
    + '<div class="form-group"><label>Durum</label><select id="r_durum"><option>Beklemede</option><option>Sıcak</option><option>Randevu</option><option>Görüşüldü</option><option>Olumsuz</option></select></div>'
    + '</div>'
    + '<div class="form-group" style="margin-top:12px"><label>Açıklama</label><textarea id="r_aciklama" placeholder="Not..."></textarea></div>'
    + '<div class="form-actions"><button class="btn-save" onclick="saveRecruit()">Kaydet</button><button class="btn-cancel" onclick="hideRecruitForm()">İptal</button></div>'
    + '<div id="recruitFormMsg"></div>'

function showDanismanForm() { document.getElementById('danismanForm').classList.remove('hidden'); }
function hideDanismanForm() { document.getElementById('danismanForm').classList.add('hidden'); }

function generateToken() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
  let token = '';
  for (let i = 0; i < 12; i++) token += chars[Math.floor(Math.random() * chars.length)];
  return token;
}

async function saveDanisman() {
  const ad = document.getElementById('d_ad').value.trim();
  if (!ad) { document.getElementById('danismanFormMsg').innerHTML = '<div class="error-msg">Ad zorunlu!</div>'; return; }
  
  const token = generateToken();
  try {
    await api('danismanlar', 'POST', { ad: ad, token: token });
    document.getElementById('danismanFormMsg').innerHTML = '<div class="success-msg">✅ Danışman eklendi! Token: ' + token + '</div>';
    await loadData();
    setTimeout(() => { hideDanismanForm(); renderContent('danismanlar'); }, 1500);
  } catch(e) {
    document.getElementById('danismanFormMsg').innerHTML = '<div class="error-msg">❌ Hata: ' + e.message + '</div>';
  }
}

function copyLink(link) {
  navigator.clipboard.writeText(link).then(() => alert('Link kopyalandı!')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = link;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('Link kopyalandı!');
  });
}

        + '<td>' + (l.aciklama||'—') + '</td>'
        + '<td><select class="status-select" onchange="updateLeadStatus(\'' + l.id + '\', this.value)">'
        + ['Arandı','Çağrıldı','Görüşüldü','Sıcak','Soğuk','Kazanıldı','Kaybedildi'].map(s => '<option' + (l.durum === s ? ' selected' : '') + '>' + s + '</option>').join('')
        + '</select></td>'
        + '</tr>').join('')
    + '</tbody></table></div>';
}

async function updateLeadStatus(id, durum) {
  try {
    await api('gd_leads', 'PATCH', { durum: durum }, 'id=eq.' + id);
    const lead = allData.leads.find(l => l.id === id);
    if (lead) lead.durum = durum;
  } catch(e) {
    alert('Güncelleme hatası: ' + e.message);
  }
}
