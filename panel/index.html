<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RE/MAX LAVANDA - Ofis Yönetim Sistemi</title>
<style>
:root {
  --red: #DC1C2E; --blue: #003DA5; --darkblue: #0C2749;
  --gray: #404041; --lightgray: #F5F6F8; --border: #E3E6EB;
  --green: #1C8C4B; --orange: #C9821A;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--lightgray); color: var(--gray); min-height: 100vh; }

.login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, var(--darkblue), var(--blue)); }
.login-box { background: white; border-radius: 20px; padding: 48px 40px; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; }
.login-logo { font-size: 22px; font-weight: 800; color: var(--darkblue); margin-bottom: 4px; }
.login-sub { font-size: 12px; color: #999; margin-bottom: 32px; }
.login-box input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; margin-bottom: 12px; outline: none; }
.login-box input:focus { border-color: var(--blue); }
.btn-login { width: 100%; padding: 13px; background: var(--darkblue); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
.btn-login:hover { background: var(--blue); }
.login-error { color: var(--red); font-size: 12px; margin-top: 8px; }

.header { background: linear-gradient(135deg, var(--darkblue), var(--blue)); color: white; padding: 16px 20px; }
.header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 17px; font-weight: 800; }
.subtitle { font-size: 11px; opacity: 0.8; margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.user-badge { background: rgba(255,255,255,0.15); padding: 6px 14px; border-radius: 20px; font-size: 12px; }
.last-login { font-size: 10px; opacity: 0.7; margin-top: 2px; }
.btn-header { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: white; padding: 6px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; }
.btn-header:hover { background: rgba(255,255,255,0.25); }

.tab-bar { background: white; border-bottom: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.tabs { display: flex; max-width: 1400px; margin: 0 auto; padding: 0 20px; overflow-x: auto; }
.tab { padding: 14px 18px; font-size: 13px; font-weight: 500; border: none; background: none; cursor: pointer; color: #999; border-bottom: 3px solid transparent; white-space: nowrap; }
.tab:hover { color: var(--darkblue); }
.tab.active { color: var(--darkblue); border-bottom-color: var(--red); font-weight: 600; }

.content { max-width: 1400px; margin: 0 auto; padding: 24px 20px; }

.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 20px; }
.card { background: white; border: 1px solid var(--border); border-radius: 14px; padding: 18px; }
.card h3 { font-size: 11px; color: #999; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.card-stat { font-size: 28px; font-weight: 800; color: var(--darkblue); }
.card-sub { font-size: 11px; color: #bbb; margin-top: 4px; }
.card.red .card-stat { color: var(--red); }
.card.green .card-stat { color: var(--green); }
.card.orange .card-stat { color: var(--orange); }
.card.blue .card-stat { color: var(--blue); }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media(max-width:1100px) { .two-col { grid-template-columns: 1fr; } }
.col-box { background: white; border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
.col-box h2 { font-size: 15px; font-weight: 700; color: var(--darkblue); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid var(--red); }

/* Recruiting + Takvim yan yana */
.recruit-layout { display: grid; grid-template-columns: 1fr 360px; gap: 20px; }
@media(max-width:1100px) { .recruit-layout { grid-template-columns: 1fr; } }

.date-filter-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
.date-filter-bar label { font-size: 11px; font-weight: 700; color: #666; }
.date-filter-bar input, .date-filter-bar select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; outline: none; }
.filter-btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: 8px; background: white; font-size: 11px; cursor: pointer; font-weight: 600; color: #666; }
.filter-btn.active { background: var(--darkblue); color: white; border-color: var(--darkblue); }

.table-header { display: flex; justify-content: space-between; align-items: center; margin: 16px 0 10px 0; }
.table-title { font-size: 14px; font-weight: 700; color: var(--darkblue); }
.table-actions { display: flex; gap: 8px; align-items: center; }
.table-wrap { background: white; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.search-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.search-bar input, .search-bar select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; outline: none; }
table { width: 100%; border-collapse: collapse; }
th { background: var(--lightgray); padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 700; border-bottom: 1px solid var(--border); color: #666; text-transform: uppercase; }
td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafafa; }

.mini-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
.mini-table th { font-size: 11px; font-weight: 700; color: #666; padding: 8px; background: var(--lightgray); border-bottom: 1px solid var(--border); text-align: left; }
.mini-table td { font-size: 12px; padding: 8px; border-bottom: 1px solid #f5f5f5; }
.mini-table tr:last-child td { border-bottom: none; }

.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-arandi { background: #E8F0FE; color: #1a56db; }
.badge-cagrildi { background: #FEF3C7; color: #92400e; }
.badge-gorusuldu { background: #EDE9FE; color: #5b21b6; }
.badge-1gorusme { background: #E0F2FE; color: #0369a1; }
.badge-2gorusme { background: #F0FDF4; color: #15803d; }
.badge-sicak { background: #FBEEDB; color: var(--orange); }
.badge-soguk { background: #F0F0F0; color: #555; }
.badge-kazanildi { background: #E2F2E8; color: var(--green); }
.badge-kaybedildi { background: #FBE3E5; color: var(--red); }
.badge-beklemede { background: #FEF3C7; color: #92400e; }
.badge-randevu { background: #EDE9FE; color: #5b21b6; }
.badge-olumsuz { background: #FBE3E5; color: var(--red); }
.badge-karalist { background: #1a1a1a; color: white; }

.btn { padding: 8px 16px; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; }
.btn-primary { background: var(--darkblue); color: white; }
.btn-primary:hover { background: var(--blue); }
.btn-ghost { background: white; color: var(--gray); border: 1px solid var(--border); }
.btn-sm { padding: 4px 10px; font-size: 11px; border-radius: 6px; }
.btn-wa { background: #25D366; color: white; border: none; border-radius: 6px; padding: 3px 8px; font-size: 11px; cursor: pointer; text-decoration: none; display: inline-block; }
.btn-danger { background: #fee2e2; color: var(--red); border: none; }

.form-wrap { background: white; border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 16px; }
.form-wrap h3 { font-size: 15px; font-weight: 700; color: var(--darkblue); margin-bottom: 20px; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group label { font-size: 11px; font-weight: 700; color: #666; text-transform: uppercase; }
.form-group input, .form-group select, .form-group textarea { padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; outline: none; font-family: inherit; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--blue); }
.form-group textarea { resize: vertical; min-height: 70px; }
.form-actions { margin-top: 16px; display: flex; gap: 8px; align-items: center; }
.status-select { padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; cursor: pointer; background: white; }

/* TAKVİM */
.calendar-box { background: white; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; position: sticky; top: 20px; }
.calendar-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 1px solid var(--border); background: var(--lightgray); }
.cal-title { font-size: 13px; font-weight: 700; color: var(--darkblue); }
.cal-btn { padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px; background: white; cursor: pointer; font-size: 12px; }
.time-grid { display: grid; grid-template-columns: 44px 1fr; max-height: 500px; overflow-y: auto; }
.time-col { border-right: 1px solid var(--border); }
.time-slot { height: 52px; display: flex; align-items: flex-start; justify-content: center; padding-top: 4px; font-size: 10px; color: #aaa; border-bottom: 1px solid #f0f0f0; }
.event-col { position: relative; }
.event-row { height: 52px; border-bottom: 1px solid #f0f0f0; position: relative; padding: 2px 4px; }
.event-item { background: var(--blue); color: white; border-radius: 6px; padding: 3px 7px; font-size: 11px; font-weight: 600; cursor: pointer; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; margin-bottom: 2px; }
.event-item.ok { background: var(--green); }
.event-item.pending { background: var(--orange); }
.no-event { font-size: 11px; color: #ccc; text-align: center; padding: 12px; }
.allday-box { padding: 8px 12px; background: #fff8e1; border-bottom: 1px solid var(--border); font-size: 11px; }
.allday-item { display: inline-block; background: var(--orange); color: white; padding: 2px 8px; border-radius: 10px; margin: 2px; font-size: 11px; font-weight: 600; }

/* MODAL */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: white; border-radius: 16px; padding: 32px; width: 520px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-height: 90vh; overflow-y: auto; }
.modal h3 { font-size: 16px; font-weight: 700; color: var(--darkblue); margin-bottom: 20px; }
.modal-actions { margin-top: 20px; display: flex; gap: 8px; justify-content: flex-end; }

/* AYARLAR */
.settings-section { background: white; border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
.settings-section h3 { font-size: 14px; font-weight: 700; color: var(--darkblue); margin-bottom: 16px; }
.tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.tag-item { display: flex; align-items: center; gap: 6px; background: var(--lightgray); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; }
.tag-del { background: none; border: none; color: var(--red); cursor: pointer; font-size: 14px; font-weight: 700; padding: 0 2px; }
.tag-add { display: flex; gap: 8px; }
.tag-add input { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; outline: none; flex: 1; }

/* SORGU HAKKI */
.query-rights { background: #fff8e1; border: 1px solid #ffc107; border-radius: 10px; padding: 12px 16px; margin-bottom: 12px; font-size: 13px; }
.rights-dots { display: flex; gap: 6px; margin-top: 6px; }
.dot { width: 14px; height: 14px; border-radius: 50%; background: var(--green); }
.dot.used { background: #ddd; }

.rate-bar { display: inline-block; height: 6px; background: var(--green); border-radius: 3px; vertical-align: middle; margin-right: 6px; }
.section-divider { height: 1px; background: var(--border); margin: 16px 0; }

.hidden { display: none; }
.loading { text-align: center; padding: 40px; color: #999; }
.success-msg { background: #E2F2E8; color: var(--green); padding: 10px 14px; border-radius: 8px; margin: 8px 0; font-size: 13px; }
.error-msg { background: #FBE3E5; color: var(--red); padding: 10px 14px; border-radius: 8px; margin: 8px 0; font-size: 13px; }
.dup-warning { background: #fff8e1; border: 1px solid #ffc107; border-radius: 8px; padding: 10px 14px; margin-bottom: 10px; font-size: 12px; color: #856404; }
.token-link { font-family: monospace; font-size: 10px; background: #f0f0f0; padding: 3px 6px; border-radius: 4px; color: var(--blue); word-break: break-all; }
</style>
</head>
<body>

<div id="loginPage" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">RE/MAX LAVANDA</div>
    <div class="login-sub">Ofis Yönetim Sistemi</div>
    <input type="text" id="loginUser" placeholder="Kullanıcı adı" />
    <input type="password" id="loginPass" placeholder="Şifre" />
    <button class="btn-login" onclick="doLogin()">Giriş Yap</button>
    <div id="loginError" class="login-error"></div>
  </div>
</div>

<div id="mainApp" class="hidden">
  <div class="header">
    <div class="header-content">
      <div><div class="logo">RE/MAX LAVANDA</div><div class="subtitle">Ofis Yönetim Sistemi</div></div>
      <div class="header-right">
        <div><div class="user-badge" id="userBadge">👤</div><div class="last-login" id="lastLoginInfo"></div></div>
        <button class="btn-header" onclick="showPassModal()">🔑 Şifre</button>
        <button class="btn-header" onclick="doLogout()">Çıkış</button>
      </div>
    </div>
  </div>
  <div class="tab-bar"><div class="tabs" id="navTabs"></div></div>
  <div class="content" id="content"><div class="loading">Yükleniyor...</div></div>
</div>

<!-- ŞİFRE MODAL -->
<div id="passModal" class="modal-overlay">
  <div class="modal">
    <h3>🔑 Şifre Değiştir</h3>
    <div class="form-group" style="margin-bottom:12px"><label>Mevcut Şifre</label><input type="password" id="oldPass" /></div>
    <div class="form-group" style="margin-bottom:12px"><label>Yeni Şifre</label><input type="password" id="newPass" /></div>
    <div class="form-group"><label>Yeni Şifre (Tekrar)</label><input type="password" id="newPass2" /></div>
    <div id="passMsg"></div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="hidePassModal()">İptal</button><button class="btn btn-primary" onclick="changePassword()">Kaydet</button></div>
  </div>
</div>

<!-- EDIT MODAL -->
<div id="editModal" class="modal-overlay">
  <div class="modal">
    <h3 id="editTitle">Düzenle</h3>
    <div id="editContent"></div>
    <div id="editMsg"></div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="hideEdit()">İptal</button><button class="btn btn-primary" onclick="saveEdit()">Kaydet</button></div>
  </div>
</div>

<script>
const SB = 'https://vfqkmluqjaihpgxhqlqt.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmcWttbHVxamFpaHBneGhxbHF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NTE4ODMsImV4cCI6MjA5ODMyNzg4M30.6jsmD-om_q2ac9zbrHORO8FU9TUjvqAsBh9ux1xhiD8';

let USERS = JSON.parse(localStorage.getItem('rmx_users')||'null') || { 'admin':{pass:'lavanda2024',role:'admin',name:'Admin'}, 'ofis':{pass:'1234',role:'ofis',name:'Ofis'} };
let CFG = JSON.parse(localStorage.getItem('rmx_cfg')||'null') || {
  leadSources: ['Sponsorlu','Remax','Selen','Referans','Diğer'],
  recruitSources: ['Leman','Eren','Secret','Remax','Halk Eğitim','Kariyer','Sahibinden','Seminer','Diğer'],
  leadDurums: ['Arandı','Çağrıldı','Görüşüldü','Sıcak','Soğuk','Kazanıldı','Kaybedildi','Kara Liste'],
  recruitDurums: ['Beklemede','Sıcak','1. Görüşme','2. Görüşme','Randevu','Görüşüldü','Olumsuz','Kara Liste']
};

function saveCFG() { localStorage.setItem('rmx_cfg', JSON.stringify(CFG)); }
function saveUsers() { localStorage.setItem('rmx_users', JSON.stringify(USERS)); }

// SORGU HAKKI
function getQueryRights() {
  const week = getWeekKey();
  const data = JSON.parse(localStorage.getItem('rmx_rights_' + week) || '{"used":0}');
  return { used: data.used, left: 3 - data.used };
}
function useQueryRight() {
  const week = getWeekKey();
  const data = JSON.parse(localStorage.getItem('rmx_rights_' + week) || '{"used":0}');
  data.used++;
  localStorage.setItem('rmx_rights_' + week, JSON.stringify(data));
}
function getWeekKey() {
  const d = new Date();
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil((((d - jan1) / 86400000) + jan1.getDay() + 1) / 7);
  return d.getFullYear() + '_' + week;
}

let currentUser = null;
let allData = { leads: [], recruiting: [], danismanlar: [] };
let editRec = null; let editTbl = null;
let calDate = new Date();
const urlToken = new URLSearchParams(window.location.search).get('token');

async function api(table, method, body, filter) {
  let url = SB + '/rest/v1/' + table;
  if (filter) url += '?' + filter;
  const opts = { method: method||'GET', headers: { 'apikey': KEY, 'Authorization': 'Bearer '+KEY, 'Content-Type': 'application/json', 'Prefer': method==='POST'?'return=representation':(method==='PATCH'?'return=representation':'') } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (!res.ok) { const e = await res.text(); throw new Error(e); }
  const t = await res.text(); return t ? JSON.parse(t) : [];
}

async function loadData() {
  const [l,r,d] = await Promise.all([
    api('gd_leads','GET',null,'select=*&order=created_at.desc'),
    api('recruiting_candidates','GET',null,'select=*&order=created_at.desc'),
    api('danismanlar','GET',null,'select=*&order=created_at.asc')
  ]);
  allData.leads = l||[]; allData.recruiting = r||[]; allData.danismanlar = d||[];
}

function cap(s) { if(!s) return ''; return s.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' '); }
function today() { return new Date().toISOString().split('T')[0]; }
function weekAgo() { const d=new Date(); d.setDate(d.getDate()-7); return d.toISOString().split('T')[0]; }
function genToken() { const c='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789'; let t=''; for(let i=0;i<14;i++) t+=c[Math.floor(Math.random()*c.length)]; return t; }

function badge(d) {
  const m = {'Arandı':'arandi','Çağrıldı':'cagrildi','Görüşüldü':'gorusuldu','1. Görüşme':'1gorusme','2. Görüşme':'2gorusme','Sıcak':'sicak','Soğuk':'soguk','Kazanıldı':'kazanildi','Kaybedildi':'kaybedildi','Beklemede':'beklemede','Randevu':'randevu','Olumsuz':'olumsuz','Kara Liste':'karalist'};
  return '<span class="badge badge-'+(m[d]||'soguk')+'">'+(d||'—')+'</span>';
}

function wa(tel) {
  if(!tel) return '';
  const c=tel.replace(/\D/g,''); const n=c.startsWith('0')?'90'+c.slice(1):(c.startsWith('90')?c:'90'+c);
  return '<a href="https://wa.me/'+n+'" target="_blank" class="btn-wa">💬</a> ';
}

function opts(arr, cur) { return arr.map(s=>'<option'+(cur===s?' selected':'')+'>'+s+'</option>').join(''); }

function doLogin() {
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value.trim();
  if(USERS[u]&&USERS[u].pass===p) {
    currentUser={...USERS[u],username:u};
    localStorage.setItem('lastLogin_'+u, new Date().toLocaleString('tr-TR'));
    startApp();
  } else { document.getElementById('loginError').textContent='Kullanıcı adı veya şifre hatalı!'; }
}

function doLogout() {
  currentUser=null;
  document.getElementById('mainApp').classList.add('hidden');
  document.getElementById('loginPage').classList.remove('hidden');
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
}

async function startApp() {
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('userBadge').textContent='👤 '+currentUser.name;
  const last=localStorage.getItem('lastLogin_'+currentUser.username);
  if(last) document.getElementById('lastLoginInfo').textContent='Son giriş: '+last;
  try {
    await loadData(); renderTabs();
    const first = currentUser.role==='admin'?'ozet': currentUser.role==='ofis'?'portfolyo':'danisman';
    renderContent(first);
  } catch(e) { document.getElementById('content').innerHTML='<div class="error-msg">❌ '+e.message+'</div>'; }
}

async function checkToken() {
  if(!urlToken) return false;
  try {
    await loadData();
    const d=allData.danismanlar.find(x=>x.token===urlToken);
    if(d) {
      currentUser={role:'danisman',name:d.ad,danismanAd:d.ad};
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('mainApp').classList.remove('hidden');
      document.getElementById('userBadge').textContent='👤 '+d.ad;
      renderTabs(); renderContent('danisman'); return true;
    }
  } catch(e) {}
  return false;
}

function renderTabs() {
  const nav=document.getElementById('navTabs'); nav.innerHTML='';
  let tabs=[];
  if(currentUser.role==='admin') {
    tabs=[{id:'ozet',l:'📊 Özet'},{id:'portfolyo',l:'🏠 Portföy'},{id:'recruiting',l:'👥 Recruiting'},{id:'danismanlar',l:'🔑 Danışmanlar'},{id:'ayarlar',l:'⚙️ Ayarlar'}];

    tabs=[{id:'danisman',l:'📋 Portföylerim'}];

    const b=document.createElement('button');
    b.className='tab'+(i===0?' active':''); b.textContent=t.l;

function renderContent(id) {
  const c=document.getElementById('content');
  if(id==='ozet') renderOzet(c);
  else if(id==='portfolyo') renderPortfolyo(c);
  else if(id==='recruiting') renderRecruiting(c);
  else if(id==='danismanlar') renderDanismanlar(c);
  else if(id==='ayarlar') renderAyarlar(c);
  else if(id==='danisman') renderDanismanPanel(c);
}

// ===== ÖZET =====
function renderOzet(c, period, cs, ce) {
  period=period||'month';
  let range = (() => {
    const now=new Date(); const end=today(); let start;
    if(period==='week'){const d=new Date();d.setDate(d.getDate()-7);start=d.toISOString().split('T')[0];}
    else if(period==='month'){start=new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0];}
    else if(period==='3month'){const d=new Date();d.setMonth(d.getMonth()-3);start=d.toISOString().split('T')[0];}
    else if(period==='year'){start=now.getFullYear()+'-01-01';}
    else if(period==='custom'&&cs&&ce){return{start:cs,end:ce};}
    return{start,end};
  })();

  const leads=allData.leads.filter(l=>l.tarih>=range.start&&l.tarih<=range.end);
  const recs=allData.recruiting.filter(r=>(r.created_at||'').slice(0,10)>=range.start&&(r.created_at||'').slice(0,10)<=range.end);
  const tL=leads.length, wL=leads.filter(l=>l.durum==='Kazanıldı').length;
  const tR=recs.length, okR=recs.filter(r=>!['Olumsuz','Kara Liste'].includes(r.durum)).length;
  const byD={};
  leads.forEach(l=>{if(l.danisman){if(!byD[l.danisman])byD[l.danisman]={t:0,k:0};byD[l.danisman].t++;if(l.durum==='Kazanıldı')byD[l.danisman].k++;}});
  const byLS={};
  leads.forEach(l=>{const k=l.kaynak||'Diğer';if(!byLS[k])byLS[k]={t:0,k:0};byLS[k].t++;if(l.durum==='Kazanıldı')byLS[k].k++;});
  const byRS={};
  recs.forEach(r=>{const k=r.kaynak||'Diğer';if(!byRS[k])byRS[k]={t:0,ok:0};byRS[k].t++;if(!['Olumsuz','Kara Liste'].includes(r.durum))byRS[k].ok++;});
  const byRD={};
  recs.forEach(r=>{const d=r.durum||'Belirsiz';byRD[d]=(byRD[d]||0)+1;});

  const ps=[{id:'week',l:'Bu Hafta'},{id:'month',l:'Bu Ay'},{id:'3month',l:'3 Ay'},{id:'year',l:'Bu Yıl'},{id:'custom',l:'Özel'}];
  let html='<div class="date-filter-bar">';
  ps.forEach(p=>{ html+='<button class="filter-btn'+(period===p.id?' active':'')+'" onclick="renderOzetP(\''+p.id+'\')">'+p.l+'</button>'; });
  html+='<span id="customRange" style="display:'+(period==='custom'?'flex':'none')+';gap:6px;align-items:center">';
  html+='<input type="date" id="cs" value="'+range.start+'" /><span>—</span><input type="date" id="ce" value="'+range.end+'" />';
  html+='<button class="btn btn-primary btn-sm" onclick="applyCustom()">Uygula</button></span></div>';

  html+='<div class="two-col">';
  html+='<div class="col-box"><h2>🏠 Portföy Raporu</h2>';
  html+='<div class="grid" style="grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">';
  html+='<div class="card"><h3>Toplam</h3><div class="card-stat">'+tL+'</div></div>';
  html+='<div class="card green"><h3>Kazanılan</h3><div class="card-stat">'+wL+'</div></div>';
  html+='<div class="card blue"><h3>Dönüşüm</h3><div class="card-stat">'+(tL>0?Math.round(wL/tL*100):0)+'%</div></div>';
  html+='</div>';
  html+='<div class="table-title" style="margin-bottom:8px">Danışman Başarı Oranları</div>';
  html+='<table class="mini-table"><thead><tr><th>Danışman</th><th>Lead</th><th>Kazanılan</th><th>Oran</th><th></th></tr></thead><tbody>';
  html+=Object.entries(byD).sort((a,b)=>b[1].k/Math.max(b[1].t,1)-a[1].k/Math.max(a[1].t,1)).map(([ad,d])=>{
    const r=d.t>0?Math.round(d.k/d.t*100):0;
    return '<tr><td><strong>'+ad+'</strong></td><td>'+d.t+'</td><td>'+d.k+'</td><td>'+r+'%</td><td><div class="rate-bar" style="width:'+Math.min(r,60)+'px"></div></td></tr>';
  }).join('')||'<tr><td colspan="5" style="text-align:center;color:#999">Veri yok</td></tr>';
  html+='</tbody></table>';
  html+='<div class="section-divider"></div>';
  html+='<div class="table-title" style="margin-bottom:8px">Kaynak Başarı Oranları</div>';
  html+='<table class="mini-table"><thead><tr><th>Kaynak</th><th>Lead</th><th>Kazanılan</th><th>Oran</th></tr></thead><tbody>';
  html+=Object.entries(byLS).sort((a,b)=>b[1].t-a[1].t).map(([k,d])=>{
    const r=d.t>0?Math.round(d.k/d.t*100):0;
    return '<tr><td>'+k+'</td><td>'+d.t+'</td><td>'+d.k+'</td><td>'+r+'%</td></tr>';
  }).join('')||'<tr><td colspan="4" style="text-align:center;color:#999">Veri yok</td></tr>';
  html+='</tbody></table></div>';

  html+='<div class="col-box"><h2>👥 Recruiting Raporu</h2>';
  html+='<div class="grid" style="grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">';
  html+='<div class="card"><h3>Toplam</h3><div class="card-stat">'+tR+'</div></div>';
  html+='<div class="card green"><h3>Aktif</h3><div class="card-stat">'+okR+'</div></div>';
  html+='<div class="card blue"><h3>Oran</h3><div class="card-stat">'+(tR>0?Math.round(okR/tR*100):0)+'%</div></div>';
  html+='</div>';
  html+='<div class="table-title" style="margin-bottom:8px">Durum Dağılımı</div>';
  html+='<table class="mini-table"><thead><tr><th>Durum</th><th>Aday</th><th>%</th></tr></thead><tbody>';
  html+=Object.entries(byRD).sort((a,b)=>b[1]-a[1]).map(([d,n])=>{
    const r=tR>0?Math.round(n/tR*100):0;
    return '<tr><td>'+badge(d)+'</td><td>'+n+'</td><td>'+r+'%</td></tr>';
  }).join('')||'<tr><td colspan="3" style="text-align:center;color:#999">Veri yok</td></tr>';
  html+='</tbody></table>';
  html+='<div class="section-divider"></div>';
  html+='<div class="table-title" style="margin-bottom:8px">Kaynak Başarı Oranları</div>';
  html+='<table class="mini-table"><thead><tr><th>Kaynak</th><th>Aday</th><th>Aktif</th><th>Oran</th></tr></thead><tbody>';
  html+=Object.entries(byRS).sort((a,b)=>b[1].t-a[1].t).map(([k,d])=>{
    const r=d.t>0?Math.round(d.ok/d.t*100):0;
    return '<tr><td>'+k+'</td><td>'+d.t+'</td><td>'+d.ok+'</td><td>'+r+'%</td></tr>';
  }).join('')||'<tr><td colspan="4" style="text-align:center;color:#999">Veri yok</td></tr>';
  html+='</tbody></table></div>';
  html+='</div>';
  c.innerHTML=html;
}

function renderOzetP(p) { if(p==='custom') { document.getElementById('customRange').style.display='flex'; } renderOzet(document.getElementById('content'),p); }
function applyCustom() { const s=document.getElementById('cs').value; const e=document.getElementById('ce').value; renderOzet(document.getElementById('content'),'custom',s,e); }

function leadRows(list) {
  return list.map(l=>'<tr><td>'+(l.tarih||'—')+'</td><td><strong>'+(l.ad||'')+'</strong></td><td>'+wa(l.telefon)+(l.telefon||'')+'</td><td>'+(l.kaynak||'—')+'</td><td>'+badge(l.durum)+'</td><td>'+(l.danisman||'—')+'</td><td>'+(l.sonraki_takip||'—')+'</td><td><button class="btn btn-sm btn-ghost" onclick="editRec_(\'gd_leads\',\''+l.id+'\')">✏️</button></td></tr>').join('');
}

function filterLeads() {
  const a=(document.getElementById('srch_ad')||{value:''}).value.toLowerCase();
  const d=(document.getElementById('srch_d')||{value:''}).value;
  const dan=(document.getElementById('srch_dan')||{value:''}).value;
  const f=allData.leads.filter(l=>(!a||(l.ad||'').toLowerCase().includes(a))&&(!d||l.durum===d)&&(!dan||l.danisman===dan));
  const b=document.getElementById('leadsBody'); if(b) b.innerHTML=leadRows(f);
}

function queryLeads() {
  const s=document.getElementById('q_start').value;
  const e=document.getElementById('q_end').value;
  if(!s||!e) { alert('Tarih seçin!'); return; }
  const diff=(new Date(e)-new Date(s))/(1000*60*60*24);
  if(diff>7) { alert('En fazla 7 günlük aralık sorgulayabilirsiniz!'); return; }
  useQueryRight();
  const filtered=allData.leads.filter(l=>l.tarih>=s&&l.tarih<=e);
  const body=document.getElementById('ofisLeadsBody');
  if(body) body.innerHTML=filtered.map(l=>'<tr><td>'+(l.tarih||'—')+'</td><td><strong>'+(l.ad||'')+'</strong></td><td>'+wa(l.telefon)+(l.telefon||'')+'</td><td>'+badge(l.durum)+'</td><td>'+(l.danisman||'—')+'</td></tr>').join('');
  alert('Sorgu yapıldı! Kalan hak: '+(getQueryRights().left));
  renderContent('portfolyo');
}

function showLeadForm() { document.getElementById('leadFormWrap').classList.remove('hidden'); }
function hideLeadForm() { document.getElementById('leadFormWrap').classList.add('hidden'); }
function quickDan() { document.getElementById('quickDanBox').classList.remove('hidden'); }

async function saveQuickDan() {
  const ad=cap(document.getElementById('qDanAd').value.trim());
  if(!ad) return;
  try {
    await api('danismanlar','POST',{ad,token:genToken()});
    await loadData();
    document.getElementById('f_dan').value=ad;
    document.getElementById('qDanMsg').innerHTML='<div class="success-msg">✅ '+ad+' eklendi!</div>';
    const dl=document.getElementById('danList');
    if(dl) dl.innerHTML=allData.danismanlar.map(d=>'<option value="'+d.ad+'">'+d.ad+'</option>').join('');
    setTimeout(()=>{document.getElementById('quickDanBox').classList.add('hidden');document.getElementById('qDanMsg').innerHTML='';},1500);
  } catch(e){document.getElementById('qDanMsg').innerHTML='<div class="error-msg">❌ '+e.message+'</div>';}
}

function dupCheck(val, type) {
  if(val.length<3) return;
  const wEl=document.getElementById(type==='lead'?'leadDupWarn':'recDupWarn');
  if(!wEl) return;
  const ex=type==='lead'?allData.leads.find(l=>(l.ad||'').toLowerCase().includes(val.toLowerCase())):allData.recruiting.find(r=>(r.ad||'').toLowerCase().includes(val.toLowerCase()));
  if(ex) wEl.innerHTML='<div class="dup-warning">⚠️ Bu isimde kayıt mevcut! <strong>'+ex.ad+'</strong> — '+(ex.durum||'—')+'</div>';
  else wEl.innerHTML='';
}

async function saveLead() {
  const ad=cap(document.getElementById('f_ad').value.trim());
  if(!ad){document.getElementById('leadFormMsg').innerHTML='<div class="error-msg">Ad zorunlu!</div>';return;}
  const danEl=document.getElementById('f_dan');
  const danAd=danEl?cap(danEl.value.trim()):'';
  if(danAd&&!allData.danismanlar.find(d=>d.ad===danAd)) {
    try{await api('danismanlar','POST',{ad:danAd,token:genToken()});}catch(e){}
  }
  const data={ad,telefon:document.getElementById('f_tel').value.trim(),kaynak:document.getElementById('f_kaynak').value,danisman:danAd||null,durum:document.getElementById('f_durum').value,aciklama:document.getElementById('f_aciklama').value.trim(),tarih:today(),sonraki_takip:document.getElementById('f_takip').value||null};
  try{
    await api('gd_leads','POST',data);
    document.getElementById('leadFormMsg').innerHTML='<div class="success-msg">✅ Lead eklendi!</div>';
    document.getElementById('f_ad').value='';document.getElementById('f_tel').value='';document.getElementById('f_aciklama').value='';
    await loadData();
    if(currentUser.role==='admin') setTimeout(()=>{hideLeadForm();renderContent('portfolyo');},900);
  }catch(e){document.getElementById('leadFormMsg').innerHTML='<div class="error-msg">❌ '+e.message+'</div>';}
}

    html+='<div class="allday-box"><div style="font-size:10px;font-weight:700;color:#666;margin-bottom:4px">SAATSİZ RANDEVULAR</div>';
    html+=allDayEv.map(r=>'<span class="allday-item">'+r.ad+'</span>').join('');
    html+='</div>';
  }
  html+='<div class="time-grid"><div class="time-col">';
  for(let h=8;h<=20;h++) html+='<div class="time-slot">'+h.toString().padStart(2,'0')+':00</div>';
  html+='</div><div class="event-col">';
  for(let h=8;h<=20;h++) {
    const hS=h.toString().padStart(2,'0');
    const ev=dayEv.filter(r=>r.randevu_saati&&r.randevu_saati.startsWith(hS));
    html+='<div class="event-row">';
    if(ev.length>0) ev.forEach((r,i)=>{
      const cls=r.durum==='Görüşüldü'?'ok':r.durum==='Randevu'?'':'pending';
      html+='<div class="event-item '+cls+'" onclick="editRec_(\'recruiting_candidates\',\''+r.id+'\')">'+r.randevu_saati+' — '+r.ad+'</div>';
    });
    else html+='';
    html+='</div>';
  }
  html+='</div></div>';
  if(dayEv.length===0&&allDayEv.length===0) html+='<div class="no-event">Bu gün randevu yok</div>';
  html+='</div></div>';
  html+='</div>';
  c.innerHTML=html;
}

function recRows(list) {
  return list.map(r=>'<tr><td><strong>'+(r.ad||'')+'</strong></td><td>'+wa(r.telefon)+(r.telefon||'')+'</td><td>'+(r.kaynak||'—')+'</td><td>'+badge(r.durum)+'</td><td>'+(r.randevu_tarihi||'—')+'</td><td>'+(r.randevu_saati||'—')+'</td><td>'+(r.aciklama||'—')+'</td><td><button class="btn btn-sm btn-ghost" onclick="editRec_(\'recruiting_candidates\',\''+r.id+'\')">✏️</button></td></tr>').join('');
}

function filterRec() {
  const a=(document.getElementById('rsrch_ad')||{value:''}).value.toLowerCase();
  const d=(document.getElementById('rsrch_d')||{value:''}).value;
  const k=(document.getElementById('rsrch_k')||{value:''}).value;
  const f=allData.recruiting.filter(r=>(!a||(r.ad||'').toLowerCase().includes(a))&&(!d||r.durum===d)&&(!k||r.kaynak===k));
  const b=document.getElementById('recBody'); if(b) b.innerHTML=recRows(f);
}

// ===== DANIŞMANLAR =====
function renderDanismanlar(c) {
  let html='<div class="table-header"><div class="table-title">🔑 Danışmanlar</div><div class="table-actions"><button class="btn btn-primary" onclick="showDanForm()">+ Yeni Danışman</button></div></div>';
  html+='<div id="danFormWrap" class="hidden form-wrap"><h3>Yeni Danışman</h3>';
  html+='<div class="form-group" style="max-width:280px"><label>Ad Soyad *</label><input id="d_ad" placeholder="Ad Soyad" oninput="this.value=cap(this.value)" /></div>';
  html+='<div class="form-actions"><button class="btn btn-primary" onclick="saveDan()">Token Oluştur & Kaydet</button><button class="btn btn-ghost" onclick="hideDanForm()">İptal</button></div>';
  html+='<div id="danFormMsg"></div></div>';
  html+='<div class="table-wrap"><table><thead><tr><th>Ad</th><th>Panel Linki</th><th>Atanan</th><th>Kazanılan</th><th>Oran</th></tr></thead><tbody>';
  html+=allData.danismanlar.map(d=>{
    const link=window.location.origin+window.location.pathname+'?token='+d.token;
    const ml=allData.leads.filter(l=>l.danisman===d.ad);
    const w=ml.filter(l=>l.durum==='Kazanıldı').length;

    return '<tr><td><strong>'+d.ad+'</strong></td><td><span class="token-link">'+link+'</span> <button class="btn btn-sm btn-ghost" onclick="copyL(\''+link+'\')">Kopyala</button></td><td>'+ml.length+'</td><td>'+w+'</td><td>'+r+'%</td></tr>';
  }).join('');

function showDanForm(){document.getElementById('danFormWrap').classList.remove('hidden');}
function hideDanForm(){document.getElementById('danFormWrap').classList.add('hidden');}
async function saveDan(){
  const ad=cap(document.getElementById('d_ad').value.trim());

function copyL(l){navigator.clipboard.writeText(l).then(()=>alert('Kopyalandı!')).catch(()=>{const t=document.createElement('textarea');t.value=l;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);alert('Kopyalandı!');});}

// ===== AYARLAR =====
function renderAyarlar(c) {
  let html='';
  const sections=[
    {key:'leadSources',title:'🏠 Portföy Kaynakları'},
    {key:'recruitSources',title:'👥 Recruiting Kaynakları'},
    {key:'leadDurums',title:'🏠 Portföy Durumları'},
    {key:'recruitDurums',title:'👥 Recruiting Durumları'}
  ];
  sections.forEach(s=>{
    html+='<div class="settings-section"><h3>'+s.title+'</h3>';
    html+='<div class="tag-list" id="tags_'+s.key+'">';
    html+=CFG[s.key].map((v,i)=>'<div class="tag-item">'+v+'<button class="tag-del" onclick="delTag(\''+s.key+'\','+i+')">×</button></div>').join('');
    html+='</div>';
    html+='<div class="tag-add"><input id="new_'+s.key+'" placeholder="Yeni ekle..." /><button class="btn btn-primary btn-sm" onclick="addTag(\''+s.key+'\')">+ Ekle</button></div>';
    html+='</div>';
  });
  html+='<div class="settings-section"><h3>⚙️ Ofis Şifre Sıfırla</h3>';
  html+='<div class="form-group" style="max-width:260px"><label>Yeni Şifre</label><input type="password" id="adminNewPass" /></div>';
  html+='<div class="form-actions"><button class="btn btn-primary" onclick="adminResetPwd()">Sıfırla</button></div>';
  html+='<div id="adminResetMsg"></div></div>';
  c.innerHTML=html;
}

function addTag(key) {
  const el=document.getElementById('new_'+key);
  const v=cap(el.value.trim());
  if(!v) return;
  if(!CFG[key].includes(v)) { CFG[key].push(v); saveCFG(); }
  el.value=''; renderAyarlar(document.getElementById('content'));
}

function delTag(key, idx) {
  if(confirm('Silmek istiyor musunuz?')) { CFG[key].splice(idx,1); saveCFG(); renderAyarlar(document.getElementById('content')); }
}

function adminResetPwd() {
  const p=document.getElementById('adminNewPass').value.trim();
  if(!p||p.length<4){document.getElementById('adminResetMsg').innerHTML='<div class="error-msg">En az 4 karakter!</div>';return;}
  USERS['ofis'].pass=p; saveUsers();
  document.getElementById('adminResetMsg').innerHTML='<div class="success-msg">✅ Şifre güncellendi!</div>';
}

async function updStatus(id,d) {
  try{await api('gd_leads','PATCH',{durum:d},'id=eq.'+id);const l=allData.leads.find(l=>l.id===id);if(l)l.durum=d;}

// ===== EDIT =====
function editRec_(table, id) {
  const rec=table==='gd_leads'?allData.leads.find(l=>l.id===id):allData.recruiting.find(r=>r.id===id);
  if(!rec) return;
  editRec=rec; editTbl=table;
  const danOpts=allData.danismanlar.map(d=>'<option value="'+d.ad+'"'+(rec.danisman===d.ad?' selected':'')+'>'+d.ad+'</option>').join('');
  let html='<div class="form-grid">';
  html+='<div class="form-group"><label>Ad Soyad</label><input id="e_ad" value="'+(rec.ad||'')+'" oninput="this.value=cap(this.value)" /></div>';
  html+='<div class="form-group"><label>Telefon</label><input id="e_tel" value="'+(rec.telefon||'')+'" /></div>';
  if(table==='gd_leads') {
    document.getElementById('editTitle').textContent='✏️ Lead Düzenle — '+rec.ad;
    html+='<div class="form-group"><label>Kaynak</label><select id="e_k">'+opts(CFG.leadSources,rec.kaynak)+'</select></div>';
    html+='<div class="form-group"><label>Danışman</label><input id="e_dan" list="eDanList" value="'+(rec.danisman||'')+'" /><datalist id="eDanList">'+danOpts+'</datalist></div>';
    html+='<div class="form-group"><label>Durum</label><select id="e_d">'+opts(CFG.leadDurums,rec.durum)+'</select></div>';
    html+='<div class="form-group"><label>Takip</label><input type="date" id="e_t" value="'+(rec.sonraki_takip||'')+'" /></div>';
    html+='</div><div class="form-group" style="margin-top:12px"><label>Açıklama</label><textarea id="e_a">'+(rec.aciklama||'')+'</textarea></div>';
  } else {
    document.getElementById('editTitle').textContent='✏️ Aday Düzenle — '+rec.ad;
    html+='<div class="form-group"><label>Kaynak</label><select id="e_k">'+opts(CFG.recruitSources,rec.kaynak)+'</select></div>';
    html+='<div class="form-group"><label>Durum</label><select id="e_d">'+opts(CFG.recruitDurums,rec.durum)+'</select></div>';
    html+='<div class="form-group"><label>Randevu Tarihi</label><input type="date" id="e_rv" value="'+(rec.randevu_tarihi||'')+'" /></div>';
    html+='<div class="form-group"><label>Randevu Saati</label><input type="time" id="e_rs" value="'+(rec.randevu_saati||'')+'" /></div>';
    html+='</div><div class="form-group" style="margin-top:12px"><label>Açıklama</label><textarea id="e_a">'+(rec.aciklama||'')+'</textarea></div>';
  }
  document.getElementById('editContent').innerHTML=html;
  document.getElementById('editModal').classList.add('show');
}

function hideEdit(){document.getElementById('editModal').classList.remove('show');editRec=null;editTbl=null;}

async function saveEdit() {
  if(!editRec||!editTbl) return;
  let data={};
  if(editTbl==='gd_leads') {
    data={ad:cap(document.getElementById('e_ad').value.trim()),telefon:document.getElementById('e_tel').value.trim(),kaynak:document.getElementById('e_k').value,danisman:document.getElementById('e_dan').value.trim()||null,durum:document.getElementById('e_d').value,aciklama:document.getElementById('e_a').value.trim(),sonraki_takip:document.getElementById('e_t').value||null};
  } else {
    data={ad:cap(document.getElementById('e_ad').value.trim()),telefon:document.getElementById('e_tel').value.trim(),kaynak:document.getElementById('e_k').value,durum:document.getElementById('e_d').value,aciklama:document.getElementById('e_a').value.trim(),randevu_tarihi:document.getElementById('e_rv').value||null,randevu_saati:document.getElementById('e_rs').value||null};
  }
  try{
    await api(editTbl,'PATCH',data,'id=eq.'+editRec.id);
    document.getElementById('editMsg').innerHTML='<div class="success-msg">✅ Güncellendi!</div>';

    setTimeout(()=>{hideEdit();renderContent(editTbl==='gd_leads'?'portfolyo':'recruiting');},800);

}

function showPassModal(){document.getElementById('passModal').classList.add('show');}
function hidePassModal(){document.getElementById('passModal').classList.remove('show');}
function changePassword(){
  const o=document.getElementById('oldPass').value;
  const n1=document.getElementById('newPass').value;
  const n2=document.getElementById('newPass2').value;
  if(USERS[currentUser.username].pass!==o){document.getElementById('passMsg').innerHTML='<div class="error-msg">Mevcut şifre hatalı!</div>';return;}
  if(n1!==n2){document.getElementById('passMsg').innerHTML='<div class="error-msg">Şifreler eşleşmiyor!</div>';return;}
  if(n1.length<4){document.getElementById('passMsg').innerHTML='<div class="error-msg">En az 4 karakter!</div>';return;}
  USERS[currentUser.username].pass=n1; saveUsers();
  document.getElementById('passMsg').innerHTML='<div class="success-msg">✅ Güncellendi!</div>';
  setTimeout(hidePassModal,1500);
}

// ===== CSV =====
function expCSV(type) {
  const data=type==='leads'?allData.leads:allData.recruiting;
  if(!data.length){alert('Veri yok!');return;}
  const keys=Object.keys(data[0]).filter(k=>k!=='id');
  let csv=keys.join(',')+'\n';
  data.forEach(row=>{csv+=keys.map(k=>'"'+(row[k]||'').toString().replace(/"/g,'""')+'"').join(',')+'\n';});
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(type==='leads'?'portfolyo':'recruiting')+'_'+today()+'.csv';a.click();
}
