<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>RE/MAX LAVANDA</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0C2749">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RE/MAX Lavanda">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
:root{
  --red:#DC1C2E;--blue:#003DA5;--dk:#0C2749;--navy:#0C2749;
  --gr:#404041;--lg:#F4F6F9;--bd:#E2E8F0;--gn:#1C8C4B;
  --or:#C9821A;--blue2:#3B82F6;--purple:#5b21b6;
  --sidebar:220px;--header:56px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--lg);color:var(--gr);min-height:100vh;font-size:13px;}

/* ── LOGIN ── */
.lw{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0C2749 0%,#003DA5 100%);padding:20px;}
.lb{background:#fff;border-radius:20px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 24px 64px rgba(0,0,0,.25);text-align:center;}
.lb .logo{width:64px;height:64px;background:var(--dk);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:24px;}
.ll{font-size:22px;font-weight:800;color:var(--dk);margin-bottom:4px;}
.ls{font-size:12px;color:#999;margin-bottom:28px;}
.lb input{width:100%;padding:13px 16px;border:1.5px solid var(--bd);border-radius:10px;font-size:14px;margin-bottom:12px;outline:none;transition:border-color .2s;}
.lb input:focus{border-color:var(--blue);}
.lck{display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:13px;color:#666;justify-content:center;}
.lck input{width:auto;margin:0;}
.btn-l{width:100%;padding:14px;background:var(--dk);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s;}
.btn-l:hover{background:var(--blue);}
.lerr{color:var(--red);font-size:12px;margin-top:8px;}

/* ── PIN ── */
.po{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.po.show{display:flex;}
.pb{background:#fff;border-radius:20px;padding:32px 28px;width:100%;max-width:300px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.pb h3{font-size:17px;font-weight:800;color:var(--dk);margin-bottom:4px;}
.psub{font-size:12px;color:#999;margin-bottom:20px;}
.pi{font-size:26px;letter-spacing:10px;text-align:center;border:2px solid var(--bd);border-radius:12px;padding:12px;width:100%;font-weight:800;background:var(--lg);}
.pi:focus{border-color:var(--blue);outline:none;}
.pnp{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px;}
.pk{padding:15px;background:var(--lg);border:none;border-radius:10px;font-size:18px;font-weight:700;cursor:pointer;color:var(--dk);transition:background .15s;}
.pk:active,.pk:hover{background:var(--bd);}
.pk.del{background:#fee2e2;color:var(--red);}
.pk.ok{background:var(--dk);color:#fff;}
.perr{color:var(--red);font-size:12px;margin-top:8px;}

/* ── APP LAYOUT ── */
#app{display:flex;flex-direction:column;min-height:100vh;}

/* Header */
.hd{background:linear-gradient(135deg,var(--dk),var(--blue));color:#fff;height:var(--header);padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.hd-left{display:flex;align-items:center;gap:12px;}
.hl{font-size:16px;font-weight:800;letter-spacing:-.3px;}
.hs{font-size:10px;opacity:.65;margin-top:1px;}
.hd-right{display:flex;align-items:center;gap:8px;}
.ub{background:rgba(255,255,255,.15);padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;}
.ll2{font-size:9px;opacity:.65;margin-top:1px;text-align:right;}
.bh{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 12px;border-radius:8px;font-size:11px;cursor:pointer;font-weight:600;transition:background .2s;}
.bh:hover{background:rgba(255,255,255,.2);}

/* Body layout */
.app-body{display:flex;flex:1;}

/* Sidebar */
.sidebar{width:var(--sidebar);background:#fff;border-right:1px solid var(--bd);display:flex;flex-direction:column;position:sticky;top:var(--header);height:calc(100vh - var(--header));overflow-y:auto;flex-shrink:0;}
.sidebar-section{padding:8px 0;}
.sidebar-label{font-size:9px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.8px;padding:14px 16px 4px;border-top:1px solid var(--bd);margin-top:2px;}
.sidebar-label:first-child{border-top:none;padding-top:8px;}
.tab{display:flex;align-items:center;gap:10px;padding:9px 16px;font-size:12px;font-weight:500;border:none;background:none;cursor:pointer;color:#64748b;width:100%;text-align:left;border-radius:0;transition:all .15s;border-left:3px solid transparent;}
.tab:hover{background:#f8fafc;color:var(--dk);}
.tab.active{color:var(--dk);background:linear-gradient(90deg,#EFF6FF,#F8FAFC);border-left-color:var(--red);font-weight:700;}
.tab-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
.tab-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;}

/* Main content */
.main-ct{flex:1;overflow:auto;padding:20px;}
#ct{max-width:1300px;margin:0 auto;}

/* ── COMPONENTS ── */

/* KPI Cards */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
.kpi-card{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:16px;position:relative;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;}
.kpi-card:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.08);}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.kpi-card.red::before{background:var(--red);}
.kpi-card.blue::before{background:var(--blue);}
.kpi-card.green::before{background:var(--gn);}
.kpi-card.orange::before{background:var(--or);}
.kpi-card.purple::before{background:var(--purple);}
.kpi-icon{font-size:20px;margin-bottom:8px;}
.kpi-val{font-size:28px;font-weight:800;color:var(--dk);line-height:1;}
.kpi-lbl{font-size:11px;color:#94a3b8;margin-top:4px;font-weight:500;}
.kpi-card.red .kpi-val{color:var(--red);}
.kpi-card.orange .kpi-val{color:var(--or);}
.kpi-card.green .kpi-val{color:var(--gn);}
.kpi-card.blue .kpi-val{color:var(--blue);}
.kpi-card.purple .kpi-val{color:var(--purple);}

/* Section header */
.th{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.tt{font-size:14px;font-weight:700;color:var(--dk);}
.ta{display:flex;gap:6px;align-items:center;}

/* Buttons */
.btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.btn-p{background:var(--dk);color:#fff;}.btn-p:hover{background:var(--blue);}
.btn-g{background:#fff;color:var(--gr);border:1px solid var(--bd);}.btn-g:hover{background:var(--lg);}
.btn-r{background:#fee2e2;color:var(--red);}.btn-r:hover{background:#fecaca;}
.btn-ora{background:#fff3cd;color:var(--or);}.btn-ora:hover{background:#fde68a;}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-xs{padding:2px 7px;font-size:10px;}

/* Tables */
.tw{background:#fff;border:1px solid var(--bd);border-radius:12px;overflow:hidden;}
.tw table{width:100%;border-collapse:collapse;}
.tw thead tr{background:var(--lg);}
.tw th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--bd);white-space:nowrap;}
.tw td{padding:9px 12px;font-size:12px;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
.tw tbody tr:last-child td{border-bottom:none;}
.tw tbody tr:hover{background:#f8fafc;}
.tw.compact th{padding:7px 10px;}
.tw.compact td{padding:7px 10px;}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;}
.b-si{background:#E2F2E8;color:var(--gn);}
.b-ki{background:#FEF3C7;color:#92400E;}
.b-ka{background:#FBE3E5;color:var(--red);}
.b-ac{background:#DBEAFE;color:#1E40AF;}
.b-so{background:#F3F4F6;color:#374151;}
.b-bk{background:#F0F4FF;color:var(--blue);}

/* Forms */
.fw{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:20px;margin-bottom:16px;}
.fw h3{font-size:14px;font-weight:700;color:var(--dk);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--bd);}
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.fgr{display:flex;flex-direction:column;gap:5px;}
.fgr label{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.4px;}
.fgr input,.fgr select,.fgr textarea{padding:9px 12px;border:1.5px solid var(--bd);border-radius:8px;font-size:13px;outline:none;background:#fff;transition:border-color .2s;font-family:inherit;}
.fgr input:focus,.fgr select:focus,.fgr textarea:focus{border-color:var(--blue);}
.fgr textarea{min-height:72px;resize:vertical;}
.fa{display:flex;gap:8px;margin-top:14px;justify-content:flex-end;}

/* Search bar */
.sb{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.sb input,.sb select{padding:8px 12px;border:1.5px solid var(--bd);border-radius:8px;font-size:12px;outline:none;background:#fff;}
.sb input:focus,.sb select:focus{border-color:var(--blue);}

/* Modal */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px);}
.mo.show{display:flex;}
.md{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.md h3{font-size:16px;font-weight:800;color:var(--dk);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--bd);}
.mda{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:12px;border-top:1px solid var(--bd);}

/* Settings */
.ss2{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:18px;margin-bottom:14px;}
.ss2 h3{font-size:13px;font-weight:700;color:var(--dk);margin-bottom:12px;}
.tag-l{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.tag-i{display:flex;align-items:center;gap:4px;background:var(--lg);border:1px solid var(--bd);border-radius:20px;padding:3px 10px;font-size:12px;}
.tag-ed{background:none;border:none;cursor:pointer;font-size:11px;padding:0 2px;color:#999;}
.tag-del{background:none;border:none;cursor:pointer;font-size:14px;color:#ccc;padding:0;line-height:1;}
.tag-del:hover{color:var(--red);}
.tag-add{display:flex;gap:6px;}
.tag-add input{padding:6px 10px;border:1.5px solid var(--bd);border-radius:8px;font-size:12px;outline:none;flex:1;}

/* Misc */
.hidden{display:none;}
.loading{text-align:center;padding:48px;color:#94a3b8;font-size:14px;}
.ok-m{background:#E2F2E8;color:var(--gn);padding:10px 14px;border-radius:8px;margin:8px 0;font-size:12px;font-weight:600;}
.err-m{background:#FBE3E5;color:var(--red);padding:10px 14px;border-radius:8px;margin:8px 0;font-size:12px;font-weight:600;}
.dup-w{background:#FFF7ED;border:1px solid #FCD34D;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:12px;color:#92400E;}
.tok{font-family:'SF Mono',monospace;font-size:10px;background:#F1F5F9;padding:3px 7px;border-radius:4px;color:var(--blue);word-break:break-all;}
.div{height:1px;background:var(--bd);margin:14px 0;}
.info-box{background:#EDE9FE;border:1px solid #c4b5fd;border-radius:8px;padding:10px 14px;font-size:12px;color:var(--purple);margin-bottom:12px;}
.ss{padding:4px 8px;border:1px solid var(--bd);border-radius:6px;font-size:11px;background:#fff;}
.mt{width:100%;border-collapse:collapse;}
.mt th,.mt td{padding:7px 10px;text-align:left;font-size:11px;border-bottom:1px solid var(--bd);}
.wa-btn{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;background:#25D366;border-radius:50%;color:#fff;font-size:12px;text-decoration:none;margin-right:4px;}

/* Calendar */
.cal-box{background:#fff;border:1px solid var(--bd);border-radius:12px;overflow:hidden;}
.cal-hd{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--bd);background:var(--lg);}
.cal-t{font-size:13px;font-weight:700;color:var(--dk);}
.cal-b{background:#fff;border:1px solid var(--bd);padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;}
.cal-slots{padding:0;}
.cal-slot{display:grid;grid-template-columns:52px 1fr;border-bottom:1px solid #f1f5f9;}
.cal-time{padding:8px 6px;text-align:center;font-size:10px;color:#94a3b8;border-right:1px solid #f1f5f9;}
.cal-events{padding:4px 8px;min-height:44px;}
.cal-ev{display:block;padding:4px 8px;border-radius:6px;font-size:11px;font-weight:600;margin-bottom:3px;cursor:pointer;}
.cal-ev.ok{background:#E2F2E8;color:var(--gn);}
.cal-ev.pend{background:#FFF7ED;color:var(--or);}
.cal-ev.def{background:#EFF6FF;color:var(--blue);}
.cal-noev{text-align:center;padding:24px;color:#94a3b8;font-size:12px;}

/* Monthly Calendar */
.cal-month-grid{display:grid;grid-template-columns:repeat(7,1fr);border-left:1px solid var(--bd);border-top:1px solid var(--bd);}
.cal-month-dow{padding:7px 4px;text-align:center;font-size:10px;font-weight:700;color:#64748b;background:var(--lg);border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);text-transform:uppercase;letter-spacing:.4px;}
.cal-day-cell{min-height:110px;padding:4px;border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);background:#fff;vertical-align:top;position:relative;}
.cal-day-cell.other-month{background:#fafafa;}
.cal-day-cell.today{background:#EFF6FF;}
.cal-day-num{font-size:11px;font-weight:700;color:var(--dk);display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;margin-bottom:3px;}
.cal-day-cell.today .cal-day-num{background:var(--dk);color:#fff;}
.cal-day-cell.other-month .cal-day-num{color:#c0c0c0;}
.cal-ev-chip{display:block;padding:2px 5px;border-radius:4px;font-size:10px;font-weight:600;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:default;line-height:1.5;}
.cal-ev-more{font-size:9px;font-weight:700;color:#94a3b8;padding:1px 4px;cursor:default;}

/* Kanban */
.kanban-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;}
.kanban-col{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:8px;}
.kanban-col-hd{font-size:11px;font-weight:700;padding:4px 4px 8px;border-bottom:1px solid var(--bd);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.kanban-cnt{font-size:10px;font-weight:700;background:var(--lg);border-radius:10px;padding:1px 7px;}
.lead-card{margin-bottom:6px;padding:6px 8px;border-left:4px solid var(--or);background:#f8fafc;border-radius:6px;font-size:12px;}
.lead-card .lc-name{font-weight:700;color:var(--dk);margin-bottom:2px;}
.lead-card .lc-meta{font-size:10px;color:#94a3b8;}
@media(max-width:768px){.kanban-grid{grid-template-columns:repeat(2,minmax(0,1fr));}}
@media(max-width:480px){.kanban-grid{grid-template-columns:repeat(1,minmax(0,1fr));}}

/* Recruit Kanban */
.rec-kanban-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px;margin-top:12px;}
.rec-col{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:8px;min-height:200px;}
.rec-col-hd{font-size:11px;font-weight:700;padding:4px 4px 8px;border-bottom:1px solid var(--bd);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.rec-card{margin-bottom:6px;padding:8px 10px;border-radius:8px;font-size:12px;cursor:grab;border:1px solid transparent;}
.rec-card.bg-gray{background:#f1f5f9;border-color:#e2e8f0;color:#475569;}
.rec-card.bg-blue{background:#dbeafe;border-color:#93c5fd;color:#1e40af;}
.rec-card.bg-orange{background:#fff7ed;border-color:#fdba74;color:#c2410c;}
.rec-card.bg-green{background:#dcfce7;border-color:#86efac;color:#15803d;}
.rec-card .rc-name{font-weight:700;margin-bottom:2px;}
.rec-card .rc-meta{font-size:10px;opacity:.75;}
@media(max-width:768px){.rec-kanban-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:480px){.rec-kanban-grid{grid-template-columns:1fr;}}

/* Match Score */
.ms-high{color:var(--gn);font-weight:700;}
.ms-mid{color:var(--or);font-weight:700;}
.ms-low{color:#999;font-weight:700;}

/* Dash */
.kpi-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));}
.kpi-card{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:12px;text-align:center;}
.kpi-card .kc-val{font-size:22px;font-weight:800;color:var(--dk);margin:6px 0 2px;}
.kpi-card .kc-lbl{font-size:11px;color:#94a3b8;font-weight:600;}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px;}
@media(max-width:768px){.dash-grid{grid-template-columns:1fr;}}

/* WA */
.wa-link{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:#25D366;border-radius:50%;color:#fff;font-size:11px;text-decoration:none;margin-right:3px;flex-shrink:0;}

/* Recruiting layout */
.rec-lay{display:grid;grid-template-columns:1fr 320px;gap:16px;}
@media(max-width:900px){.rec-lay{grid-template-columns:1fr;}}

/* Two col */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:800px){.two-col{grid-template-columns:1fr;}}
.col-box{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:16px;}
.col-box h2{font-size:13px;font-weight:700;color:var(--dk);margin-bottom:12px;}

/* Progress bars */
.pi2{margin-bottom:10px;}
.pl{display:flex;justify-content:space-between;margin-bottom:3px;}
.pn{font-size:12px;font-weight:600;color:var(--dk);}
.pv{font-size:11px;color:#666;}
.pb2{background:#f0f0f0;border-radius:6px;height:8px;overflow:hidden;}
.pf{height:100%;border-radius:6px;transition:width .4s;}

/* Grid cards (legacy) */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px;}
.card{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:14px;}
.card h3{font-size:10px;color:#999;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
.cs{font-size:24px;font-weight:800;color:var(--dk);}
.card.red .cs{color:var(--red);}
.card.green .cs{color:var(--gn);}
.card.orange .cs{color:var(--or);}
.card.blue .cs{color:var(--blue);}

/* Responsive */
@media(max-width:768px){
  :root{--sidebar:0px;}
  .sidebar{position:fixed;top:var(--header);left:0;height:calc(100vh - var(--header));z-index:200;transform:translateX(-100%);transition:transform .25s;background:#fff;width:220px !important;box-shadow:4px 0 16px rgba(0,0,0,.1);}
  .sidebar.open{transform:translateX(0);}
  #hamburger{display:inline-flex !important;}
  .main-ct{padding:12px;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .fg{grid-template-columns:1fr;}
  .tw{overflow-x:auto;}
  .tw table{min-width:640px;}
  .hd{padding:0 12px;}
  .hl{font-size:14px;}
  .rec-lay{grid-template-columns:1fr;}
  .two-col{grid-template-columns:1fr;}
  .pi{width:80%;margin:0 auto;}
  .pb{padding:24px 20px;}

// GAUGE
function gauge(pct,lbl){
  const r=55,cx=65,cy=65,sw=13;
  const ra=a=>a*Math.PI/180;
  const x1=cx+r*Math.cos(ra(-180)),y1=cy+r*Math.sin(ra(-180));
  const x2=cx+r*Math.cos(ra(0)),y2=cy+r*Math.sin(ra(0));
  const a=-180+pct*1.8;const ax=cx+r*Math.cos(ra(a)),ay=cy+r*Math.sin(ra(a));
  const col=pct<30?'#DC1C2E':pct<60?'#C9821A':'#1C8C4B';
  return`<div class="gauge-w"><svg viewBox="0 0 130 75" style="width:130px;height:75px">
    <path d="M${x1},${y1} A${r},${r} 0 0,1 ${x2},${y2}" fill="none" stroke="#f0f0f0" stroke-width="${sw}" stroke-linecap="round"/>
    <path d="M${x1},${y1} A${r},${r} 0 0,1 ${ax},${ay}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-linecap="round"/>
    <text x="${cx}" y="${cy-2}" text-anchor="middle" font-size="16" font-weight="800" fill="${col}">${pct}%</text>
    <text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="8" fill="#999">${lbl}</text>
  </svg></div>`;
}

function progBar(nm,v,mx,col){
  const p=mx>0?Math.round(v/mx*100):0;
  return`<div class="pi2"><div class="pl"><span class="pn">${nm}</span><span class="pv">${v}/${mx} (${p}%)</span></div><div class="pb2"><div class="pf" style="width:${p}%;background:${col}"></div></div></div>`;
}

function rOzet(c){
  const toStr=td();
  const d30s=dateFrom();
  const d7=new Date();d7.setDate(d7.getDate()-7);const d7s=d7.toISOString().split('T')[0];

  const todayTakip=D.leads.filter(l=>l.sonraki_takip===toStr);
  const geciken=D.leads.filter(l=>l.sonraki_takip&&l.sonraki_takip<toStr&&!['Kazanıldı','Kaybedildi','Kara Liste'].includes(l.durum));
  const bugunRandevu=D.rec.filter(r=>r.randevu_tarihi===toStr);
  const ayL=D.leads.filter(l=>(l.tarih||'')>=d30s);
  const sicak=ayL.filter(l=>l.durum==='Sıcak');
  const kazanilan=ayL.filter(l=>l.durum==='Kazanıldı');
  const donusum=ayL.length>0?Math.round(kazanilan.length/ayL.length*100):0;

  const danMap={};
  ayL.forEach(l=>{
    if(!l.danisman)return;
    if(!danMap[l.danisman])danMap[l.danisman]={ad:l.danisman,lead:0,kazan:0,aktif:0,son:''};
    danMap[l.danisman].lead++;
    if(l.durum==='Kazanıldı')danMap[l.danisman].kazan++;
    if(!['Kazanıldı','Kaybedildi','Kara Liste'].includes(l.durum))danMap[l.danisman].aktif++;
    if((l.tarih||'')>danMap[l.danisman].son)danMap[l.danisman].son=l.tarih;
  });
  const dans=Object.values(danMap).sort((a,b)=>b.lead-a.lead);

  const srcMap={};
  ayL.forEach(l=>{const k=l.kaynak||'?';if(!srcMap[k])srcMap[k]={t:0,k:0};srcMap[k].t++;if(l.durum==='Kazanıldı')srcMap[k].k++;});

  const yak=D.rec.filter(r=>r.randevu_tarihi>=toStr).sort((a,b)=>(a.randevu_tarihi+(a.randevu_saati||'')).localeCompare(b.randevu_tarihi+(b.randevu_saati||''))).slice(0,6);

    {l:'Lead',v:ayL.length},

  h+='<div><div style="font-size:20px;font-weight:800;color:#0f172a">Yönetim Kokpiti</div>';
  h+='<div style="font-size:12px;color:#94a3b8;margin-top:2px">'+new Date().toLocaleDateString('tr-TR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+'</div></div>';
  if(aiParts.length){
    h+='<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:8px 14px;font-size:11px;color:#475569;max-width:360px;text-align:right">';
    h+='<span style="color:#003DA5;font-weight:700">● </span>'+aiParts.join(' · ')+'</div>';
  }
  h+='</div>';

  // 4 Ana KPI
  h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px">';

    {icon:'📥',val:ayL.length,lbl:'Bu Dönem Lead',sub:geciken.length?'⚠ '+geciken.length+' gecikmiş':'✓ Takip güncel',subc:geciken.length?'#DC1C2E':'#1C8C4B',ac:'#003DA5'},

  ];
  kpis.forEach(k=>{
    h+='<div style="background:#fff;border-radius:16px;'+sh+';padding:20px;position:relative;overflow:hidden">';

function toast(msg,ok){
  const t=document.createElement('div');
  t.textContent=msg;
  t.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:'+(ok===false?'var(--red)':'var(--dk)')+';color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:600;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.2)';

function initKanbanDD(){
  if(typeof Sortable==='undefined')return;
  ['yeni','sicak','randevu','kazanildi'].forEach(colId=>{
    const el=document.getElementById('col-'+colId);
    if(!el)return;
    new Sortable(el,{
      group:'kanban',
      animation:150,
      filter:'.btn',          // edit butonuna tıklamayı engelle
      preventOnFilter:false,
      onEnd:async ev=>{
        const id=ev.item.dataset.id;
        const yeni=ev.to.dataset.col;
        const eski=ev.from.dataset.col;
        if(!id||yeni===eski)return;
        try{
          await api('gd_leads','PATCH',{durum:yeni},'id=eq.'+id);
          const l=D.leads.find(x=>x.id===id);
          if(l)l.durum=yeni;
          toast('✅ '+yeni);
        }catch(e){
          ev.from.insertBefore(ev.item,ev.from.children[ev.oldIndex]||null);
          toast('Kaydedilemedi',false);
        }
      }
    });
  });
}

function rKanbanHTML(leads,isA){
  const cols=[
    {lbl:'🆕 Yeni',     colId:'yeni',     color:'#64748b',    durumlar:['Arandı','Çağrıldı','Soğuk'],             durum:'Arandı'},
    {lbl:'🔥 Sıcak',    colId:'sicak',    color:'var(--or)',  durumlar:['Sıcak','Görüşüldü'],                     durum:'Sıcak'},
    {lbl:'📅 Randevu',  colId:'randevu',  color:'var(--blue)',durumlar:['Randevu','1. Görüşme','2. Görüşme'],     durum:'Randevu'},
    {lbl:'✅ Kazanıldı',colId:'kazanildi',color:'var(--gn)',  durumlar:['Kazanıldı'],                             durum:'Kazanıldı'},
  ];
  let h='<div class="kanban-grid">';
  cols.forEach(col=>{
    const cards=leads.filter(l=>col.durumlar.includes(l.durum));
    h+='<div class="kanban-col" id="col-'+col.colId+'" data-col="'+col.durum+'">';
    h+='<div class="kanban-col-hd" style="color:'+col.color+'">'+col.lbl+'<span class="kanban-cnt">'+cards.length+'</span></div>';
    if(!cards.length){
      h+='<div style="text-align:center;padding:16px 0;font-size:11px;color:#ccc">Kayıt yok</div>';
    }else{
      cards.forEach(l=>{
        h+='<div class="lead-card" data-id="'+l.id+'" style="border-left-color:'+col.color+';cursor:grab">';
        h+='<div class="lc-name">'+wa(l.telefon)+(l.ad||'—')+'</div>';
        h+='<div class="lc-meta">'+(l.kaynak||'—')+(l.danisman?' · '+l.danisman:'')+(l.sonraki_takip?' · 📅'+l.sonraki_takip:'')+'</div>';
        if(isA)h+='<div style="margin-top:4px"><button class="btn btn-xs btn-g" onclick="doE(\'gd_leads\',\''+l.id+'\')">✏️</button></div>';
        h+='</div>';
      });
    }
    h+='</div>';
  });
  h+='</div>';
  window.ddInit=false; // reset so initKanbanDD runs after each render
  setTimeout(()=>{if(!window.ddInit){initKanbanDD();window.ddInit=true;}},50);
  return h;
}

function clearPFFilter(){
  ['sa','sd','sdn','pf_d1','pf_d2','flt-m2min','flt-m2max','flt-fmin','flt-fmax'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  fL();

function fL(){
  const a=(document.getElementById('sa')||{value:''}).value.toLowerCase();
  const d=(document.getElementById('sd')||{value:''}).value;
  const dn=(document.getElementById('sdn')||{value:''}).value;
  const d1=(document.getElementById('pf_d1')||{value:''}).value;
  const d2=(document.getElementById('pf_d2')||{value:''}).value;
  const m2Min=+(document.getElementById('flt-m2min')||{value:''}).value||null;
  const m2Max=+(document.getElementById('flt-m2max')||{value:''}).value||null;
  const fMin=+(document.getElementById('flt-fmin')||{value:''}).value||null;
  const fMax=+(document.getElementById('flt-fmax')||{value:''}).value||null;
  const f=D.leads.filter(l=>{
    if(!(!a||(l.ad||'').toLowerCase().includes(a)||(l.telefon||'').includes(a)))return false;
    if(!(!d||l.durum===d))return false;
    if(!(!dn||l.danisman===dn))return false;
    if(!(!d1||l.tarih>=d1))return false;
    if(!(!d2||l.tarih<=d2))return false;
    if(m2Min&&+l.m2<m2Min)return false;
    if(m2Max&&+l.m2>m2Max)return false;
    const fiyat=parseFloat((l.fiyat||'').toString().replace(/[^\d.]/g,''));
    if(fMin&&fiyat<fMin)return false;
    if(fMax&&fiyat>fMax)return false;
    return true;
  });
  const b=document.getElementById('lB');if(b)b.innerHTML=lRows(f);
}

function lRows(list){
  return list.map(l=>{
    const tlC=D.timeline.filter(t=>t.kayit_id===l.id).length;
    return '<tr>'
      +'<td>'+(l.tarih||'—')+'</td>'
      +'<td><strong>'+(l.ad||'')+'</strong></td>'
      +'<td style="white-space:nowrap">'+wa(l.telefon)+(l.telefon||'')+'</td>'
      +'<td>'+(l.kaynak||'—')+'</td>'
      +'<td>'+badge(l.durum)+'</td>'
      +'<td>'+(l.danisman?'<span style="background:#E2F2E8;color:var(--gn);padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700">'+l.danisman+'</span>':'<span style="color:#ccc;font-size:11px">—</span>')+'</td>'
      +'<td><button class="btn btn-sm" style="background:#EDE9FE;color:#5b21b6;border:none;border-radius:6px;padding:3px 8px;font-size:11px" onclick="showTL(\''+l.id+'\',\'lead\',this)">📋'+(tlC?' <b>'+tlC+'</b>':'')+'</button></td>'
      +('<td style="display:flex;gap:3px"><button class="btn btn-sm btn-g" onclick="doE(\'gd_leads\',\''+l.id+'\')" title="Düzenle">✏️</button>'+(CU.role==='admin'?'<button class="btn btn-sm btn-r" onclick="delLead(\''+l.id+'\')">🗑</button>':'')+'</td>')
      +'</tr>';
  }).join('');
}

async function svTimeline(kayitId,kayitTipi){
  const inp=document.getElementById('tl_inp_'+kayitId);
  const msg=document.getElementById('tl_msg_'+kayitId);
  if(!inp)return;
  const mesaj=inp.value.trim();
  if(!mesaj){if(msg)msg.innerHTML='<div class="err-m">Not boş olamaz!</div>';return;}
  const yapan=CU.danAd||CU.name||'Kullanıcı';
  try{
    await api('timeline','POST',{kayit_id:kayitId,kayit_tipi:kayitTipi,mesaj:mesaj,yapan:yapan});
    inp.value='';
    if(msg){msg.innerHTML='<div class="ok-m">✅ Eklendi!</div>';setTimeout(()=>{msg.innerHTML='';},2000);}
    await load();
    const cont=document.getElementById('tl_cont_'+kayitId);
    if(cont){
      const notlar=D.timeline.filter(t=>t.kayit_id===kayitId);
      let nl='';
      notlar.forEach(t=>{
        const dt=new Date(t.created_at);
        const tarih=dt.toLocaleDateString('tr-TR',{day:'numeric',month:'short'});
        const saat=dt.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
        nl+='<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f0e8ff"><div style="flex-shrink:0;min-width:65px;text-align:right"><div style="font-size:10px;font-weight:700;color:var(--dk)">'+tarih+'</div><div style="font-size:9px;color:#999">'+saat+'</div></div><div style="flex:1"><div style="font-size:12px">'+t.mesaj+'</div><div style="font-size:10px;color:#bbb">'+(t.yapan||'—')+'</div></div></div>';
      });
      cont.innerHTML=nl||'<div style="color:#ccc;font-size:11px;padding:4px">Henüz not yok</div>';
    }
  }catch(e){if(msg)msg.innerHTML='<div class="err-m">❌ '+e.message+'</div>';}
}

function fmtFiyat(val){
  if(!val&&val!==0)return'—';
  const n=parseFloat(val.toString().replace(/[^\d.]/g,''));
  if(isNaN(n)||n===0)return val||'—';
  return n.toLocaleString('tr-TR',{maximumFractionDigits:0})+' ₺';
}

function fmtInput(el){
  // Sadece rakam kalsın, format gösterimi için blur'da yapılır
  el.value=el.value.replace(/[^\d]/g,'');
}

// --- TAKVİM HELPER ---
function normalizeAssigned(val){
  if(!val)return[];
  if(Array.isArray(val))return val.map(s=>String(s).trim().toLowerCase());
  if(typeof val==='string'){
    const v=val.trim();
    if(!v)return[];
    // JSON array string: ["Ad Soyad", ...]
    if(v.startsWith('[')){try{const p=JSON.parse(v);if(Array.isArray(p))return p.map(s=>String(s).trim().toLowerCase());}catch(x){}}
    // Virgüllü string: "Ad Soyad, Ad Soyad2"
    return v.split(',').map(s=>s.trim().toLowerCase()).filter(Boolean);
  }
  return[];
}
function isAssignedToCurrentUser(etk){
  const name=(CU.danAd||CU.name||'').trim().toLowerCase();
  if(!name)return false;
  return normalizeAssigned(etk.atanan_danismanlar).includes(name);
}

// --- TAKVİM (aylık grid) ---
function rTakvim(c){
  const isY=CU.role==='ofis'||CU.role==='admin';
  if(!window._calDt2)window._calDt2=new Date();
  const cur=new Date(window._calDt2);
  const toStr=td();
  const aktifFiltre=window._calFiltre||'tumu';

  // Ay başı ve sonu
  const ayBaslangic=new Date(cur.getFullYear(),cur.getMonth(),1);
  const ayBitis=new Date(cur.getFullYear(),cur.getMonth()+1,0);
  const ayLbl=cur.toLocaleDateString('tr-TR',{month:'long',year:'numeric'});

  // Grid başlangıcı: Pazartesi hizalı
  const ilkGunHaftaIci=ayBaslangic.getDay()===0?6:ayBaslangic.getDay()-1;
  const gridBaslangic=new Date(ayBaslangic);gridBaslangic.setDate(1-ilkGunHaftaIci);

  // Grid hücreleri: 6 hafta × 7 gün = 42 hücre
  const cells=[];
  for(let i=0;i<42;i++){const d=new Date(gridBaslangic);d.setDate(gridBaslangic.getDate()+i);cells.push(d);}

  const turR={'toplantı':'#003DA5','eğitim':'#1C8C4B','tapu':'#C9821A','randevu':'#5b21b6','etkinlik':'#0891b2','nöbet':'#DC1C2E','recruiting':'#0f766e'};
  const turI={'toplantı':'🤝','eğitim':'📚','tapu':'📋','randevu':'📞','etkinlik':'🎯','nöbet':'🔰','recruiting':'👤'};

  // ── Üst başlık ──
  let h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px">';
  h+='<div style="display:flex;gap:6px;align-items:center">';
  h+='<button class="btn btn-g btn-sm" onclick="chCal2(-1)">◀</button>';
  h+='<span style="font-size:15px;font-weight:800;color:var(--dk);min-width:160px;text-align:center">'+ayLbl+'</span>';
  h+='<button class="btn btn-g btn-sm" onclick="chCal2(1)">▶</button>';
  h+='<button class="btn btn-g btn-sm" onclick="goToday2()">Bugün</button></div>';
  if(isY)h+='<button class="btn btn-p btn-sm" onclick="document.getElementById(\'ef\').classList.toggle(\'hidden\')">+ Etkinlik</button>';
  h+='</div>';

  // ── Filtre butonları ──
  const filtreler=[{id:'tumu',l:'Tümü'},{id:'benim',l:'Benim'},{id:'eğitim',l:'Eğitim'},{id:'tapu',l:'Tapu'},{id:'toplantı',l:'Toplantı'},{id:'recruiting',l:'Recruiting'}];
  h+='<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">';
  filtreler.forEach(f=>{h+='<button class="btn btn-sm '+(aktifFiltre===f.id?'btn-p':'btn-g')+'" onclick="setCalFiltre(\''+f.id+'\')">'+f.l+'</button>';});
  h+='</div>';

  // ── Etkinlik ekleme formu (sadece admin/ofis) ──
  if(isY){
    const dO=D.dans.map(d=>'<option value="'+d.ad+'">'+d.ad+'</option>').join('');
    h+='<div id="ef" class="hidden fw" style="margin-bottom:12px"><h3>Yeni Etkinlik</h3><div class="fg">';
    h+='<div class="fgr"><label>Başlık *</label><input id="ef_b" placeholder="Etkinlik başlığı"/></div>';
    h+='<div class="fgr"><label>Tür</label><select id="ef_t"><option>toplantı</option><option>eğitim</option><option>tapu</option><option>randevu</option><option>etkinlik</option><option>nöbet</option></select></div>';
    h+='<div class="fgr"><label>Tarih</label><input type="date" id="ef_d" value="'+toStr+'"/></div>';
    h+='<div class="fgr"><label>Başlangıç</label><input type="time" id="ef_s"/></div>';
    h+='<div class="fgr"><label>Bitiş</label><input type="time" id="ef_e"/></div>';
    h+='<div class="fgr"><label>Hedef</label><select id="ef_h" onchange="document.getElementById(\'ef_ds\').classList.toggle(\'hidden\',this.value!==\'secili\')"><option value="tum_ofis">Tüm Ofis</option><option value="secili">Seçili Danışmanlar</option></select></div></div>';
    h+='<div id="ef_ds" class="hidden" style="margin:8px 0;display:flex;flex-wrap:wrap;gap:8px">'+D.dans.map(d=>'<label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer"><input type="checkbox" value="'+d.ad+'" class="dcb"/> '+d.ad+'</label>').join('')+'</div>';
    h+='<div class="fgr"><label>Açıklama</label><textarea id="ef_a" placeholder="Detay..."></textarea></div>';
    h+='<div class="fa"><button class="btn btn-p" onclick="svEtkinlik()">Kaydet</button><button class="btn btn-g" onclick="document.getElementById(\'ef\').classList.add(\'hidden\')">İptal</button></div><div id="ef_m"></div></div>';
  }

  // ── Aylık grid ──
  h+='<div style="background:white;border:1px solid var(--bd);border-radius:12px;overflow:hidden">';

  // Gün başlıkları
  h+='<div class="cal-month-grid">';
  ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'].forEach(g=>{h+='<div class="cal-month-dow">'+g+'</div>';});

  // Hücreler
  cells.forEach(d=>{
    const ds=d.toISOString().split('T')[0];
    const buAy=d.getMonth()===cur.getMonth();
    const isToday=ds===toStr;
    const cls='cal-day-cell'+(buAy?'':' other-month')+(isToday?' today':'');

    // Bu güne ait etkinlikleri topla ve filtrele
    let evs=D.etkinlikler.filter(e=>{
      if(e.tarih!==ds)return false;
      if(aktifFiltre==='benim'){
        if(e.hedef==='secili')return isAssignedToCurrentUser(e);
        return true;
      }
      if(aktifFiltre!=='tumu'&&aktifFiltre!=='recruiting'&&e.tur!==aktifFiltre)return false;
      if(e.hedef==='secili')return isY||isAssignedToCurrentUser(e);
      return true;
    }).sort((a,b)=>(a.saat||'').localeCompare(b.saat||''));

    // Recruiting randevularını ekle
    if(aktifFiltre==='tumu'||aktifFiltre==='recruiting'){
      D.rec.filter(r=>r.randevu_tarihi===ds).forEach(r=>{
        evs.push({id:r.id,baslik:r.ad,tur:'recruiting',saat:r.randevu_saati||null,_tip:'rec'});
      });
    }

    h+='<div class="'+cls+'">';
    h+='<div class="cal-day-num">'+d.getDate()+'</div>';

    // İlk 3 etkinlik göster
    const limit=3;
    evs.slice(0,limit).forEach(e=>{
      const rk=turR[e.tur]||'#666';
      const ic=turI[e.tur]||'📌';
      const saat=e.saat?(e.saat.slice(0,5)+' '):'';
      h+='<span class="cal-ev-chip" style="background:'+rk+'18;color:'+rk+';border-left:2px solid '+rk+'" title="'+e.baslik+(e.saat?' — '+e.saat.slice(0,5):'')+'">'+ic+' '+saat+e.baslik+'</span>';
    });
    if(evs.length>limit){
      h+='<span class="cal-ev-more">+'+(evs.length-limit)+' daha</span>';
    }

    h+='</div>';
  });

  h+='</div></div>';
  c.innerHTML=h;
}

// --- EŞLEŞME SKORU ---
function matchScore(pf, a){
  let s=0;
  // m² ±%10 → 20p
  const pm=parseFloat(pf.m2),am=parseFloat(a.m2);
  if(pm&&am&&Math.abs(pm-am)/am<=0.10)s+=20;
  // Fiyat ±%15 → 20p
  const pf2=parseFloat((pf.fiyat||'').replace(/[^\d.]/g,'')),af=parseFloat((a.fiyat||'').replace(/[^\d.]/g,''));
  if(pf2&&af&&Math.abs(pf2-af)/af<=0.15)s+=20;
  // İşlem türü tam eşleşme → 15p
  if(pf.islem&&a.islem&&pf.islem===a.islem)s+=15;
  // Tip tam eşleşme → 15p
  if(pf.tip&&a.tip&&pf.tip===a.tip)s+=15;
  // İl tam eşleşme → 15p
  if(pf.il&&a.il&&pf.il===a.il)s+=15;
  // İlçe tam eşleşme → 15p
  if(pf.ilce&&a.ilce&&pf.ilce.trim().toLowerCase()===a.ilce.trim().toLowerCase())s+=15;
  return Math.min(s,100);
}
function msClass(s){return s>=70?'ms-high':s>=40?'ms-mid':'ms-low';}
function msChip(s){return'<span class="'+msClass(s)+'">%'+s+'</span>';}

function filterGT(){
  const q=(document.getElementById('gt_s')||{value:''}).value.toLowerCase();

}

function expLogCSV(){

  let csv=keys.join(',')+'\n';
  D.log.forEach(r=>{csv+=keys.map(k=>'"'+(r[k]||'').toString().replace(/"/g,'""')+'"').join(',')+'\n';});

  h+=D.dans.map(d=>{

    const link='https://www.remaxlavanda.com.tr/panel?token='+d.token;
    return'<tr>'
      +'<td><strong>'+d.ad+'</strong></td>'
      +'<td>'+(CU.role==="admin"?'<code>'+(d.pin||'—')+'</code>':'<span style="color:#ccc">***</span>')+'</td>'
      +'<td><span class="tok">'+link.replace('https://','')+'</span> <button class="btn btn-sm btn-g" onclick="cpL(\''+link+'\')">📋</button></td>'
      +'<td>'+ml.length+'</td>'
      +'<td>'+w+'</td>'
      +'<td>'+(ml.length>0?Math.round(w/ml.length*100):0)+'%</td>'
      +'<td><button class="btn btn-sm btn-r" onclick="delDan(\''+d.id+'\',\''+d.ad+'\')">🗑</button></td>'
      +'</tr>';
  }).join('');
  h+='</tbody></table></div>';
  c.innerHTML=h;
}

function sDanF(){document.getElementById('danfw').classList.remove('hidden');}
function hDanF(){document.getElementById('danfw').classList.add('hidden');}

async function svDan(){
  const ad=cap(document.getElementById('f_dan_ad').value.trim());
  const pin=document.getElementById('f_dan_pin').value.trim();
  if(!ad||!pin||pin.length!==4){document.getElementById('qdm').innerHTML='<div class="err-m">Ad ve 4 haneli PIN zorunlu!</div>';return;}
  try{
    await api('danismanlar','POST',{ad:ad,token:gTok(),pin:pin});
    document.getElementById('qdm').innerHTML='<div class="ok-m">✅ '+ad+' eklendi!</div>';
    await load();
    setTimeout(()=>{hDanF();rDans(document.getElementById('ct'));},1000);
  }catch(e){document.getElementById('qdm').innerHTML='<div class="err-m">❌ '+e.message+'</div>';}
}

async function delDan(id,ad){
  if(!confirm(ad+' danışmanı silinsin mi?'))return;
  try{await api('danismanlar','DELETE',null,'id=eq.'+id);await load();rDans(document.getElementById('ct'));}
  catch(e){alert('Hata: '+e.message);}
}

let _chartSource=null, _chartDaily=null;

function renderSourceChart(canvasId){
  const d30=new Date();d30.setDate(d30.getDate()-30);
  const d30s=d30.toISOString().split('T')[0];
  const ayL=D.leads.filter(l=>l.tarih>=d30s);

  const srcMap={};
  ayL.forEach(l=>{const k=l.kaynak||'Diğer';srcMap[k]=(srcMap[k]||0)+1;});

  const labels=Object.keys(srcMap);
  const data=Object.values(srcMap);

  if(!labels.length){
    const cv=document.getElementById(canvasId);
    if(cv)cv.parentElement.innerHTML+='<div style="text-align:center;padding:20px;color:#94a3b8;font-size:12px">Son 30 günde veri yok</div>';
    return;
  }

  const colors=['#DC1C2E','#003DA5','#0C2749','#1C8C4B','#C9821A','#5b21b6','#0891b2','#64748b'];

  const cv=document.getElementById(canvasId);
  if(!cv)return;
  if(_chartSource){_chartSource.destroy();_chartSource=null;}

  _chartSource=new Chart(cv,{
    type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:colors.slice(0,labels.length),borderWidth:2,borderColor:'#fff'}]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'right',labels:{font:{size:11},padding:10}},tooltip:{callbacks:{label:ctx=>ctx.label+': '+ctx.raw+' lead'}}},
      cutout:'65%'
    }
  });
}

function renderDailyChart(canvasId){
  const d30=new Date();d30.setDate(d30.getDate()-30);
  const days={};
  for(let i=29;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days[d.toISOString().split('T')[0]]=0;}

  D.leads.forEach(l=>{
    const dk=(l.created_at||l.tarih||'').slice(0,10);
    if(days[dk]!==undefined)days[dk]++;
  });

  const labels=Object.keys(days).map(d=>{const dt=new Date(d);return(dt.getMonth()+1)+'/'+dt.getDate();});
  const data=Object.values(days);

  const cv=document.getElementById(canvasId);
  if(!cv)return;
  if(_chartDaily){_chartDaily.destroy();_chartDaily=null;}

  _chartDaily=new Chart(cv,{
    type:'line',
    data:{labels,datasets:[{label:'Günlük Lead',data,borderColor:'#003DA5',backgroundColor:'rgba(0,61,165,0.08)',borderWidth:2,tension:0.4,pointRadius:2,fill:true}]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{x:{ticks:{font:{size:9},maxTicksLimit:10}},y:{ticks:{font:{size:10},stepSize:1},beginAtZero:true}}
    }
  });
}

// ── ÖZET PANELİ (rDash) ──
function rDash(c){
  // Önce Özet içeriğini render et
  rOzet(c);

  // Sonra Panel içeriğini altına ekle
  const p=D.disPortfolyo||[];
  const leads=D.leads||[];
  const curMonth=new Date().toISOString().slice(0,7);
  const kazanilan=leads.filter(l=>l.durum==='Kazanıldı'&&(l.tarih||'').startsWith(curMonth));
  const gelir=kazanilan.reduce((s,l)=>s+parseFloat((l.fiyat||'0').toString().replace(/[^\d.]/g,'')||0),0);
  const fmt=n=>n>=1000000?(n/1000000).toFixed(1)+'M':n>=1000?(n/1000).toFixed(0)+'K':n.toString();

  let h='<div style="margin-top:20px;padding-top:16px;border-top:2px solid var(--bd)">';
  h+='<div style="font-size:13px;font-weight:700;color:var(--dk);margin-bottom:12px">🏘️ Portföy Analizi</div>';

  // Portföy KPI
  h+=metricsGrid([
    {lbl:'Harici Portföy',val:p.length},
    {lbl:'Aktif Lead',val:leads.filter(l=>!['Kazanıldı','Kaybedildi','Kara Liste'].includes(l.durum)).length},
    {lbl:'Bu Ay Kapanan',val:kazanilan.length},
    {lbl:'Bu Ay Gelir',val:gelir?fmt(gelir)+' ₺':'—'},
  ]);

  // Recruiting KPI
  const rcData=D.rc||[];
  const rcAy=td().slice(0,7);
  const rcTotal=rcData.length;
  const rcBuAy=rcData.filter(r=>(r.created_at||'').slice(0,7)===rcAy).length;
  const rcGorusme=rcData.filter(r=>['Ön Görüşme','Ofis Tanıtımı'].includes(r.durum)).length;
  const rcDevam=rcData.filter(r=>!['Başladı','İlk 30 Gün','Olumsuz','Kara Liste'].includes(r.durum)).length;
  const rcBasladi=rcData.filter(r=>['Başladı','İlk 30 Gün'].includes(r.durum)).length;
  const rcDonusum=rcTotal>0?Math.round(rcBasladi/rcTotal*100):0;
  const rcOrtGun=rcBasladi>0?Math.round(rcData.filter(r=>r.durum==='Başladı'&&r.baslangic_tarihi).reduce((s,r)=>s+rcGunFark(r.created_at),0)/Math.max(1,rcData.filter(r=>r.durum==='Başladı'&&r.baslangic_tarihi).length)):0;

  h+='<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--bd)">';
  h+='<div style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">🧑‍💼 Recruiting</div>';
  h+=metricsGrid([
    {lbl:'Toplam Başvuru',val:rcTotal,c:'var(--dk)'},
    {lbl:'Bu Ay',val:rcBuAy,c:'var(--blue)'},
    {lbl:'Görüşme',val:rcGorusme,c:'var(--or)'},
    {lbl:'Devam Eden',val:rcDevam,c:'#5b21b6'},
    {lbl:'Başlayan',val:rcBasladi,c:'var(--gn)'},
    {lbl:'Dönüşüm',val:'%'+rcDonusum,c:rcDonusum>=20?'var(--gn)':rcDonusum>=10?'var(--or)':'var(--red)'},
    {lbl:'Ort. Süre',val:rcOrtGun?rcOrtGun+'g':'—',c:'#64748b'},
  ]);
  h+='</div>';

  // Grafik grid
  h+='<div class="dash-grid" style="margin-top:14px">';
  h+='<div style="background:#fff;border:1px solid var(--bd);border-radius:12px;padding:12px">';
  h+='<div style="font-size:12px;font-weight:700;color:var(--dk);margin-bottom:10px">🥧 Portföy Tip Dağılımı</div>';
  h+='<div style="height:220px;position:relative"><canvas id="dash-pie"></canvas></div></div>';
  h+='<div style="background:#fff;border:1px solid var(--bd);border-radius:12px;padding:12px">';
  h+='<div style="font-size:12px;font-weight:700;color:var(--dk);margin-bottom:10px">📊 Fiyat Bantları</div>';
  h+='<div style="height:220px;position:relative"><canvas id="dash-bar"></canvas></div></div>';
  h+='</div>';

  // Lead durum dağılımı
  const durumMap={};
  leads.forEach(l=>{const k=l.durum||'Belirsiz';durumMap[k]=(durumMap[k]||0)+1;});
  const durumlar=Object.entries(durumMap).sort((a,b)=>b[1]-a[1]);
  h+='<div style="background:#fff;border:1px solid var(--bd);border-radius:12px;padding:12px;margin-top:14px">';
  h+='<div style="font-size:12px;font-weight:700;color:var(--dk);margin-bottom:10px">📋 Lead Durum Dağılımı</div>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:8px">';
  durumlar.forEach(([k,v])=>{h+='<span style="background:var(--lg);border:1px solid var(--bd);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600">'+k+' <b style="color:var(--dk)">'+v+'</b></span>';});
  h+='</div></div>';
  h+='</div>';

  // Mevcut içeriğin sonuna ekle
  c.innerHTML+=h;
  setTimeout(()=>{piePortfoyTip(p);barFiyatBant(p);},150);
}

function metricsGrid(arr){
  return'<div class="kpi-grid">'+arr.map(m=>'<div class="kpi-card"><div class="kc-val">'+m.val+'</div><div class="kc-lbl">'+m.lbl+'</div></div>').join('')+'</div>';
}

let _chartDashPie=null,_chartDashBar=null;

function piePortfoyTip(list){
  const cv=document.getElementById('dash-pie');if(!cv)return;
  const tipMap={};
  list.forEach(p=>{const k=p.tip||'Belirsiz';tipMap[k]=(tipMap[k]||0)+1;});
  const labels=Object.keys(tipMap);
  const data=labels.map(k=>tipMap[k]);
  const colors=['#003DA5','#C9821A','#1C8C4B','#DC1C2E','#5b21b6','#0891b2','#64748b','#f59e0b'];
  if(_chartDashPie){_chartDashPie.destroy();}
  _chartDashPie=new Chart(cv,{
    type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:colors.slice(0,labels.length),borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:12}}}}
  });
}

function barFiyatBant(list){
  const cv=document.getElementById('dash-bar');if(!cv)return;
  const bands=[{lbl:'0–1M',min:0,max:1e6},{lbl:'1–3M',min:1e6,max:3e6},{lbl:'3–5M',min:3e6,max:5e6},{lbl:'5M+',min:5e6,max:Infinity}];
  const counts=bands.map(b=>list.filter(p=>{const f=parseFloat((p.fiyat||'0').toString().replace(/[^\d.]/g,''));return f>=b.min&&f<b.max;}).length);
  if(_chartDashBar){_chartDashBar.destroy();}
  _chartDashBar=new Chart(cv,{
    type:'bar',
    data:{labels:bands.map(b=>b.lbl),datasets:[{data:counts,backgroundColor:['#64748b','#C9821A','#003DA5','#1C8C4B'],borderRadius:6,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{beginAtZero:true,ticks:{stepSize:1},grid:{color:'#f0f0f0'}}}}
  });
}

const SANTRAL_KEY = 'rmx_santral_cfg';

function santralCfgLoad(){
  return JSON.parse(localStorage.getItem(SANTRAL_KEY)||'{}');
}
function santralCfgSave(cfg){
  localStorage.setItem(SANTRAL_KEY, JSON.stringify(cfg));
}

function telsamURL(action, extra={}){
  const cfg = santralCfgLoad();
  const base = (cfg.url||'http://45.10.253.211').replace(/\/+$/,'');
  const p = new URLSearchParams({username:cfg.user||'',password:cfg.pass||'',action,...extra});
  return base+'/?'+p.toString();
}

async function telsamCall(action, extra={}){
  const url = telsamURL(action, extra);
  // HTTPS sayfasından HTTP'ye istek Mixed Content engeline takılır
  // Proxy ile dene
  const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);
  const r = await fetch(proxyUrl, {signal: AbortSignal.timeout(10000)});
  if(!r.ok) throw new Error('HTTP '+r.status);
  const txt = await r.text();
  try{ return JSON.parse(txt); }catch(e){ return txt; }
}

const RC_COLS=[
  {id:'yeni-basvuru',   lbl:'🟡 Yeni Başvuru',    durum:'Yeni Başvuru',    cls:'bg-gray'},
  {id:'ilk-arama',      lbl:'📞 İlk Arama',        durum:'İlk Arama',       cls:'bg-blue'},

  {id:'ofis-tanitim',   lbl:'🏢 Ofis Tanıtımı',    durum:'Ofis Tanıtımı',   cls:'bg-orange'},
  {id:'karar-bekliyor', lbl:'⏳ Karar Bekliyor',   durum:'Karar Bekliyor',  cls:'bg-orange'},
  {id:'evrak',          lbl:'📄 Evrak',             durum:'Evrak',           cls:'bg-orange'},
  {id:'basladi',        lbl:'🚀 Başladı',           durum:'Başladı',         cls:'bg-green'},

let _rcFiltre={yonetici:'',kaynak:'',arama:''};

function rcGunFark(tarih){
  if(!tarih)return 0;
  return Math.floor((Date.now()-new Date(tarih).getTime())/86400000);
}

function rcKenarRenk(r){
  const gun=rcGunFark(r.son_islem_tarihi||r.created_at);
  if(gun<=3)return'#1C8C4B';
  if(gun<=7)return'#C9821A';
  return'#DC1C2E';
}

function rcEvrakBar(r){
  const evraklar=[
    {k:'evrak_myk',l:'MYK'},
    {k:'evrak_vergi',l:'Vergi'},
    {k:'evrak_sozlesme',l:'Sözleşme'},
  ];
  return evraklar.map(e=>'<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:'+(r[e.k]?'#dcfce7':'#f1f5f9')+';color:'+(r[e.k]?'#15803d':'#94a3b8')+'">'+e.l+'</span>').join(' ');
}

function rc30Bar(r){
  const items=[
    {k:'ilk30_portfolyo',l:'Portföy'},
    {k:'ilk30_yetki',l:'Yetki'},
    {k:'ilk30_ilan',l:'İlan'},
    {k:'ilk30_musteri',l:'Müşteri'},
    {k:'ilk30_satis',l:'Satış'},
  ];
  const done=items.filter(i=>r[i.k]).length;
  return'<div style="margin-top:4px"><div style="font-size:9px;color:#94a3b8;margin-bottom:2px">İlk 30 Gün: '+done+'/'+items.length+'</div>'
    +'<div style="background:#f1f5f9;border-radius:3px;height:4px"><div style="background:var(--gn);height:100%;width:'+(done/items.length*100)+'%;border-radius:3px"></div></div>'
    +'<div style="display:flex;gap:3px;margin-top:3px">'+items.map(i=>'<span style="font-size:9px;padding:1px 4px;border-radius:3px;background:'+(r[i.k]?'#dcfce7':'#f1f5f9')+';color:'+(r[i.k]?'#15803d':'#94a3b8')+'">'+i.l+'</span>').join('')+'</div></div>';
}

function recCard(r,cls){
  const gun=rcGunFark(r.son_islem_tarihi||r.created_at);
  const kenar=rcKenarRenk(r);
  const gunLbl=gun===0?'Bugün':gun+'g önce';
  const puan=r.aday_puani?'<span style="background:#EDE9FE;color:#5b21b6;padding:1px 5px;border-radius:8px;font-size:10px;font-weight:700">★'+r.aday_puani+'</span>':'';
  const isAdmin=CU.role==='admin'||CU.role==='ofis';

  let h='<div class="rec-card" data-id="'+r.id+'" data-durum="'+(r.durum||'')+'" style="border-left:3px solid '+kenar+';margin-bottom:8px;padding:8px 10px;background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:grab">';
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">';
  h+='<div style="font-size:12px;font-weight:700;color:var(--dk)">'+( r.ad||'—')+'</div>';
  h+=puan+'</div>';
  if(r.telefon)h+='<div style="font-size:10px;color:#64748b;margin-bottom:3px">📞 '+wa(r.telefon)+r.telefon+'</div>';
  if(r.kaynak)h+='<div style="font-size:10px;color:#94a3b8">📌 '+r.kaynak+'</div>';
  if(r.atanan_yonetici)h+='<div style="font-size:10px;color:#94a3b8">👤 '+r.atanan_yonetici+'</div>';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:5px">';
  h+='<span style="font-size:9px;color:'+(gun>7?'var(--red)':gun>3?'var(--or)':'#94a3b8')+'">⏱ '+gunLbl+'</span>';
  if(r.sonraki_aksiyon_tarihi)h+='<span style="font-size:9px;color:var(--blue)">📅 '+r.sonraki_aksiyon_tarihi+'</span>';
  h+='</div>';
  // Evrak durumu
  if(r.durum==='Evrak')h+='<div style="margin-top:5px;display:flex;gap:3px">'+rcEvrakBar(r)+'</div>';
  // İlk 30 gün
  if(r.durum==='İlk 30 Gün')h+=rc30Bar(r);
  if(isAdmin)h+='<div style="margin-top:6px;display:flex;gap:4px;align-items:center">'
    +'<select style="flex:1;padding:3px 5px;border:1px solid var(--bd);border-radius:6px;font-size:10px;color:var(--dk)" onchange="rcDurumDegistir(\''+r.id+'\',this.value)">'
    +RC_COLS.map(c=>'<option'+(r.durum===c.durum?' selected':'')+'>'+c.durum+'</option>').join('')
    +'</select>'
    +'<button class="btn btn-xs btn-g" onclick="rcDetay(\''+r.id+'\')" style="font-size:10px;padding:2px 6px">✏️</button>'
    +'<button class="btn btn-xs btn-r" onclick="softDel(\'recruiting_candidates\',\''+r.id+'\',rRecruit)" style="font-size:10px;padding:2px 6px">🗑</button>'
    +'</div>';
  h+='</div>';
  return h;
}

function rcFiltrele(){
  const ara=(document.getElementById('rc-ara')?.value||'').toLowerCase();
  const yonetici=document.getElementById('rc-f-yonetici')?.value||'';
  const kaynak=document.getElementById('rc-f-kaynak')?.value||'';
  const durum=document.getElementById('rc-f-durum')?.value||'';
  const filtered=D.rc.filter(r=>{
    if(yonetici&&r.atanan_yonetici!==yonetici)return false;
    if(kaynak&&r.kaynak!==kaynak)return false;
    if(durum&&r.durum!==durum)return false;
    if(ara&&!(
      (r.ad||'').toLowerCase().includes(ara)||
      (r.telefon||'').includes(ara)||
      (r.aciklama||'').toLowerCase().includes(ara)||
      (r.gorusme_notu||'').toLowerCase().includes(ara)
    ))return false;
    return true;
  });
  const b=document.getElementById('rc-list-body');
  if(b)b.innerHTML=rcListRows(filtered);
}

async function svRcDetay(id){
  const patch={
    ad:cap((document.getElementById('rd_ad').value||'').trim()),
    telefon:document.getElementById('rd_tel').value.trim()||null,
    durum:document.getElementById('rd_durum').value,
    kaynak:document.getElementById('rd_kaynak').value,
    atanan_yonetici:document.getElementById('rd_yonetici').value||null,
    aday_puani:parseInt(document.getElementById('rd_puan').value)||null,
    gorusme_tarihi:document.getElementById('rd_gtarih').value||null,
    sonraki_aksiyon_tarihi:document.getElementById('rd_aksiyon').value||null,
    baslangic_tarihi:document.getElementById('rd_baslangic').value||null,
    il:document.getElementById('rd_il').value||null,
    ilce:document.getElementById('rd_ilce').value.trim()||null,
    gorusme_notu:document.getElementById('rd_gnot').value.trim()||null,
    aciklama:document.getElementById('rd_not').value.trim()||null,
    son_islem_tarihi:td(),
    evrak_myk:document.getElementById('rd_evrak_myk').checked,
    evrak_vergi:document.getElementById('rd_evrak_vergi').checked,
    evrak_sozlesme:document.getElementById('rd_evrak_sozlesme').checked,
    ilk30_portfolyo:document.getElementById('rd_ilk30_portfolyo').checked,
    ilk30_yetki:document.getElementById('rd_ilk30_yetki').checked,
    ilk30_ilan:document.getElementById('rd_ilk30_ilan').checked,
    ilk30_musteri:document.getElementById('rd_ilk30_musteri').checked,
    ilk30_satis:document.getElementById('rd_ilk30_satis').checked,
  };
  try{
    await api('recruiting_candidates','PATCH',patch,'id=eq.'+id);
    const idx=D.rc.findIndex(x=>x.id===id);
    if(idx>=0)D.rc[idx]={...D.rc[idx],...patch};
    document.getElementById('rc-detay-modal').classList.remove('show');
    toast('✅ Kaydedildi');
    rRecruit(document.getElementById('ct'));
  }catch(e){document.getElementById('rd_msg').innerHTML='<div class="err-m">❌ '+e.message+'</div>';}

async function svRecAday(){
  const ad=cap((document.getElementById('rc_ad').value||'').trim());
  if(!ad){document.getElementById('rc_msg').innerHTML='<div class="err-m">Ad zorunlu!</div>';return;}
  try{
    const row=await api('recruiting_candidates','POST',{
      ad,
      telefon:document.getElementById('rc_tel').value.trim()||null,
      aciklama:document.getElementById('rc_not').value.trim()||null,
      kaynak:document.getElementById('rc-kaynak').value||null,
      gorusmeci:document.getElementById('rc-goru').value.trim()||null,
      atanan_yonetici:document.getElementById('rc-goru').value.trim()||null,
      il:document.getElementById('rc-il').value||null,
      ilce:document.getElementById('rc-ilce').value.trim()||null,
      durum:'Yeni Başvuru',
      son_islem_tarihi:td(),
    });
    const newRow=Array.isArray(row)?row[0]:row;
    if(newRow)D.rc=(D.rc||[]).concat(newRow);

    ['rc_ad','rc_tel','rc_not','rc-ilce'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});

    rRecruit(document.getElementById('ct'));

function initRecDD(){
  if(typeof Sortable==='undefined')return;
  RC_COLS.forEach(col=>{
    const el=document.getElementById('rc-col-'+col.id);
    if(!el)return;
    new Sortable(el,{
      group:'recruit',
      animation:150,
      filter:'.btn',
      onEnd:async ev=>{
        const id=ev.item.dataset.id;
        const yeni=ev.to.dataset.col;
        const eski=ev.from.dataset.col;
        if(!id||yeni===eski)return;
        try{
          await api('recruiting_candidates','PATCH',{durum:yeni,son_islem_tarihi:td()},'id=eq.'+id);
          const r=D.rc&&D.rc.find(x=>x.id===id);
          if(r){r.durum=yeni;r.son_islem_tarihi=td();}
          toast('✅ '+yeni);
        }catch(e){
          ev.from.insertBefore(ev.item,ev.from.children[ev.oldIndex]||null);
          toast('Kaydedilemedi',false);
        }
      }
    });
  });
}

// Yeni fonksiyonlar: rSkorboard, danSkor,
// rSkorDetay, svSkorDan, svDanToplanti,
// svDanEgitim, svDanMemnuniyet, svDanRekruting,

function danSkor(d){
  const ad=d.ad;
  // Toplantı disiplini %15
  const topTum=D.danToplanti.filter(t=>t.danisman_ad===ad);
  const topKatildi=topTum.filter(t=>t.durum==='Katıldı').length;
  const topPuan=topTum.length>0?Math.round(topKatildi/topTum.length*15):0;

  // Eğitim disiplini %15
  const egTum=D.danEgitim.filter(e=>e.danisman_ad===ad);
  const egBitti=egTum.filter(e=>e.durum==='Tamamlandı').length;
  const egPuan=egTum.length>0?Math.round(egBitti/egTum.length*15):0;

  // Üretim/işlem %25
  const leadler=D.leads.filter(l=>l.danisman===ad);
  const kazanilan=leadler.filter(l=>l.durum==='Kazanıldı').length;
  const uretimPuan=Math.min(Math.round(kazanilan/Math.max(leadler.length,1)*25),25);

  // Portföy %15
  const portfoy=D.disPortfolyo.filter(p=>p.danisman_ad===ad).length;
  const portfoyPuan=Math.min(portfoy*3,15);

  // Müşteri memnuniyeti/Google %15
  const mem=D.danMemnuniyet.filter(m=>m.danisman_ad===ad);
  const googleYorum=mem.filter(m=>m.google_yorum).length;
  const ortPuan=mem.length>0?mem.reduce((s,m)=>s+(m.puan||0),0)/mem.length:0;
  const memPuan=Math.min(Math.round((ortPuan/5)*10+(googleYorum*2)),15);

  // Recruiting katkısı %10
  const rek=D.danRekruting.filter(r=>r.danisman_ad===ad).length;
  const rekPuan=Math.min(rek*3,10);

  // CRM kullanım %5
  const crmIslem=D.log.filter(l=>l.yapan===ad).length;
  const crmPuan=Math.min(Math.round(crmIslem/5),5);

  const toplam=topPuan+egPuan+uretimPuan+portfoyPuan+memPuan+rekPuan+crmPuan;
  const etiket=toplam>=90?'⭐ Yıldız Danışman':toplam>=75?'💪 Güçlü Danışman':toplam>=60?'📈 Geliştirilmeli':toplam>=40?'⚠️ Riskli':'🚨 Yanlış Danışman';
  const etiketC=toplam>=90?'#1C8C4B':toplam>=75?'#003DA5':toplam>=60?'#C9821A':toplam>=40?'#DC1C2E':'#7f1d1d';

  return{toplam,etiket,etiketC,topPuan,topTum,topKatildi,egPuan,egTum,egBitti,uretimPuan,leadler,kazanilan,portfoyPuan,portfoy,memPuan,mem,googleYorum,rekPuan,rek,crmPuan};
}

async function rSkorboard(c){
  // Ofis kullanıcısı veri girişine yönlendir
  if(CU.role==='ofis'){rTakip(c);return;}

  c.innerHTML='<div style="padding:20px;text-align:center;color:#94a3b8">⏳ Yükleniyor...</div>';
  await load();

  const toStr=td();
  const sh='box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04)';

  // Yaklaşan doğum günleri
  const bugun=new Date();
  const yakinDog=D.dans.filter(d=>{
    if(!d.dogum_gunu)return false;
    const dg=new Date(d.dogum_gunu);
    const buYil=new Date(bugun.getFullYear(),dg.getMonth(),dg.getDate());
    const fark=Math.ceil((buYil-bugun)/(1000*60*60*24));
    return fark>=0&&fark<=30;
  }).sort((a,b)=>{
    const da=new Date(a.dogum_gunu),db=new Date(b.dogum_gunu);
    return new Date(bugun.getFullYear(),da.getMonth(),da.getDate())-new Date(bugun.getFullYear(),db.getMonth(),db.getDate());
  });

  let h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">';
  h+='<div><div style="font-size:20px;font-weight:800;color:#0f172a">🏆 Danışman Performans Skorboard</div>';
  h+='<div style="font-size:12px;color:#94a3b8;margin-top:2px">Tüm danışmanların 100 puanlık uygunluk değerlendirmesi</div></div>';
  h+='<button class="btn btn-p" onclick="rSkorDanEkle()">+ Veri Gir</button></div>';

  // Doğum günleri
  if(yakinDog.length){
    h+='<div style="background:linear-gradient(135deg,#5b21b6,#7c3aed);border-radius:14px;padding:14px 18px;margin-bottom:18px;color:#fff;display:flex;gap:16px;align-items:center;flex-wrap:wrap">';
    h+='<div style="font-size:20px">🎂</div>';
    h+='<div style="flex:1"><div style="font-size:11px;opacity:.7;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Yaklaşan Doğum Günleri (30 gün)</div>';
    h+='<div style="display:flex;gap:10px;flex-wrap:wrap">';
    yakinDog.forEach(d=>{
      const dg=new Date(d.dogum_gunu);
      const buYil=new Date(bugun.getFullYear(),dg.getMonth(),dg.getDate());
      const fark=Math.ceil((buYil-bugun)/(1000*60*60*24));
      h+='<span style="background:rgba(255,255,255,.15);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:600">';
      h+=d.ad+' <span style="opacity:.7">'+( fark===0?'Bugün!':fark+'g sonra')+' · '+dg.toLocaleDateString('tr-TR',{day:'numeric',month:'short'})+'</span>';
      h+='<button onclick="danIcsIndir(\''+d.ad+'\',\''+d.dogum_gunu+'\')" style="margin-left:6px;background:rgba(255,255,255,.2);border:none;border-radius:4px;padding:1px 6px;font-size:10px;cursor:pointer;color:#fff">📅</button>';
      h+='</span>';
    });
    h+='</div></div></div>';
  }

  // Danışman kartları
  h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px">';
  D.dans.forEach(d=>{
    const s=danSkor(d);
    const ilkIslemGun=d.giris_tarihi&&!d.ilk_islem_tarihi?Math.floor((Date.now()-new Date(d.giris_tarihi).getTime())/86400000):null;
    const riskRenk=ilkIslemGun>90?'#DC1C2E':ilkIslemGun>60?'#C9821A':ilkIslemGun>30?'#f59e0b':null;

    const dg=d.dogum_gunu?new Date(d.dogum_gunu):null;
    const dgStr=dg?dg.toLocaleDateString('tr-TR',{day:'numeric',month:'long'}):'';

    h+='<div style="background:#fff;border-radius:16px;'+sh+';padding:20px;cursor:pointer;transition:box-shadow .2s" onclick="rSkorDetay(\''+d.id+'\')">';

    // Üst: İsim + Skor
    h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">';
    h+='<div><div style="font-size:14px;font-weight:800;color:#0f172a">'+d.ad+'</div>';
    if(dgStr)h+='<div style="font-size:10px;color:#94a3b8;margin-top:2px">🎂 '+dgStr+'</div>';
    if(d.uzmanlik)h+='<div style="font-size:10px;color:#64748b;margin-top:2px">'+d.uzmanlik+'</div>';
    h+='</div>';
    h+='<div style="text-align:center">';
    h+='<div style="font-size:28px;font-weight:800;color:'+s.etiketC+'">'+s.toplam+'</div>';
    h+='<div style="font-size:9px;font-weight:700;color:'+s.etiketC+';white-space:nowrap">'+s.etiket+'</div>';
    h+='</div></div>';

    // Skor çubuğu
    h+='<div style="background:#f1f5f9;border-radius:8px;height:8px;margin-bottom:14px">';
    h+='<div style="background:'+s.etiketC+';height:100%;width:'+s.toplam+'%;border-radius:8px;transition:width .5s"></div></div>';

    // Mini metrikler grid
    h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px">';
    const metrik=(lbl,val,alt,c)=>'<div style="background:#f8fafc;border-radius:8px;padding:7px 8px;text-align:center"><div style="font-size:14px;font-weight:800;color:'+(c||'#0f172a')+'">'+val+'</div><div style="font-size:9px;color:#94a3b8;margin-top:1px">'+lbl+'</div>'+(alt?'<div style="font-size:9px;color:#64748b">'+alt+'</div>':'')+'</div>';
    h+=metrik('Toplantı',s.topTum.length?Math.round(s.topKatildi/s.topTum.length*100)+'%':'—','katılım',s.topPuan>=10?'#1C8C4B':s.topPuan>=5?'#C9821A':'#DC1C2E');
    h+=metrik('Eğitim',s.egTum.length?Math.round(s.egBitti/s.egTum.length*100)+'%':'—','tamamlama',s.egPuan>=10?'#1C8C4B':s.egPuan>=5?'#C9821A':'#DC1C2E');
    h+=metrik('Kapanan',s.kazanilan,'işlem','#1C8C4B');
    h+=metrik('Portföy',s.portfoy,'adet','#003DA5');
    h+=metrik('G.Yorum',s.googleYorum,'adet','#5b21b6');
    h+=metrik('Recruiting',s.rek,'katkı','#C9821A');
    h+='</div>';

    // Uyarılar
    if(riskRenk){
      h+='<div style="background:'+riskRenk+'15;border:1px solid '+riskRenk+'40;border-radius:8px;padding:6px 10px;font-size:11px;color:'+riskRenk+';font-weight:600">';
      h+='⚠ '+ilkIslemGun+' gündür ilk işlem yok</div>';
    }
    if(!(d.aktif??true)){
      h+='<div style="margin-top:6px;background:#fee2e2;border-radius:8px;padding:4px 10px;font-size:10px;color:#DC1C2E;font-weight:600;text-align:center">Pasif Danışman</div>';
    }

    // v20: Rozetler
    if(typeof danRozetler==='function'){
      const rozList=danRozetler(d.ad);
      if(rozList.length){
        h+='<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:3px;border-top:1px solid #f1f5f9;padding-top:8px">';
        h+=rozList.map(k=>rozetChip(k,true)).join('');
        h+='</div>';
      }
    }

    h+='</div>'; // kart
  });
  h+='</div>'; // grid

  // Veri giriş modal
  h+=skorModalHTML();
  // Detay modal
  h+='<div id="skor-detay-modal" class="mo"><div class="md" style="max-width:680px;max-height:88vh;overflow-y:auto"><div id="skor-detay-icerik"></div></div></div>';

  c.innerHTML=h;
}

function skorModalHTML(){
  const danList=D.dans.map(d=>'<option>'+d.ad+'</option>').join('');
  const tab=window._skorTab||'toplanti';
  const tabBtn=(id,lbl)=>'<button class="btn btn-sm '+(tab===id?'btn-p':'btn-g')+'" onclick="window._skorTab=\''+id+'\';document.getElementById(\'skor-form-icerik\').innerHTML=skorFormIcerik(\''+id+'\')">'+lbl+'</button>';

  let h='<div id="skor-modal" class="mo"><div class="md" style="max-width:500px">';

  h+=tabBtn('rekruting','👤 Recruiting');

  if(tab==='rekruting'){

      +inp('aday','Getirdiği Aday','text')
      +sel('aday_durum','Aday Durumu','<option>Görüşme Yapıldı</option><option>Başladı</option><option>Devam Ediyor</option><option>Olumsuz</option>')
      +inp('tarih','Tarih','date')
      +'<div class="fgr"><label>Açıklama</label><textarea id="sf_aciklama2" style="min-height:44px"></textarea></div>'
      +'</div><div id="sf_msg"></div>'
      +'<div class="fa"><button class="btn btn-p" onclick="svDanRekruting()">💾 Kaydet</button></div>';

    const d=D.dans.find(x=>x.ad===window._skorDanAd)||{};

      +sel('dan2','Danışman',danList)

      +inp('eposta','E-posta','email')
      +inp('dogum','Doğum Günü','date')
      +inp('giris','Giriş Tarihi','date')

  }
  return '';

function rSkorDetay(danId){
  const d=D.dans.find(x=>x.id===danId);
  if(!d)return;
  const s=danSkor(d);
  const sh='box-shadow:0 1px 3px rgba(0,0,0,.06)';
  const box='background:#f8fafc;border-radius:10px;padding:12px 14px;margin-bottom:10px';

  const ilkIslemGun=d.giris_tarihi&&!d.ilk_islem_tarihi?Math.floor((Date.now()-new Date(d.giris_tarihi).getTime())/86400000):null;
  const riskC=ilkIslemGun>90?'#DC1C2E':ilkIslemGun>60?'#C9821A':ilkIslemGun>30?'#f59e0b':'#1C8C4B';

  let h='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">';
  h+='<div><div style="font-size:16px;font-weight:800;color:#0f172a">'+d.ad+'</div>';

  h+='<div style="font-size:32px;font-weight:800;color:'+s.etiketC+'">'+s.toplam+'</div>';
  h+='<div style="font-size:10px;font-weight:700;color:'+s.etiketC+'">'+s.etiket+'</div></div></div>';

  h+='<div style="background:#f1f5f9;border-radius:8px;height:10px;margin-bottom:16px">';
  h+='<div style="background:'+s.etiketC+';height:100%;width:'+s.toplam+'%;border-radius:8px"></div></div>';

  // Genel bilgiler
  h+='<div style="'+box+'">';
  h+='<div style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Genel Bilgiler</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">';
  const bi=(lbl,val)=>val?'<div><span style="font-size:10px;color:#94a3b8">'+lbl+'</span><div style="font-size:12px;font-weight:600;color:#0f172a">'+val+'</div></div>':'';
  h+=bi('Telefon',d.telefon);
  h+=bi('E-posta',d.eposta);
  h+=bi('Doğum Günü',d.dogum_gunu?new Date(d.dogum_gunu).toLocaleDateString('tr-TR'):'');
  h+=bi('Giriş Tarihi',d.giris_tarihi);
  h+=bi('RE/MAX Başlangıç',d.remax_baslangic);
  h+=bi('İlk İşlem',d.ilk_islem_tarihi||'Henüz yok');
  h+=bi('Mentor',d.mentor);
  h+='</div>';
  if(d.notlar)h+='<div style="margin-top:8px;font-size:11px;color:#475569;background:#fff;border-radius:6px;padding:8px">📝 '+d.notlar+'</div>';
  h+='</div>';

  // İlk işlem uyarısı
  if(ilkIslemGun){
    h+='<div style="background:'+riskC+'15;border:1px solid '+riskC+'40;border-radius:10px;padding:10px 14px;margin-bottom:10px">';
    h+='<div style="font-size:12px;font-weight:700;color:'+riskC+'">⏱ İlk İşlem Süreci</div>';
    h+='<div style="font-size:11px;color:'+riskC+';margin-top:2px">Giriş tarihinden bu yana '+ilkIslemGun+' gün geçti, henüz ilk işlem yok.</div></div>';
  }

  // Puan detayları
  h+='<div style="'+box+'">';

      +'<span style="font-size:11px;color:#475569">'+lbl+'</span>'
      +'<span style="font-size:11px;font-weight:700;color:'+c+'">'+puan+'/'+max+ac+'</span></div>'

  if(toplar.length){
    h+='<div style="'+box+'">';
    h+='<div style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">📅 Toplantı Katılımı</div>';

    h+='<div style="'+box+'">';

    });
    h+='</div>';
  }

  // Memnuniyet
  const mems=D.danMemnuniyet.filter(m=>m.danisman_ad===d.ad);
  if(mems.length){
    h+='<div style="'+box+'">';
    h+='<div style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">⭐ Müşteri Memnuniyeti</div>';

      h+='<div style="font-size:16px">'+('⭐'.repeat(m.puan||0))+'</div></div>';
    });
    h+='</div>';
  }

  // Recruiting katkısı
  const reks=D.danRekruting.filter(r=>r.danisman_ad===d.ad);
  if(reks.length){
    h+='<div style="'+box+'">';
    h+='<div style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">👤 Recruiting Katkısı</div>';

      h+='<span style="font-size:10px;font-weight:600;color:#5b21b6">'+r.aday_durumu+'</span></div>';

function danIcsIndir(ad, dogumGunu){
  const dg=new Date(dogumGunu);
  const yil=dg.getFullYear();
  const ay=String(dg.getMonth()+1).padStart(2,'0');
  const gun=String(dg.getDate()).padStart(2,'0');
  const sonYil=yil+10;

  const ics=`BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//RE/MAX Lavanda//TR
BEGIN:VEVENT
DTSTART;VALUE=DATE:${yil}${ay}${gun}
DTEND;VALUE=DATE:${yil}${ay}${String(dg.getDate()+1).padStart(2,'0')}
RRULE:FREQ=YEARLY;UNTIL=${sonYil}${ay}${gun}
SUMMARY:🎂 ${ad} - Doğum Günü
DESCRIPTION:RE/MAX Lavanda - ${ad} danışmanının doğum günü
BEGIN:VALARM
TRIGGER:-P1D
ACTION:DISPLAY
DESCRIPTION:Yarın ${ad}'ın doğum günü!
END:VALARM
END:VEVENT
END:VCALENDAR`;

  const b=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  a.download=ad.replace(/\s+/g,'_')+'_dogumgunu.ics';
  a.click();
  toast('✅ .ics dosyası indirildi');
}

// ── RAPOR ──
function getWeekLabel(dateStr){
  const d=new Date(dateStr);
  const jan1=new Date(d.getFullYear(),0,1);
  const wk=Math.ceil((((d-jan1)/86400000)+jan1.getDay()+1)/7);
  return d.getFullYear()+'-W'+(wk<10?'0':'')+wk;
}

function rRapor(c){
  const box='background:#fff;border:1px solid var(--bd);border-radius:12px;padding:12px;margin-bottom:14px';
  const thS='padding:7px 10px;text-align:left;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--bd);background:var(--lg)';
  const tdS='padding:7px 10px;font-size:12px;border-bottom:1px solid #f1f5f9';

  // ── A) Haftalık Lead Girişi ──
  const haftaMap={};
  const now=new Date();
  for(let i=7;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i*7);const lbl=getWeekLabel(d.toISOString().split('T')[0]);if(!haftaMap[lbl])haftaMap[lbl]=0;}
  D.leads.forEach(l=>{const lbl=getWeekLabel(l.tarih||l.created_at||'');if(haftaMap[lbl]!==undefined)haftaMap[lbl]++;});
  const haftalar=Object.entries(haftaMap);

  let h='<div style="'+box+'">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
  h+='<div style="font-size:13px;font-weight:700;color:var(--dk)">📅 Haftalık Lead Girişi</div>';
  h+='<button class="btn btn-g btn-sm" onclick="expReport(\'haftalik\')">📥 CSV</button></div>';
  h+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse"><thead><tr>';
  h+='<th style="'+thS+'">Hafta</th><th style="'+thS+'">Lead Adedi</th><th style="'+thS+'">Trend</th>';
  h+='</tr></thead><tbody>';
  const maxH=Math.max(...haftalar.map(x=>x[1]),1);
  haftalar.forEach(([lbl,cnt])=>{
    const bar=Math.round(cnt/maxH*80);
    h+='<tr><td style="'+tdS+';font-weight:600">'+lbl+'</td>';
    h+='<td style="'+tdS+';font-weight:700;color:var(--blue)">'+cnt+'</td>';
    h+='<td style="'+tdS+'"><div style="background:#f0f0f0;border-radius:3px;height:6px;width:120px"><div style="background:var(--blue);height:100%;width:'+bar+'%;border-radius:3px"></div></div></td></tr>';
  });
  h+='</tbody></table></div></div>';

  // ── B) Danışman Bazlı Dönüşüm ──
  const danMap={};
  D.leads.forEach(l=>{
    if(!l.danisman)return;
    if(!danMap[l.danisman])danMap[l.danisman]={ad:l.danisman,atanan:0,kazanilan:0};
    danMap[l.danisman].atanan++;
    if(l.durum==='Kazanıldı')danMap[l.danisman].kazanilan++;
  });
  const dans=Object.values(danMap).sort((a,b)=>b.atanan-a.atanan);

  h+='<div style="'+box+'">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
  h+='<div style="font-size:13px;font-weight:700;color:var(--dk)">👤 Danışman Bazlı Dönüşüm</div>';
  h+='<button class="btn btn-g btn-sm" onclick="expReport(\'danisman\')">📥 CSV</button></div>';
  h+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse"><thead><tr>';
  ['Danışman','Atanan','Kazanılan','Oran %'].forEach(t=>h+='<th style="'+thS+'">'+t+'</th>');
  h+='</tr></thead><tbody>';
  if(!dans.length)h+='<tr><td colspan="4" style="'+tdS+';text-align:center;color:#ccc">Veri yok</td></tr>';
  dans.forEach(d=>{
    const oran=d.atanan>0?Math.round(d.kazanilan/d.atanan*100):0;
    const oranC=oran>=50?'var(--gn)':oran>=25?'var(--or)':'var(--red)';
    h+='<tr>';
    h+='<td style="'+tdS+';font-weight:700">'+d.ad+'</td>';
    h+='<td style="'+tdS+'">'+d.atanan+'</td>';
    h+='<td style="'+tdS+';font-weight:700;color:var(--gn)">'+d.kazanilan+'</td>';
    h+='<td style="'+tdS+'"><span style="background:'+oranC+'20;color:'+oranC+';padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700">%'+oran+'</span></td>';
    h+='</tr>';
  });
  h+='</tbody></table></div></div>';

  // ── C) Kaynak Performansı ──
  const d30=new Date();d30.setDate(d30.getDate()-30);
  const d30s=d30.toISOString().split('T')[0];
  const srcMap={};
  D.leads.filter(l=>(l.tarih||l.created_at||'').slice(0,10)>=d30s).forEach(l=>{
    const k=l.kaynak||'Belirsiz';
    if(!srcMap[k])srcMap[k]={kaynak:k,toplam:0,kazanilan:0};
    srcMap[k].toplam++;
    if(l.durum==='Kazanıldı')srcMap[k].kazanilan++;
  });
  const kaynaklar=Object.values(srcMap).sort((a,b)=>b.toplam-a.toplam).slice(0,10);

  h+='<div style="'+box+'">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
  h+='<div style="font-size:13px;font-weight:700;color:var(--dk)">🧲 Kaynak Performansı <span style="font-size:10px;color:#94a3b8;font-weight:400">Son 30 gün</span></div>';
  h+='<button class="btn btn-g btn-sm" onclick="expReport(\'kaynak\')">📥 CSV</button></div>';
  h+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse"><thead><tr>';
  ['Kaynak','Toplam','Kazanılan','Oran %'].forEach(t=>h+='<th style="'+thS+'">'+t+'</th>');
  h+='</tr></thead><tbody>';
  if(!kaynaklar.length)h+='<tr><td colspan="4" style="'+tdS+';text-align:center;color:#ccc">Veri yok</td></tr>';
  kaynaklar.forEach(k=>{
    const oran=k.toplam>0?Math.round(k.kazanilan/k.toplam*100):0;
    const oranC=oran>=50?'var(--gn)':oran>=25?'var(--or)':'var(--red)';
    h+='<tr>';
    h+='<td style="'+tdS+';font-weight:700">'+k.kaynak+'</td>';
    h+='<td style="'+tdS+'">'+k.toplam+'</td>';
    h+='<td style="'+tdS+';font-weight:700;color:var(--gn)">'+k.kazanilan+'</td>';
    h+='<td style="'+tdS+'"><span style="background:'+oranC+'20;color:'+oranC+';padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700">%'+oran+'</span></td>';
    h+='</tr>';
  });
  h+='</tbody></table></div></div>';

  c.innerHTML=h;
}
