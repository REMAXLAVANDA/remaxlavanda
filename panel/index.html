<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RE/MAX LAVANDA - Ofis Yönetim Sistemi</title>
<style>
:root { --red: #DC1C2E; --blue: #003DA5; --darkblue: #0C2749; --gray: #404041; --bg: #F5F6F8; --card: #FFFFFF; --border: #E3E6EB; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--gray); }
.header { background: linear-gradient(135deg, var(--darkblue), var(--blue)); color: white; padding: 24px 20px; }
.header-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 20px; font-weight: 700; }
.subtitle { font-size: 12px; opacity: 0.9; margin-top: 4px; }
.user-badge { background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 20px; font-size: 12px; }
.tabs { display: flex; background: white; border-bottom: 1px solid var(--border); max-width: 1200px; margin: 0 auto; padding: 0 20px; }
.tab { padding: 16px 20px; font-size: 14px; font-weight: 500; border: none; background: none; cursor: pointer; color: #999; border-bottom: 3px solid transparent; }
.tab.active { color: var(--darkblue); border-bottom-color: var(--red); }
.content { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 24px; }
.card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.card h3 { font-size: 14px; color: var(--darkblue); margin-bottom: 8px; font-weight: 600; }
.card-stat { font-size: 36px; font-weight: 700; color: var(--red); margin: 12px 0; }
.card-meta { font-size: 12px; color: #999; }
table { width: 100%; border-collapse: collapse; background: white; border: 1px solid var(--border); border-radius: 8px; margin-top: 16px; }
th { background: var(--bg); padding: 12px; text-align: left; font-size: 12px; font-weight: 600; border-bottom: 1px solid var(--border); }
td { padding: 12px; font-size: 13px; border-bottom: 1px solid #f0f0f0; }
.badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.badge-hot { background: #FBEEDB; color: #C9821A; }
.badge-ok { background: #E2F2E8; color: #1C8C4B; }
.section-title { font-size: 16px; font-weight: 700; color: var(--darkblue); margin: 24px 0 12px 0; }
.tab-pane { display: none; }
.tab-pane.show { display: block; }
</style>
</head>
<body>
<div class="header">
  <div class="header-content">
    <div><div class="logo">RE/MAX LAVANDA</div><div class="subtitle">Ofis Yönetim Sistemi</div></div>
    <div class="user-badge">👤 Admin Panel</div>
  </div>
</div>
<div class="tabs">
  <button class="tab active" onclick="switchTab('panel')">📊 Panel</button>
  <button class="tab" onclick="switchTab('leads')">👤 GD Leads</button>
  <button class="tab" onclick="switchTab('recruiting')">👥 Recruiting</button>
</div>
<div class="content">
  <div id="panel" class="tab-pane show">
    <div class="grid">
      <div class="card"><h3>📋 Açık Leads</h3><div class="card-stat" id="openLeads">8</div><div class="card-meta">Takip edileniyor</div></div>
      <div class="card"><h3>👥 Aktif Adaylar</h3><div class="card-stat" id="activeRecruits">4</div><div class="card-meta">Recruiting</div></div>
      <div class="card"><h3>✅ Kazanılan</h3><div class="card-stat" id="wonDeals">2</div><div class="card-meta">Başarılı</div></div>
    </div>
    <div class="section-title">📊 Son GD Leads</div>
    <table><thead><tr><th>Ad</th><th>Telefon</th><th>Kaynak</th><th>Durum</th><th>Danışman</th></tr></thead><tbody id="panelTable"></tbody></table>
  </div>
  <div id="leads" class="tab-pane">
    <div class="section-title">👤 Tüm GD Leads</div>
    <table><thead><tr><th>Ad</th><th>Telefon</th><th>Kaynak</th><th>Açıklama</th><th>Durum</th><th>Danışman</th></tr></thead><tbody id="leadsTable"></tbody></table>
  </div>
  <div id="recruiting" class="tab-pane">
    <div class="section-title">👥 Recruiting Adayları</div>
    <table><thead><tr><th>Ad</th><th>Telefon</th><th>Kaynak</th><th>Durum</th><th>Açıklama</th></tr></thead><tbody id="recruitingTable"></tbody></table>
  </div>
</div>
<script>
const gdLeads = [
  { ad: 'Arslan Çavdar', telefon: '532-625-6255', kaynak: 'Sponsorlu', aciklama: 'Kapaklı daire', durum: 'Arandı', danisman: 'Burak' },
  { ad: 'Recep Vardı', telefon: '534-258-1089', kaynak: 'Sponsorlu', aciklama: 'Hisseli arsa', durum: 'Arandı', danisman: 'Nihal' },
  { ad: 'Nuh Özer', telefon: '543-298-5544', kaynak: 'Remax', aciklama: 'Çorlu Park shop', durum: 'Görüşüldü', danisman: 'İbrahim' }
];
const recruitingCandidates = [
  { ad: 'Yasin Kayır', telefon: '542-714-5971', kaynak: 'Eren', durum: 'Sıcak', aciklama: 'Hazır' },
  { ad: 'Uğur Kılıç', telefon: '535-671-3610', kaynak: 'Eren', durum: 'Sıcak', aciklama: 'Pazartesi' }
];
function switchTab(tabId) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('show'));
  document.getElementById(tabId).classList.add('show');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
}
document.getElementById('openLeads').textContent = gdLeads.length;
document.getElementById('activeRecruits').textContent = recruitingCandidates.length;
let html = '';
gdLeads.forEach(l => { html += `<tr><td><strong>${l.ad}</strong></td><td>${l.telefon}</td><td>${l.kaynak}</td><td><span class="badge badge-hot">${l.durum}</span></td><td>${l.danisman}</td></tr>`; });
document.getElementById('panelTable').innerHTML = html;
html = '';
gdLeads.forEach(l => { html += `<tr><td><strong>${l.ad}</strong></td><td>${l.telefon}</td><td>${l.kaynak}</td><td>${l.aciklama}</td><td><span class="badge badge-hot">${l.durum}</span></td><td>${l.danisman}</td></tr>`; });
document.getElementById('leadsTable').innerHTML = html;
html = '';
recruitingCandidates.forEach(r => { html += `<tr><td><strong>${r.ad}</strong></td><td>${r.telefon}</td><td>${r.kaynak}</td><td><span class="badge badge-ok">${r.durum}</span></td><td>${r.aciklama}</td></tr>`; });
document.getElementById('recruitingTable').innerHTML = html;
</script>
</body>
</html>
