<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>RE/MAX LAVANDA - Ofis Yönetim Sistemi</title>
<style>
:root {
  --red:#DC1C2E;--blue:#003DA5;--darkblue:#0C2749;
  --gray:#404041;--lightgray:#F5F6F8;--border:#E3E6EB;
  --green:#1C8C4B;--orange:#C9821A;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--lightgray);color:var(--gray);min-height:100vh;}

/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--darkblue),var(--blue));padding:20px;}
.login-box{background:white;border-radius:20px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.3);text-align:center;}
.login-logo{font-size:20px;font-weight:800;color:var(--darkblue);margin-bottom:4px;}
.login-sub{font-size:12px;color:#999;margin-bottom:28px;}
.login-box input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:10px;font-size:15px;margin-bottom:12px;outline:none;}
.login-box input:focus{border-color:var(--blue);}
.btn-login{width:100%;padding:14px;background:var(--darkblue);color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;}
.btn-login:hover{background:var(--blue);}
.login-check{display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:13px;color:#666;}
.login-check input{width:auto;margin:0;}
.login-error{color:var(--red);font-size:12px;margin-top:6px;}

/* PIN MODAL */
.pin-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:2000;align-items:center;justify-content:center;padding:20px;}
.pin-overlay.show{display:flex;}
.pin-box{background:white;border-radius:20px;padding:36px 32px;width:100%;max-width:320px;text-align:center;}
.pin-box h3{font-size:18px;font-weight:700;color:var(--darkblue);margin-bottom:8px;}
.pin-sub{font-size:13px;color:#999;margin-bottom:24px;}
.pin-input{font-size:28px;letter-spacing:12px;text-align:center;border:2px solid var(--border);border-radius:12px;padding:14px;width:100%;outline:none;font-weight:700;}
.pin-input:focus{border-color:var(--blue);}
.pin-numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px;}
.pin-key{padding:16px;background:var(--lightgray);border:none;border-radius:12px;font-size:18px;font-weight:600;cursor:pointer;color:var(--darkblue);}
.pin-key:hover{background:var(--border);}
.pin-key.del{background:#fee2e2;color:var(--red);}
.pin-key.ok{background:var(--darkblue);color:white;}
.pin-error{color:var(--red);font-size:12px;margin-top:8px;}

/* HEADER */
.header{background:linear-gradient(135deg,var(--darkblue),var(--blue));color:white;padding:14px 16px;}
.header-content{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;}
.logo{font-size:16px;font-weight:800;}
.subtitle{font-size:10px;opacity:0.8;margin-top:2px;}
.header-right{display:flex;align-items:center;gap:8px;}
.user-badge{background:rgba(255,255,255,0.15);padding:5px 12px;border-radius:20px;font-size:11px;}
.last-login{font-size:9px;opacity:0.7;margin-top:2px;}
.btn-hdr{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:white;padding:5px 10px;border-radius:8px;font-size:11px;cursor:pointer;}
.btn-hdr:hover{background:rgba(255,255,255,0.25);}

/* TABS */
.tab-bar{background:white;border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tabs{display:flex;max-width:1400px;margin:0 auto;padding:0 16px;min-width:max-content;}
.tab{padding:13px 16px;font-size:12px;font-weight:500;border:none;background:none;cursor:pointer;color:#999;border-bottom:3px solid transparent;white-space:nowrap;}
.tab.active{color:var(--darkblue);border-bottom-color:var(--red);font-weight:700;}

/* CONTENT */
.content{max-width:1400px;margin:0 auto;padding:16px;}

/* GAUGE */
.gauge-wrap{display:flex;flex-direction:column;align-items:center;}
.gauge-svg{width:140px;height:80px;}
.gauge-val{font-size:22px;font-weight:800;color:var(--darkblue);margin-top:-8px;}
.gauge-lbl{font-size:11px;color:#999;margin-top:2px;}

/* PROGRESS BAR */
.prog-item{margin-bottom:12px;}
.prog-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.prog-name{font-size:12px;font-weight:600;color:var(--darkblue);}
.prog-val{font-size:12px;color:#666;}
.prog-bar-bg{background:#f0f0f0;border-radius:8px;height:10px;overflow:hidden;}
.prog-bar-fill{height:100%;border-radius:8px;transition:width 0.5s ease;}

/* CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px;}
.card{background:white;border:1px solid var(--border);border-radius:14px;padding:16px;}
.card h3{font-size:10px;color:#999;margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
.card-stat{font-size:26px;font-weight:800;color:var(--darkblue);}
.card-sub{font-size:10px;color:#bbb;margin-top:3px;}
.card.red .card-stat{color:var(--red);}
.card.green .card-stat{color:var(--green);}
.card.orange .card-stat{color:var(--orange);}
.card.blue .card-stat{color:var(--blue);}

/* LAYOUT */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.recruit-layout{display:grid;grid-template-columns:1fr 320px;gap:16px;}
@media(max-width:900px){.two-col,.recruit-layout{grid-template-columns:1fr;}}
.col-box{background:white;border:1px solid var(--border);border-radius:14px;padding:16px;}
.col-box h2{font-size:14px;font-weight:700;color:var(--darkblue);margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--red);}

/* FILTER */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.filter-btn{padding:6px 12px;border:1px solid var(--border);border-radius:20px;background:white;font-size:11px;cursor:pointer;font-weight:600;color:#666;}
.filter-btn.active{background:var(--darkblue);color:white;border-color:var(--darkblue);}

/* TABLE */
.tbl-hdr{display:flex;justify-content:space-between;align-items:center;margin:14px 0 10px;}
.tbl-title{font-size:14px;font-weight:700;color:var(--darkblue);}
.tbl-actions{display:flex;gap:8px;}
.tbl-wrap{background:white;border:1px solid var(--border);border-radius:12px;overflow:hidden;overflow-x:auto;}
.srch-bar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.srch-bar input,.srch-bar select{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;min-width:120px;}
table{width:100%;border-collapse:collapse;min-width:500px;}
th{background:var(--lightgray);padding:10px 12px;text-align:left;font-size:10px;font-weight:700;border-bottom:1px solid var(--border);color:#666;text-transform:uppercase;white-space:nowrap;}
td{padding:10px 12px;font-size:12px;border-bottom:1px solid #f5f5f5;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafafa;}

/* MINI TABLE */
.mini-tbl{width:100%;border-collapse:collapse;}
.mini-tbl th{font-size:10px;font-weight:700;color:#666;padding:7px 8px;background:var(--lightgray);border-bottom:1px solid var(--border);text-align:left;}
.mini-tbl td{font-size:11px;padding:7px 8px;border-bottom:1px solid #f5f5f5;}
.mini-tbl tr:last-child td{border-bottom:none;}

/* BADGE */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.badge-arandi{background:#E8F0FE;color:#1a56db;}
.badge-cagrildi{background:#FEF3C7;color:#92400e;}
.badge-gorusuldu{background:#EDE9FE;color:#5b21b6;}
.badge-1gorusme{background:#E0F2FE;color:#0369a1;}
.badge-2gorusme{background:#F0FDF4;color:#15803d;}
.badge-sicak{background:#FBEEDB;color:var(--orange);}
.badge-soguk{background:#F0F0F0;color:#555;}
.badge-kazanildi{background:#E2F2E8;color:var(--green);}
.badge-kaybedildi{background:#FBE3E5;color:var(--red);}
.badge-beklemede{background:#FEF3C7;color:#92400e;}
.badge-randevu{background:#EDE9FE;color:#5b21b6;}
.badge-olumsuz{background:#FBE3E5;color:var(--red);}
.badge-karalist{background:#1a1a1a;color:white;}
.badge-satilik{background:#E8F0FE;color:#1a56db;}
.badge-kiralik{background:#FEF3C7;color:#92400e;}

/* BUTTONS */
.btn{padding:8px 14px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}
.btn-primary{background:var(--darkblue);color:white;}
.btn-primary:hover{background:var(--blue);}
.btn-ghost{background:white;color:var(--gray);border:1px solid var(--border);}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px;}
.btn-wa{background:#25D366;color:white;border:none;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;text-decoration:none;display:inline-block;}

/* FORM */
.form-wrap{background:white;border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px;}
.form-wrap h3{font-size:14px;font-weight:700;color:var(--darkblue);margin-bottom:16px;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group label{font-size:10px;font-weight:700;color:#666;text-transform:uppercase;}
.form-group input,.form-group select,.form-group textarea{padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;font-family:inherit;width:100%;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue);}
.form-group textarea{resize:vertical;min-height:70px;}
.form-actions{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;}
.status-select{padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:11px;cursor:pointer;background:white;}

/* TAKVİM */
.cal-box{background:white;border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.cal-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border);background:var(--lightgray);}
.cal-title{font-size:12px;font-weight:700;color:var(--darkblue);}
.cal-btn{padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:white;cursor:pointer;font-size:11px;}
.time-grid{display:grid;grid-template-columns:40px 1fr;max-height:420px;overflow-y:auto;}
.time-col{border-right:1px solid var(--border);}
.time-slot{height:50px;display:flex;align-items:flex-start;justify-content:center;padding-top:4px;font-size:10px;color:#aaa;border-bottom:1px solid #f0f0f0;}
.event-row{height:50px;border-bottom:1px solid #f0f0f0;padding:2px 4px;}
.event-item{background:var(--blue);color:white;border-radius:5px;padding:3px 7px;font-size:10px;font-weight:600;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-bottom:2px;}
.event-item.ok{background:var(--green);}
.event-item.pending{background:var(--orange);}
.allday-box{padding:8px 12px;background:#fff8e1;border-bottom:1px solid var(--border);font-size:10px;}
.allday-item{display:inline-block;background:var(--orange);color:white;padding:2px 8px;border-radius:10px;margin:2px;font-size:10px;font-weight:600;}

/* PORTFÖY HAVUZU */
.havuz-item{background:white;border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
.havuz-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.havuz-tip{font-size:12px;font-weight:700;color:var(--darkblue);}
.havuz-dan{font-size:11px;color:#999;margin-top:2px;}
.havuz-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.havuz-tag{background:var(--lightgray);border:1px solid var(--border);padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;color:var(--gray);}

/* MODAL */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.show{display:flex;}
.modal{background:white;border-radius:16px;padding:24px;width:100%;max-width:520px;box-shadow:0 20px 60px rgba(0,0,0,0.3);max-height:90vh;overflow-y:auto;}
.modal h3{font-size:15px;font-weight:700;color:var(--darkblue);margin-bottom:16px;}
.modal-actions{margin-top:16px;display:flex;gap:8px;justify-content:flex-end;}

/* AYARLAR */
.settings-section{background:white;border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;}
.settings-section h3{font-size:13px;font-weight:700;color:var(--darkblue);margin-bottom:14px;}
.tag-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.tag-item{display:flex;align-items:center;gap:5px;background:var(--lightgray);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;}
.tag-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:13px;font-weight:700;padding:0 2px;}
.tag-add{display:flex;gap:8px;}
.tag-add input{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px;outline:none;flex:1;}

/* SORGU HAKKI */
.rights-box{background:#fff8e1;border:1px solid #ffc107;border-radius:10px;padding:12px;margin-bottom:12px;font-size:12px;}
.rights-dots{display:flex;gap:6px;margin-top:6px;}
.dot{width:12px;height:12px;border-radius:50%;background:var(--green);}
.dot.used{background:#ddd;}

/* UTILS */
.hidden{display:none;}
.loading{text-align:center;padding:40px;color:#999;}
.success-msg{background:#E2F2E8;color:var(--green);padding:10px 14px;border-radius:8px;margin:8px 0;font-size:12px;}
.error-msg{background:#FBE3E5;color:var(--red);padding:10px 14px;border-radius:8px;margin:8px 0;font-size:12px;}
.dup-warn{background:#fff8e1;border:1px solid #ffc107;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:11px;color:#856404;}
.token-link{font-family:monospace;font-size:10px;background:#f0f0f0;padding:3px 6px;border-radius:4px;color:var(--blue);word-break:break-all;}
.divider{height:1px;background:var(--border);margin:14px 0;}
.rate-bar-bg{background:#f0f0f0;border-radius:6px;height:8px;overflow:hidden;flex:1;}
.rate-bar-fill{height:100%;border-radius:6px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">RE/MAX LAVANDA</div>
    <div class="login-sub">Ofis Yönetim Sistemi</div>
    <input type="text" id="loginUser" placeholder="Kullanıcı adı" autocomplete="username"/>
    <input type="password" id="loginPass" placeholder="Şifre" autocomplete="current-password"/>
    <label class="login-check"><input type="checkbox" id="rememberMe"/> Beni hatırla (30 gün)</label>
    <button class="btn-login" onclick="doLogin()">Giriş Yap</button>
    <div id="loginError" class="login-error"></div>
  </div>
</div>

<!-- PIN EKRANI -->
<div id="pinOverlay" class="pin-overlay">
  <div class="pin-box">
    <h3>🔐 PIN Doğrulama</h3>
    <div class="pin-sub" id="pinSub">4 haneli PIN kodunuzu girin</div>
    <input type="password" id="pinInput" class="pin-input" maxlength="4" placeholder="••••" readonly/>
    <div class="pin-numpad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key del" onclick="pinDel()">⌫</button>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key ok" onclick="pinOK()">✓</button>
    </div>
    <div id="pinError" class="pin-error"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" class="hidden">
  <div class="header">
    <div class="header-content">
      <div><div class="logo">RE/MAX LAVANDA</div><div class="subtitle">Ofis Yönetim Sistemi</div></div>
      <div class="header-right">
        <div><div class="user-badge" id="userBadge">👤</div><div class="last-login" id="lastLoginInfo"></div></div>
        <button class="btn-hdr" onclick="showPassModal()">🔑</button>
        <button class="btn-hdr" onclick="doLogout()">Çıkış</button>
      </div>
    </div>
  </div>
  <div class="tab-bar"><div class="tabs" id="navTabs"></div></div>
  <div class="content" id="content"><div class="loading">Yükleniyor...</div></div>
</div>

<!-- ŞİFRE MODAL -->
<div id="passModal" class="modal-overlay">
  <div class="modal">
    <h3>🔑 Şifre Değiştir</h3>
    <div class="form-group" style="margin-bottom:10px"><label>Mevcut Şifre</label><input type="password" id="oldPass"/></div>
    <div class="form-group" style="margin-bottom:10px"><label>Yeni Şifre</label><input type="password" id="newPass"/></div>
    <div class="form-group"><label>Yeni Şifre (Tekrar)</label><input type="password" id="newPass2"/></div>
    <div id="passMsg"></div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="hidePassModal()">İptal</button><button class="btn btn-primary" onclick="changePass()">Kaydet</button></div>
  </div>
</div>

<!-- EDIT MODAL -->
<div id="editModal" class="modal-overlay">
  <div class="modal">
    <h3 id="editTitle">Düzenle</h3>
    <div id="editContent"></div>
    <div id="editMsg"></div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="hideEdit()">İptal</button><button class="btn btn-primary" onclick="saveEdit()">Kaydet</button></div>
  </div>
</div>

<script>

let CFG=JSON.parse(localStorage.getItem('rmx_cfg')||'null')||{
  leadSources:['Sponsorlu','Remax','Selen','Referans','Diğer'],
  recruitSources:['Leman','Eren','Secret','Remax','Halk Eğitim','Kariyer','Sahibinden','Seminer','Diğer'],

function saveCFG(){localStorage.setItem('rmx_cfg',JSON.stringify(CFG));}
function saveUsers(){localStorage.setItem('rmx_users',JSON.stringify(USERS));}

function getWeekKey(){const d=new Date();const j=new Date(d.getFullYear(),0,1);return d.getFullYear()+'_'+Math.ceil((((d-j)/86400000)+j.getDay()+1)/7);}
function getQueryRights(){const d=JSON.parse(localStorage.getItem('rmx_r_'+getWeekKey())||'{"u":0}');return{used:d.u,left:3-d.u};}
function useRight(){const k='rmx_r_'+getWeekKey();const d=JSON.parse(localStorage.getItem(k)||'{"u":0}');d.u++;localStorage.setItem(k,JSON.stringify(d));}

let CU=null,allData={leads:[],recruiting:[],danismanlar:[],havuz:[]};
let editRec=null,editTbl=null,calDate=new Date(),pinTarget=null;
const urlToken=new URLSearchParams(window.location.search).get('token');

function cap(s){if(!s)return'';return s.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' ');}
function today(){return new Date().toISOString().split('T')[0];}
function weekAgo(){const d=new Date();d.setDate(d.getDate()-7);return d.toISOString().split('T')[0];}
function genToken(){const c='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';let t='';for(let i=0;i<14;i++)t+=c[Math.floor(Math.random()*c.length)];return t;}

function badge(d){
  const m={'Arandı':'arandi','Çağrıldı':'cagrildi','Görüşüldü':'gorusuldu','1. Görüşme':'1gorusme','2. Görüşme':'2gorusme','Sıcak':'sicak','Soğuk':'soguk','Kazanıldı':'kazanildi','Kaybedildi':'kaybedildi','Beklemede':'beklemede','Randevu':'randevu','Olumsuz':'olumsuz','Kara Liste':'karalist','Satılık':'satilik','Kiralık':'kiralik'};
  return '<span class="badge badge-'+(m[d]||'soguk')+'">'+(d||'—')+'</span>';
}
function wa(t){if(!t)return'';const c=t.replace(/\D/g,'');const n=c.startsWith('0')?'90'+c.slice(1):(c.startsWith('90')?c:'90'+c);return'<a href="https://wa.me/'+n+'" target="_blank" class="btn-wa">💬</a> ';}
function opts(arr,cur){return arr.map(s=>'<option'+(cur===s?' selected':'')+'>'+s+'</option>').join('');}

async function api(table,method,body,filter){
  let url=SB+'/rest/v1/'+table;
  if(filter)url+='?'+filter;
  const o={method:method||'GET',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':method==='POST'?'return=representation':(method==='PATCH'?'return=representation':'')}};
  if(body)o.body=JSON.stringify(body);
  const r=await fetch(url,o);
  if(!r.ok){const e=await r.text();throw new Error(e);}
  const t=await r.text();return t?JSON.parse(t):[];
}

async function loadData(){
  const [l,r,d]=await Promise.all([
    api('gd_leads','GET',null,'select=*&order=created_at.desc'),
    api('recruiting_candidates','GET',null,'select=*&order=created_at.desc'),
    api('danismanlar','GET',null,'select=*&order=created_at.asc')
  ]);
  allData.leads=l||[];allData.recruiting=r||[];allData.danismanlar=d||[];
  // Havuz localStorage'dan
  allData.havuz=JSON.parse(localStorage.getItem('rmx_havuz')||'[]');
}

// ===== LOGIN =====
function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value.trim();
  const rem=document.getElementById('rememberMe').checked;
  if(USERS[u]&&USERS[u].pass===p){
    if(rem){localStorage.setItem('rmx_rem',JSON.stringify({u,exp:Date.now()+30*24*60*60*1000}));}
    showPin(u);
  } else {document.getElementById('loginError').textContent='Kullanıcı adı veya şifre hatalı!';}
}

function checkRemember(){
  const r=JSON.parse(localStorage.getItem('rmx_rem')||'null');
  if(r&&r.exp>Date.now()&&USERS[r.u]){showPin(r.u);return true;}
  return false;
}

function pinKey(k){if(pinVal.length<4){pinVal+=k;document.getElementById('pinInput').value='•'.repeat(pinVal.length);}}
function pinDel(){pinVal=pinVal.slice(0,-1);document.getElementById('pinInput').value='•'.repeat(pinVal.length);}
function pinOK(){
  if(USERS[pinUser]&&USERS[pinUser].pin===pinVal){
    document.getElementById('pinOverlay').classList.remove('show');

async function checkToken(){
  if(!urlToken)return false;
  try{
    await loadData();
    const d=allData.danismanlar.find(x=>x.token===urlToken);
    if(d){
      CU={role:'danisman',name:d.ad,danismanAd:d.ad,token:urlToken};
      document.getElementById('loginPage').classList.add('hidden');
      // PIN for danisman
      pinUser='__danisman__';

// ===== GAUGE SVG =====
function gaugeHTML(pct,label){
  const r=60,cx=70,cy=70,sw=14;
  const angle=-180+pct*1.8;
  const toRad=a=>a*Math.PI/180;
  const x1=cx+r*Math.cos(toRad(-180)),y1=cy+r*Math.sin(toRad(-180));
  const x2=cx+r*Math.cos(toRad(0)),y2=cy+r*Math.sin(toRad(0));
  const ax=cx+r*Math.cos(toRad(angle)),ay=cy+r*Math.sin(toRad(angle));
  const color=pct<30?'#DC1C2E':pct<60?'#C9821A':'#1C8C4B';
  return `<div class="gauge-wrap">
    <svg viewBox="0 0 140 80" style="width:140px;height:80px">
      <path d="M${x1},${y1} A${r},${r} 0 0,1 ${x2},${y2}" fill="none" stroke="#f0f0f0" stroke-width="${sw}" stroke-linecap="round"/>
      <path d="M${x1},${y1} A${r},${r} 0 0,1 ${ax},${ay}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round"/>
      <text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="18" font-weight="800" fill="${color}">${pct}%</text>
      <text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="9" fill="#999">${label}</text>
    </svg>
  </div>`;
}

function progBar(name,val,max,color){
  const pct=max>0?Math.round(val/max*100):0;
  return `<div class="prog-item">
    <div class="prog-label"><span class="prog-name">${name}</span><span class="prog-val">${val}/${max} (${pct}%)</span></div>
    <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${pct}%;background:${color}"></div></div>
  </div>`;
}

// ===== ÖZET =====
function renderOzet(c,period,cs,ce){
  period=period||'month';
  const now=new Date();const end=today();let start;
  if(period==='week'){const d=new Date();d.setDate(d.getDate()-7);start=d.toISOString().split('T')[0];}
  else if(period==='month'){start=new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0];}
  else if(period==='3month'){const d=new Date();d.setMonth(d.getMonth()-3);start=d.toISOString().split('T')[0];}
  else if(period==='year'){start=now.getFullYear()+'-01-01';}
  else if(period==='custom'&&cs&&ce){start=cs;const e2=ce;const rng={start,end:e2};return _renderOzetData(c,period,rng);}
  _renderOzetData(c,period,{start,end});
}

function _renderOzetData(c,period,range){
  const leads=allData.leads.filter(l=>l.tarih>=range.start&&l.tarih<=range.end);
  const recs=allData.recruiting.filter(r=>(r.created_at||'').slice(0,10)>=range.start&&(r.created_at||'').slice(0,10)<=range.end);
  const tL=leads.length,wL=leads.filter(l=>l.durum==='Kazanıldı').length;
  const hotL=leads.filter(l=>l.durum==='Sıcak').length;
  const tR=recs.length,okR=recs.filter(r=>!['Olumsuz','Kara Liste'].includes(r.durum)).length;
  const rateL=tL>0?Math.round(wL/tL*100):0;
  const rateR=tR>0?Math.round(okR/tR*100):0;
  const byD={};
  leads.forEach(l=>{if(l.danisman){if(!byD[l.danisman])byD[l.danisman]={t:0,k:0};byD[l.danisman].t++;if(l.durum==='Kazanıldı')byD[l.danisman].k++;}});
  const byLS={};
  leads.forEach(l=>{const k=l.kaynak||'Diğer';if(!byLS[k])byLS[k]={t:0,k:0};byLS[k].t++;if(l.durum==='Kazanıldı')byLS[k].k++;});
  const byRS={};
  recs.forEach(r=>{const k=r.kaynak||'Diğer';if(!byRS[k])byRS[k]={t:0,ok:0};byRS[k].t++;if(!['Olumsuz','Kara Liste'].includes(r.durum))byRS[k].ok++;});

  const ps=[{id:'week',l:'Bu Hafta'},{id:'month',l:'Bu Ay'},{id:'3month',l:'3 Ay'},{id:'year',l:'Bu Yıl'},{id:'custom',l:'Özel'}];
  let html='<div class="filter-bar">';
  ps.forEach(p=>html+='<button class="filter-btn'+(period===p.id?' active':'')+'" onclick="renderOzetP(\''+p.id+'\')">'+p.l+'</button>');
  html+='<span id="customRange" style="display:'+(period==='custom'?'flex':'none')+';gap:6px;align-items:center;flex-wrap:wrap">';
  html+='<input type="date" id="cs" value="'+range.start+'"/> <span>—</span> <input type="date" id="ce" value="'+range.end+'"/>';
  html+='<button class="btn btn-primary btn-sm" onclick="applyCustom()">Uygula</button></span></div>';

  html+='<div class="two-col">';

  // SOL - PORTFÖY
  html+='<div class="col-box"><h2>🏠 Portföy Raporu</h2>';
  html+='<div style="display:flex;justify-content:space-around;margin-bottom:16px">';
  html+=gaugeHTML(rateL,'Dönüşüm');
  html+='<div style="text-align:center"><div style="font-size:24px;font-weight:800;color:var(--darkblue)">'+tL+'</div><div style="font-size:11px;color:#999">Toplam Lead</div></div>';
  html+='<div style="text-align:center"><div style="font-size:24px;font-weight:800;color:var(--green)">'+wL+'</div><div style="font-size:11px;color:#999">Kazanılan</div></div>';
  html+='</div>';
  html+='<div class="divider"></div>';
  html+='<div style="font-size:12px;font-weight:700;color:var(--darkblue);margin-bottom:10px">Danışman Performansı</div>';
  Object.entries(byD).sort((a,b)=>b[1].k/Math.max(b[1].t,1)-a[1].k/Math.max(a[1].t,1)).forEach(([ad,d])=>{
    const r=d.t>0?Math.round(d.k/d.t*100):0;
    const color=r>=60?'var(--green)':r>=30?'var(--orange)':'var(--red)';
    html+=progBar(ad,d.k,d.t,color);
  });
  if(!Object.keys(byD).length)html+='<div style="color:#999;font-size:12px;text-align:center">Veri yok</div>';
  html+='<div class="divider"></div>';
  html+='<div style="font-size:12px;font-weight:700;color:var(--darkblue);margin-bottom:10px">Kaynak Başarı Oranları</div>';
  html+='<table class="mini-tbl"><thead><tr><th>Kaynak</th><th>Lead</th><th>Kazanılan</th><th>Oran</th></tr></thead><tbody>';
  html+=Object.entries(byLS).sort((a,b)=>b[1].t-a[1].t).map(([k,d])=>{const r=d.t>0?Math.round(d.k/d.t*100):0;return'<tr><td>'+k+'</td><td>'+d.t+'</td><td>'+d.k+'</td><td><span style="color:'+(r>=50?'var(--green)':'var(--red)')+'">'+r+'%</span></td></tr>';}).join('');
  html+='</tbody></table></div>';

  // SAĞ - RECRUITING
  html+='<div class="col-box"><h2>👥 Recruiting Raporu</h2>';
  html+='<div style="display:flex;justify-content:space-around;margin-bottom:16px">';
  html+=gaugeHTML(rateR,'Aktif Oran');
  html+='<div style="text-align:center"><div style="font-size:24px;font-weight:800;color:var(--darkblue)">'+tR+'</div><div style="font-size:11px;color:#999">Toplam Aday</div></div>';
  html+='<div style="text-align:center"><div style="font-size:24px;font-weight:800;color:var(--green)">'+okR+'</div><div style="font-size:11px;color:#999">Aktif</div></div>';
  html+='</div>';
  html+='<div class="divider"></div>';
  html+='<div style="font-size:12px;font-weight:700;color:var(--darkblue);margin-bottom:10px">Kaynak Başarı Oranları</div>';
  html+='<table class="mini-tbl"><thead><tr><th>Kaynak</th><th>Aday</th><th>Aktif</th><th>Oran</th></tr></thead><tbody>';
  html+=Object.entries(byRS).sort((a,b)=>b[1].t-a[1].t).map(([k,d])=>{const r=d.t>0?Math.round(d.ok/d.t*100):0;return'<tr><td>'+k+'</td><td>'+d.t+'</td><td>'+d.ok+'</td><td><span style="color:'+(r>=50?'var(--green)':'var(--red)')+'">'+r+'%</span></td></tr>';}).join('');
  html+='</tbody></table>';
  html+='<div class="divider"></div>';
  // Durum dağılımı progress
  html+='<div style="font-size:12px;font-weight:700;color:var(--darkblue);margin-bottom:10px">Durum Dağılımı</div>';
  const byRD={};recs.forEach(r=>{const d=r.durum||'?';byRD[d]=(byRD[d]||0)+1;});
  const colors={'Görüşüldü':'var(--blue)','1. Görüşme':'var(--blue)','2. Görüşme':'var(--green)','Sıcak':'var(--orange)','Olumsuz':'var(--red)','Kara Liste':'#333','Beklemede':'#999'};
  Object.entries(byRD).sort((a,b)=>b[1]-a[1]).forEach(([d,n])=>{html+=progBar(d,n,tR,colors[d]||'var(--blue)');});
  html+='</div>';
  html+='</div>';
  c.innerHTML=html;
}

  html+=gaugeHTML(rate,'Dönüşüm Oranım');
  html+='<div class="tbl-wrap" style="margin-top:14px"><table><thead><tr><th>Tarih</th><th>Müşteri</th><th>Tel</th><th>Kaynak</th><th>Açıklama</th><th>Durum</th><th>Takip</th></tr></thead><tbody>';
  html+=my.map(l=>'<tr><td>'+(l.tarih||'—')+'</td><td><strong>'+(l.ad||'')+'</strong></td><td>'+wa(l.telefon)+'</td><td>'+(l.kaynak||'—')+'</td><td>'+(l.aciklama||'—')+'</td><td><select class="status-select" onchange="updS(\''+l.id+'\',this.value)">'+opts(CFG.leadDurums,l.durum)+'</select></td><td>'+(l.sonraki_takip||'—')+'</td></tr>').join('');
  html+='</tbody></table></div>';
  c.innerHTML=html;
}

async function updS(id,d){try{await api('gd_leads','PATCH',{durum:d},'id=eq.'+id);const l=allData.leads.find(l=>l.id===id);if(l)l.durum=d;}catch(e){alert('Hata: '+e.message);}}

// ===== AYARLAR =====
function renderAyarlar(c){
  let html='';
  const sections=[{key:'leadSources',title:'🏠 Portföy Kaynakları'},{key:'recruitSources',title:'👥 Recruiting Kaynakları'},{key:'leadDurums',title:'🏠 Portföy Durumları'},{key:'recruitDurums',title:'👥 Recruiting Durumları'},{key:'mlTipler',title:'🏘️ Gayrimenkul Tipleri'},{key:'mlIslemler',title:'🏘️ İşlem Türleri'},{key:'iller',title:'📍 İller'}];
  sections.forEach(s=>{
    html+='<div class="settings-section"><h3>'+s.title+'</h3>';
    html+='<div class="tag-list">'+CFG[s.key].map((v,i)=>'<div class="tag-item">'+v+'<button class="tag-del" onclick="delTag(\''+s.key+'\','+i+')">×</button></div>').join('')+'</div>';
    html+='<div class="tag-add"><input id="new_'+s.key+'" placeholder="Yeni ekle..."/><button class="btn btn-primary btn-sm" onclick="addTag(\''+s.key+'\')">+ Ekle</button></div>';
    html+='</div>';
  });
  html+='<div class="settings-section"><h3>⚙️ Ofis Şifre & PIN Sıfırla</h3>';
  html+='<div class="form-grid">';
  html+='<div class="form-group"><label>Yeni Şifre</label><input type="password" id="aNP"/></div>';
  html+='<div class="form-group"><label>Yeni PIN (4 hane)</label><input id="aNPin" maxlength="4" placeholder="4 hane"/></div>';
  html+='</div>';
  html+='<div class="form-actions"><button class="btn btn-primary" onclick="adminReset()">Sıfırla</button></div>';
  html+='<div id="aRM"></div></div>';
  c.innerHTML=html;
}

function addTag(k){const el=document.getElementById('new_'+k);const v=cap(el.value.trim());if(!v)return;if(!CFG[k].includes(v)){CFG[k].push(v);saveCFG();}el.value='';renderAyarlar(document.getElementById('content'));}
function delTag(k,i){if(confirm('Silmek istiyor musunuz?')){CFG[k].splice(i,1);saveCFG();renderAyarlar(document.getElementById('content'));}}
function adminReset(){
  const p=document.getElementById('aNP').value.trim();const pin=document.getElementById('aNPin').value.trim();
  let msg='';
  if(p&&p.length>=4){USERS['ofis'].pass=p;saveUsers();msg+='Şifre güncellendi. ';}
  if(pin&&pin.length===4){USERS['ofis'].pin=pin;saveUsers();msg+='PIN güncellendi.';}
  if(!msg){document.getElementById('aRM').innerHTML='<div class="error-msg">En az biri doldurulmalı!</div>';return;}
  document.getElementById('aRM').innerHTML='<div class="success-msg">✅ '+msg+'</div>';
}

// ===== EDIT =====
function doEdit(table,id){
  const rec=table==='gd_leads'?allData.leads.find(l=>l.id===id):allData.recruiting.find(r=>r.id===id);
  if(!rec)return;editRec=rec;editTbl=table;
  const danOpts=allData.danismanlar.map(d=>'<option value="'+d.ad+'"'+(rec.danisman===d.ad?' selected':'')+'>'+d.ad+'</option>').join('');
  let html='<div class="form-grid">';
  html+='<div class="form-group"><label>Ad Soyad</label><input id="e_ad" value="'+(rec.ad||'')+'" oninput="this.value=cap(this.value)"/></div>';
  html+='<div class="form-group"><label>Telefon</label><input id="e_tel" value="'+(rec.telefon||'')+'"/></div>';
  if(table==='gd_leads'){
    document.getElementById('editTitle').textContent='✏️ Lead — '+rec.ad;
    html+='<div class="form-group"><label>Kaynak</label><select id="e_k">'+opts(CFG.leadSources,rec.kaynak)+'</select></div>';
    html+='<div class="form-group"><label>Danışman</label><input id="e_dan" list="eDL" value="'+(rec.danisman||'')+'"/><datalist id="eDL">'+danOpts+'</datalist></div>';
    html+='<div class="form-group"><label>Durum</label><select id="e_d">'+opts(CFG.leadDurums,rec.durum)+'</select></div>';
    html+='<div class="form-group"><label>Takip</label><input type="date" id="e_t" value="'+(rec.sonraki_takip||'')+'"/></div>';
    html+='</div><div class="form-group" style="margin-top:10px"><label>Açıklama</label><textarea id="e_a">'+(rec.aciklama||'')+'</textarea></div>';
  }else{
    document.getElementById('editTitle').textContent='✏️ Aday — '+rec.ad;
    html+='<div class="form-group"><label>Kaynak</label><select id="e_k">'+opts(CFG.recruitSources,rec.kaynak)+'</select></div>';
    html+='<div class="form-group"><label>Durum</label><select id="e_d">'+opts(CFG.recruitDurums,rec.durum)+'</select></div>';
    html+='<div class="form-group"><label>Randevu Tarihi</label><input type="date" id="e_rv" value="'+(rec.randevu_tarihi||'')+'"/></div>';
    html+='<div class="form-group"><label>Randevu Saati</label><input type="time" id="e_rs" value="'+(rec.randevu_saati||'')+'"/></div>';
    html+='</div><div class="form-group" style="margin-top:10px"><label>Açıklama</label><textarea id="e_a">'+(rec.aciklama||'')+'</textarea></div>';
  }
  document.getElementById('editContent').innerHTML=html;
  document.getElementById('editModal').classList.add('show');
}

function hideEdit(){document.getElementById('editModal').classList.remove('show');editRec=null;editTbl=null;}

async function saveEdit(){
  if(!editRec||!editTbl)return;
  let data={};
  if(editTbl==='gd_leads'){data={ad:cap(document.getElementById('e_ad').value.trim()),telefon:document.getElementById('e_tel').value.trim(),kaynak:document.getElementById('e_k').value,danisman:document.getElementById('e_dan').value.trim()||null,durum:document.getElementById('e_d').value,aciklama:document.getElementById('e_a').value.trim(),sonraki_takip:document.getElementById('e_t').value||null};}
  else{data={ad:cap(document.getElementById('e_ad').value.trim()),telefon:document.getElementById('e_tel').value.trim(),kaynak:document.getElementById('e_k').value,durum:document.getElementById('e_d').value,aciklama:document.getElementById('e_a').value.trim(),randevu_tarihi:document.getElementById('e_rv').value||null,randevu_saati:document.getElementById('e_rs').value||null};}
  try{await api(editTbl,'PATCH',data,'id=eq.'+editRec.id);document.getElementById('editMsg').innerHTML='<div class="success-msg">✅ Güncellendi!</div>';await loadData();setTimeout(()=>{hideEdit();renderContent(editTbl==='gd_leads'?'portfolyo':'recruiting');},800);}
  catch(e){document.getElementById('editMsg').innerHTML='<div class="error-msg">❌ '+e.message+'</div>';}
}

// ===== ŞİFRE =====
function showPassModal(){document.getElementById('passModal').classList.add('show');}
function hidePassModal(){document.getElementById('passModal').classList.remove('show');}
function changePass(){
  const o=document.getElementById('oldPass').value;const n1=document.getElementById('newPass').value;const n2=document.getElementById('newPass2').value;
  if(USERS[CU.username].pass!==o){document.getElementById('passMsg').innerHTML='<div class="error-msg">Mevcut şifre hatalı!</div>';return;}
  if(n1!==n2){document.getElementById('passMsg').innerHTML='<div class="error-msg">Şifreler eşleşmiyor!</div>';return;}
  if(n1.length<4){document.getElementById('passMsg').innerHTML='<div class="error-msg">En az 4 karakter!</div>';return;}
  USERS[CU.username].pass=n1;saveUsers();document.getElementById('passMsg').innerHTML='<div class="success-msg">✅ Güncellendi!</div>';setTimeout(hidePassModal,1500);
}

// ===== CSV =====
function expCSV(type){
  const data=type==='leads'?allData.leads:allData.recruiting;if(!data.length){alert('Veri yok!');return;}
  const keys=Object.keys(data[0]).filter(k=>k!=='id');
  let csv=keys.join(',')+'\n';data.forEach(r=>{csv+=keys.map(k=>'"'+(r[k]||'').toString().replace(/"/g,'""')+'"').join(',')+'\n';});
  const b=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=(type==='leads'?'portfolyo':'recruiting')+'_'+today()+'.csv';a.click();
}

// ===== BAŞLAT =====
(async function(){
  const isToken=await checkToken();
  if(!isToken){
    if(!checkRemember()){
      document.getElementById('loginPage').classList.remove('hidden');
      ['loginUser','loginPass'].forEach(id=>document.getElementById(id).addEventListener('keypress',e=>{if(e.key==='Enter')doLogin();}));
    }
  }
})();
</script>
