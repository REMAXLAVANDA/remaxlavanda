<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">

<style>
:root { --red: #DC1C2E; --blue: #003DA5; --darkblue: #0C2749; --gray: #404041; --lightgray: #F5F6F8; --border: #E3E6EB; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--lightgray); color: var(--gray); }
.header { background: linear-gradient(135deg, var(--darkblue), var(--blue)); color: white; padding: 24px 20px; }
.header-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 20px; font-weight: 700; }
.subtitle { font-size: 12px; opacity: 0.9; margin-top: 4px; }
.tabs { display: flex; background: white; border-bottom: 1px solid var(--border); max-width: 1200px; margin: 0 auto; padding: 0 20px; }
.tab { padding: 16px 20px; font-size: 14px; font-weight: 500; border: none; background: none; cursor: pointer; color: #999; border-bottom: 3px solid transparent; }
.tab.active { color: var(--darkblue); border-bottom-color: var(--red); }
.content { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 24px; }
.card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.card h3 { font-size: 14px; color: var(--darkblue); margin-bottom: 8px; font-weight: 600; }
.card-stat { font-size: 36px; font-weight: 700; color: var(--red); margin: 12px 0; }
.card-meta { font-size: 12px; color: #999; }
table { width: 100%; border-collapse: collapse; background: white; border: 1px solid var(--border); border-radius: 8px; margin-top: 16px; }
th { background: var(--lightgray); padding: 12px; text-align: left; font-size: 12px; font-weight: 600; border-bottom: 1px solid var(--border); }
td { padding: 12px; font-size: 13px; border-bottom: 1px solid #f0f0f0; }
tr:hover { background: #fafafa; }
.badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.badge-hot { background: #FBEEDB; color: #C9821A; }
.badge-ok { background: #E2F2E8; color: #1C8C4B; }
.badge-bad { background: #FBE3E5; color: var(--red); }
.tab-pane { display: none; }
.tab-pane.show { display: block; }
.section-title { font-size: 16px; font-weight: 700; color: var(--darkblue); margin: 24px 0 12px 0; }
.loading { text-align: center; padding: 40px; color: #999; }
</style>
</head>
<body>

    </div>

</div>

<div class="tabs" id="navTabs"></div>
<div class="content" id="content"><div class="loading">Veriler yükleniyor...</div></div>

<script>

let data = { leads: [], recruiting: [] };

async function loadData() {
  const [leadsRes, recruitRes] = await Promise.all([
    sb.from('gd_leads').select('*').order('tarih', { ascending: false }),
    sb.from('recruiting_candidates').select('*').order('created_at', { ascending: false })
  ]);
  data.leads = leadsRes.data || [];
  data.recruiting = recruitRes.data || [];
  renderTabs();
  renderContent('panel');
}

function renderTabs() {
  const nav = document.getElementById('navTabs');
  [
    { id: 'panel', label: '📊 Panel' },
    { id: 'leads', label: `👤 GD Leads (${data.leads.length})` },
    { id: 'recruiting', label: `👥 Recruiting (${data.recruiting.length})` }
  ].forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.textContent = t.label;
    btn.onclick = () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      btn.classList.add('active');
      renderContent(t.id);
    };
    nav.appendChild(btn);
  });
}

function badge(durum) {
  const cls = durum === 'Kazanıldı' ? 'badge-ok' : durum === 'Kaybedildi' || durum === 'Olumsuz' ? 'badge-bad' : 'badge-hot';
  return `<span class="badge ${cls}">${durum || '—'}</span>`;
}
