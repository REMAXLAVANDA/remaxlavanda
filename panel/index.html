<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RE/MAX LAVANDA - Ofis Yönetim Sistemi</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
:root { --red: #DC1C2E; --blue: #003DA5; --darkblue: #0C2749; --gray: #404041; --lightgray: #F5F6F8; --border: #E3E6EB; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--lightgray); color: var(--gray); }
.header { background: linear-gradient(135deg, var(--darkblue), var(--blue)); color: white; padding: 24px 20px; }
.header-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 20px; font-weight: 700; }
.subtitle { font-size: 12px; opacity: 0.9; margin-top: 4px; }
.tabs { display: flex; background: white; border-bottom: 1px solid var(--border); max-width: 1200px; margin: 0 auto; padding: 0 20px; }
.tab { padding: 16px 20px; font-size: 14px; font-weight: 500; border: none; background: none; cursor: pointer; color: #999; border-bottom: 3px solid transparent; }
.tab.active { color: var(--darkblue); border-bottom-color: var(--red); }
.content { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 24px; }
.card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.card h3 { font-size: 14px; color: var(--darkblue); margin-bottom: 8px; font-weight: 600; }
.card-stat { font-size: 36px; font-weight: 700; color: var(--red); margin: 12px 0; }
.card-meta { font-size: 12px; color: #999; }
table { width: 100%; border-collapse: collapse; background: white; border: 1px solid var(--border); border-radius: 8px; margin-top: 16px; }
th { background: var(--lightgray); padding: 12px; text-align: left; font-size: 12px; font-weight: 600; border-bottom: 1px solid var(--border); }
td { padding: 12px; font-size: 13px; border-bottom: 1px solid #f0f0f0; }
tr:hover { background: #fafafa; }
.badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.badge-hot { background: #FBEEDB; color: #C9821A; }
.badge-ok { background: #E2F2E8; color: #1C8C4B; }
.badge-bad { background: #FBE3E5; color: var(--red); }
.section-title { font-size: 16px; font-weight: 700; color: var(--darkblue); margin: 24px 0 12px 0; }
.loading { text-align: center; padding: 40px; color: #999; }
.error { background: #FBE3E5; color: var(--red); padding: 16px; border-radius: 8px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-content">
    <div>
      <div class="logo">RE/MAX LAVANDA</div>
      <div class="subtitle">Ofis Yönetim Sistemi</div>
    </div>
    <div style="background:rgba(255,255,255,0.2);padding:8px 16px;border-radius:20px;font-size:12px;">👤 Admin Panel</div>
  </div>
</div>

<div class="tabs" id="navTabs"></div>
<div class="content" id="content"><div class="loading">Veriler yükleniyor...</div></div>

<script>
window.addEventListener('load', async function() {
  const SUPABASE_URL = 'https://vfqkmluqaihpgxhqiql.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmcWttbHVxamFpaHBneGhxbHF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NTE4ODMsImV4cCI6MjA5ODMyNzg4M30.6jsmD-om_q2ac9zbrHORO8FU9TUjvqAsBh9ux1xhiD8';
  
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  let data = { leads: [], recruiting: [] };

  try {
    const [leadsRes, recruitRes] = await Promise.all([
      sb.from('gd_leads').select('*').order('tarih', { ascending: false }),
      sb.from('recruiting_candidates').select('*').order('created_at', { ascending: false })
    ]);
    if (leadsRes.error) throw leadsRes.error;
    if (recruitRes.error) throw recruitRes.error;
    data.leads = leadsRes.data || [];
    data.recruiting = recruitRes.data || [];
    renderTabs();
    renderContent('panel');
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="error">❌ Hata: ' + e.message + '</div>';
  }

  function renderTabs() {
    const nav = document.getElementById('navTabs');
    nav.innerHTML = '';
    [
      { id: 'panel', label: '📊 Panel' },
      { id: 'leads', label: '👤 GD Leads (' + data.leads.length + ')' },
      { id: 'recruiting', label: '👥 Recruiting (' + data.recruiting.length + ')' }
    ].forEach(function(t, i) {
      const btn = document.createElement('button');
      btn.className = 'tab' + (i === 0 ? ' active' : '');
      btn.textContent = t.label;
      btn.onclick = function() {
        document.querySelectorAll('.tab').forEach(function(x) { x.classList.remove('active'); });
        btn.classList.add('active');
        renderContent(t.id);
      };
      nav.appendChild(btn);
    });
  }

  function badge(durum) {
    const cls = durum === 'Kazanıldı' ? 'badge-ok' : (durum === 'Kaybedildi' || durum === 'Olumsuz') ? 'badge-bad' : 'badge-hot';
    return '<span class="badge ' + cls + '">' + (durum || '—') + '</span>';
  }

  function renderContent(tabId) {
    const c = document.getElementById('content');
    if (tabId === 'panel') {
      const open = data.leads.filter(function(l) { return !['Kazanıldı','Kaybedildi'].includes(l.durum); }).length;
      const won = data.leads.filter(function(l) { return l.durum === 'Kazanıldı'; }).length;
      const active = data.recruiting.filter(function(r) { return r.durum !== 'Olumsuz'; }).length;
      c.innerHTML = '<div class="grid">'
        + '<div class="card"><h3>📋 Açık Leads</h3><div class="card-stat">' + open + '</div><div class="card-meta">Takip edileniyor</div></div>'
        + '<div class="card"><h3>✅ Kazanılan</h3><div class="card-stat">' + won + '</div><div class="card-meta">Başarılı</div></div>'
        + '<div class="card"><h3>👥 Aktif Adaylar</h3><div class="card-stat">' + active + '</div><div class="card-meta">Recruiting</div></div>'
        + '</div>'
        + '<div class="section-title">📊 Son GD Leads</div>'
        + '<table><thead><tr><th>Ad</th><th>Telefon</th><th>Kaynak</th><th>Durum</th><th>Danışman</th></tr></thead><tbody>'
        + data.leads.slice(0,10).map(function(l) {
            return '<tr><td><strong>' + (l.ad||'') + '</strong></td><td>' + (l.telefon||'—') + '</td><td>' + (l.kaynak||'—') + '</td><td>' + badge(l.durum) + '</td><td>' + (l.danisman||'—') + '</td></tr>';
          }).join('')
        + '</tbody></table>';
    } else if (tabId === 'leads') {
      c.innerHTML = '<div class="section-title">👤 Tüm GD Leads (' + data.leads.length + ')</div>'
        + '<table><thead><tr><th>Tarih</th><th>Ad</th><th>Telefon</th><th>Kaynak</th><th>Açıklama</th><th>Durum</th><th>Danışman</th></tr></thead><tbody>'
        + data.leads.map(function(l) {
            return '<tr><td>' + (l.tarih||'—') + '</td><td><strong>' + (l.ad||'') + '</strong></td><td>' + (l.telefon||'—') + '</td><td>' + (l.kaynak||'—') + '</td><td>' + (l.aciklama||'—') + '</td><td>' + badge(l.durum) + '</td><td>' + (l.danisman||'—') + '</td></tr>';
          }).join('')
        + '</tbody></table>';
    } else if (tabId === 'recruiting') {
      c.innerHTML = '<div class="section-title">👥 Recruiting Adayları (' + data.recruiting.length + ')</div>'
        + '<table><thead><tr><th>Ad</th><th>Telefon</th><th>Kaynak</th><th>Durum</th><th>Açıklama</th></tr></thead><tbody>'
        + data.recruiting.map(function(r) {
            return '<tr><td><strong>' + (r.ad||'') + '</strong></td><td>' + (r.telefon||'—') + '</td><td>' + (r.kaynak||'—') + '</td><td>' + badge(r.durum) + '</td><td>' + (r.aciklama||'—') + '</td></tr>';
          }).join('')
        + '</tbody></table>';
    }
  }
});
</script>

</body>
</html>
