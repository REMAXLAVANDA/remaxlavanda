<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>RE/MAX LAVANDA</title>
<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- LOGIN -->
<div id="lp" class="lw">
  <div class="lb">
    <div class="ll">RE/MAX LAVANDA</div>
    <div class="ls">Ofis Yönetim Sistemi</div>
    <input type="text" id="lu" placeholder="Kullanıcı adı" autocomplete="username"/>
    <input type="password" id="lpass" placeholder="Şifre" autocomplete="current-password"/>
    <label class="lck"><input type="checkbox" id="rem"/> Beni hatırla (30 gün)</label>
    <button class="btn-l" onclick="doLogin()">Giriş Yap</button>
    <div id="lerr" class="lerr"></div>
  </div>
</div>

<!-- PIN -->
<div id="po" class="po">
  <div class="pb">
    <h3>🔐 PIN Doğrulama</h3>
    <div class="psub" id="psub">4 haneli PIN girin</div>
    <input type="password" id="pi" class="pi" maxlength="4" placeholder="••••" oninput="pkInput(this.value)"/>
    <div class="pnp">
      <button class="pk" onclick="pk('1')">1</button><button class="pk" onclick="pk('2')">2</button><button class="pk" onclick="pk('3')">3</button>
      <button class="pk" onclick="pk('4')">4</button><button class="pk" onclick="pk('5')">5</button><button class="pk" onclick="pk('6')">6</button>
      <button class="pk" onclick="pk('7')">7</button><button class="pk" onclick="pk('8')">8</button><button class="pk" onclick="pk('9')">9</button>
      <button class="pk del" onclick="pd()">⌫</button><button class="pk" onclick="pk('0')">0</button><button class="pk ok" onclick="pok()">✓</button>
    </div>
    <div id="perr" class="perr"></div>
  </div>
</div>

<div id="overlay" onclick="toggleSidebar()"></div>
<!-- APP -->
<div id="app" class="hidden">
  <!-- Header -->
  <div class="hd">
    <div class="hd-left">
      <button id="hamburger" class="bh" onclick="toggleSidebar()" style="display:none;margin-right:8px">☰</button>
      <div>
        <div class="hl">RE/MAX LAVANDA</div>
        <div class="hs">Ofis Yönetim Sistemi</div>
      </div>
    </div>
    <div class="hd-right">
      <div><div class="ub" id="ub">👤</div><div class="ll2" id="li"></div></div>
      <button class="bh" onclick="spm()">🔑 Şifre</button>
      <button class="bh" onclick="logout()">Çıkış</button>
    </div>
  </div>
  <!-- Body -->
  <div class="app-body">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">MENÜ</div>
        <div id="tabs"></div>
      </div>
    </div>
    <!-- Main -->
    <div class="main-ct">
      <div id="ct"><div class="loading">⏳ Yükleniyor...</div></div>
    </div>
  </div>
</div>

<!-- ŞİFRE MODAL -->
<div id="pm" class="mo">
  <div class="md">
    <h3>🔑 Şifre Değiştir</h3>
    <div class="fgr" style="margin-bottom:10px"><label>Mevcut Şifre</label><input type="password" id="op"/></div>
    <div class="fgr" style="margin-bottom:10px"><label>Yeni Şifre</label><input type="password" id="np"/></div>
    <div class="fgr"><label>Yeni Şifre Tekrar</label><input type="password" id="np2"/></div>
    <div id="pm-msg"></div>
    <div class="mda"><button class="btn btn-g" onclick="hpm()">İptal</button><button class="btn btn-p" onclick="chpass()">Kaydet</button></div>
  </div>
</div>

<!-- EDIT MODAL -->
<div id="em" class="mo">
  <div class="md">
    <h3 id="et">Düzenle</h3>
    <div id="ec"></div>
    <div id="em-msg"></div>
    <div class="mda"><button class="btn btn-g" onclick="hem()">İptal</button><button class="btn btn-p" onclick="svEdit()">Kaydet</button></div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
