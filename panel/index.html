<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>RE/MAX LAVANDA</title>
<style>
:root{--red:#DC1C2E;--blue:#003DA5;--dk:#0C2749;--gr:#404041;--lg:#F5F6F8;--bd:#E3E6EB;--gn:#1C8C4B;--or:#C9821A;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--lg);color:var(--gr);min-height:100vh;}

/* LOGIN */
.lw{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--dk),var(--blue));padding:20px;}
.lb{background:#fff;border-radius:20px;padding:36px 32px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center;}
.ll{font-size:20px;font-weight:800;color:var(--dk);margin-bottom:4px;}
.ls{font-size:12px;color:#999;margin-bottom:24px;}
.lb input{width:100%;padding:12px 14px;border:1.5px solid var(--bd);border-radius:10px;font-size:14px;margin-bottom:10px;outline:none;}
.lb input:focus{border-color:var(--blue);}
.lck{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:13px;color:#666;justify-content:center;}
.lck input{width:auto;margin:0;}
.btn-l{width:100%;padding:13px;background:var(--dk);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;}
.btn-l:hover{background:var(--blue);}
.lerr{color:var(--red);font-size:12px;margin-top:6px;}

/* PIN */
.po{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;align-items:center;justify-content:center;padding:20px;}
.po.show{display:flex;}
.pb{background:#fff;border-radius:20px;padding:32px 28px;width:100%;max-width:300px;text-align:center;}
.pb h3{font-size:17px;font-weight:800;color:var(--dk);margin-bottom:4px;}
.psub{font-size:12px;color:#999;margin-bottom:20px;}
.pi{font-size:26px;letter-spacing:10px;text-align:center;border:2px solid var(--bd);border-radius:12px;padding:12px;width:100%;font-weight:800;background:var(--lg);}
.pi:focus{border-color:var(--blue);outline:none;}
.pnp{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px;}
.pk{padding:15px;background:var(--lg);border:none;border-radius:10px;font-size:18px;font-weight:700;cursor:pointer;color:var(--dk);}
.pk:active{background:var(--bd);}
.pk.del{background:#fee2e2;color:var(--red);}
.pk.ok{background:var(--dk);color:#fff;}
.perr{color:var(--red);font-size:12px;margin-top:8px;}

/* HEADER */
.hd{background:linear-gradient(135deg,var(--dk),var(--blue));color:#fff;padding:12px 16px;}
.hc{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.hl{font-size:15px;font-weight:800;}
.hs{font-size:10px;opacity:.75;margin-top:1px;}
.hr{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.ub{background:rgba(255,255,255,.15);padding:5px 10px;border-radius:16px;font-size:11px;white-space:nowrap;}
.ll2{font-size:9px;opacity:.7;margin-top:1px;}
.bh{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;padding:5px 10px;border-radius:7px;font-size:11px;cursor:pointer;white-space:nowrap;}

/* TABS */
.tb{background:#fff;border-bottom:1px solid var(--bd);overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tabs{display:flex;max-width:1400px;margin:0 auto;padding:0 12px;min-width:max-content;}
.tab{padding:12px 14px;font-size:12px;font-weight:500;border:none;background:none;cursor:pointer;color:#999;border-bottom:3px solid transparent;white-space:nowrap;}
.tab.active{color:var(--dk);border-bottom-color:var(--red);font-weight:700;}

/* CONTENT */
.ct{max-width:1400px;margin:0 auto;padding:14px;}

/* CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px;}
.card{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:14px;}
.card h3{font-size:10px;color:#999;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
.cs{font-size:24px;font-weight:800;color:var(--dk);}
.csub{font-size:10px;color:#bbb;margin-top:2px;}
.card.red .cs{color:var(--red);}
.card.green .cs{color:var(--gn);}
.card.orange .cs{color:var(--or);}
.card.blue .cs{color:var(--blue);}

/* GAUGE */
.gauge-w{display:flex;flex-direction:column;align-items:center;}

/* PROGRESS */
.pi2{margin-bottom:10px;}
.pl{display:flex;justify-content:space-between;margin-bottom:3px;}
.pn{font-size:12px;font-weight:600;color:var(--dk);}
.pv{font-size:11px;color:#666;}
.pb2{background:#f0f0f0;border-radius:6px;height:9px;overflow:hidden;}
.pf{height:100%;border-radius:6px;transition:width .4s;}

/* LAYOUT */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.rec-lay{display:grid;grid-template-columns:1fr 300px;gap:14px;}
@media(max-width:800px){.two-col,.rec-lay{grid-template-columns:1fr;}}
.col-box{background:#fff;border:1px solid var(--bd);border-radius:14px;padding:16px;}
.col-box h2{font-size:13px;font-weight:700;color:var(--dk);margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--red);}

/* TABLE */
.th{display:flex;justify-content:space-between;align-items:center;margin:12px 0 8px;}
.tt{font-size:13px;font-weight:700;color:var(--dk);}
.ta{display:flex;gap:6px;flex-wrap:wrap;}
.tw{background:#fff;border:1px solid var(--bd);border-radius:10px;overflow:hidden;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.sb{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.sb input,.sb select{padding:7px 10px;border:1.5px solid var(--bd);border-radius:8px;font-size:12px;outline:none;min-width:100px;}
.sb input:focus,.sb select:focus{border-color:var(--blue);}
table{width:100%;border-collapse:collapse;min-width:400px;}
th{background:var(--lg);padding:9px 10px;text-align:left;font-size:10px;font-weight:700;border-bottom:1px solid var(--bd);color:#666;text-transform:uppercase;white-space:nowrap;}
td{padding:9px 10px;font-size:12px;border-bottom:1px solid #f5f5f5;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafafa;}

/* MINI TABLE */
.mt{width:100%;border-collapse:collapse;}
.mt th{font-size:10px;font-weight:700;color:#666;padding:6px 8px;background:var(--lg);border-bottom:1px solid var(--bd);text-align:left;}
.mt td{font-size:11px;padding:6px 8px;border-bottom:1px solid #f5f5f5;}
.mt tr:last-child td{border-bottom:none;}

/* BADGE */
.badge{display:inline-block;padding:2px 8px;border-radius:16px;font-size:10px;font-weight:700;}
.b-ar{background:#E8F0FE;color:#1a56db;} .b-ca{background:#FEF3C7;color:#92400e;}
.b-go{background:#EDE9FE;color:#5b21b6;} .b-1g{background:#E0F2FE;color:#0369a1;}
.b-2g{background:#F0FDF4;color:#15803d;} .b-si{background:#FBEEDB;color:var(--or);}
.b-so{background:#F0F0F0;color:#555;} .b-ka{background:#E2F2E8;color:var(--gn);}
.b-kb{background:#FBE3E5;color:var(--red);} .b-bk{background:#FEF3C7;color:#92400e;}
.b-rv{background:#EDE9FE;color:#5b21b6;} .b-ol{background:#FBE3E5;color:var(--red);}
.b-kl{background:#1a1a1a;color:#fff;} .b-sa{background:#E8F0FE;color:#1a56db;}
.b-ki{background:#FEF3C7;color:#92400e;} .b-ac{background:#fde68a;color:#92400e;}

/* BTN */
.btn{padding:7px 13px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
.btn-p{background:var(--dk);color:#fff;} .btn-p:hover{background:var(--blue);}
.btn-g{background:#fff;color:var(--gr);border:1px solid var(--bd);}
.btn-r{background:#fee2e2;color:var(--red);border:none;}
.btn-sm{padding:4px 9px;font-size:11px;border-radius:6px;}
.btn-wa{background:#25D366;color:#fff;border:none;border-radius:5px;padding:3px 7px;font-size:10px;cursor:pointer;text-decoration:none;display:inline-block;}
.btn-ora{background:var(--or);color:#fff;border:none;border-radius:6px;padding:4px 9px;font-size:11px;cursor:pointer;}

/* FORM */
.fw{background:#fff;border:1px solid var(--bd);border-radius:14px;padding:18px;margin-bottom:12px;}
.fw h3{font-size:13px;font-weight:700;color:var(--dk);margin-bottom:14px;}
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:9px;}
.fgr{display:flex;flex-direction:column;gap:4px;}
.fgr label{font-size:10px;font-weight:700;color:#666;text-transform:uppercase;}
.fgr input,.fgr select,.fgr textarea{padding:9px 11px;border:1.5px solid var(--bd);border-radius:8px;font-size:13px;outline:none;font-family:inherit;width:100%;}
.fgr input:focus,.fgr select:focus,.fgr textarea:focus{border-color:var(--blue);}
.fgr textarea{resize:vertical;min-height:60px;}
.fa{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;}
.ss{padding:3px 7px;border:1px solid var(--bd);border-radius:5px;font-size:11px;cursor:pointer;background:#fff;}

/* TAKVİM - Kart bazlı */
.cal-box{background:#fff;border:1px solid var(--bd);border-radius:14px;overflow:hidden;}
.cal-hd{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--bd);background:var(--lg);}
.cal-t{font-size:12px;font-weight:700;color:var(--dk);}
.cal-b{padding:4px 10px;border:1px solid var(--bd);border-radius:6px;background:#fff;cursor:pointer;font-size:11px;}
.cal-slots{padding:8px;}
.cal-slot{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;padding:8px;border-radius:8px;background:var(--lg);}
.cal-time{font-size:11px;font-weight:700;color:var(--dk);min-width:36px;}
.cal-events{flex:1;}
.cal-ev{border-radius:6px;padding:6px 10px;margin-bottom:4px;font-size:11px;font-weight:600;cursor:pointer;}
.cal-ev.ok{background:#E2F2E8;color:var(--gn);}
.cal-ev.pend{background:#FBEEDB;color:var(--or);}
.cal-ev.def{background:#E8F0FE;color:var(--blue);}
.cal-empty{font-size:10px;color:#ccc;padding:4px 0;}
.cal-noev{text-align:center;padding:20px;font-size:12px;color:#ccc;}

/* PORTFÖY HAVUZU */
.hav-item{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:10px;}
.hav-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.hav-tip{font-size:13px;font-weight:700;color:var(--dk);}
.hav-dan{font-size:11px;color:#999;}
.hav-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.hav-tag{background:var(--lg);border:1px solid var(--bd);padding:2px 8px;border-radius:5px;font-size:10px;font-weight:600;}

/* SANTRAL */
.sant-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border:1px solid var(--bd);border-radius:10px;margin-bottom:8px;}
.sant-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.sant-dot.open{background:var(--red);animation:pulse 1.5s infinite;}
.sant-dot.closed{background:var(--gn);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.sant-info{flex:1;}
.sant-tel{font-size:13px;font-weight:700;color:var(--dk);}
.sant-sub{font-size:11px;color:#999;}

/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:flex-end;justify-content:center;padding:0;}
.mo.show{display:flex;}
@media(min-width:600px){.mo{align-items:center;padding:20px;}}
.md{background:#fff;border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:540px;box-shadow:0 -10px 40px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto;}
@media(min-width:600px){.md{border-radius:16px;}}
.md h3{font-size:15px;font-weight:700;color:var(--dk);margin-bottom:16px;}
.mda{margin-top:16px;display:flex;gap:8px;justify-content:flex-end;}

/* AYARLAR */
.ss2{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:12px;}
.ss2 h3{font-size:13px;font-weight:700;color:var(--dk);margin-bottom:12px;}
.tag-l{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.tag-i{display:flex;align-items:center;gap:4px;background:var(--lg);border:1px solid var(--bd);border-radius:16px;padding:4px 10px;font-size:11px;}
.tag-i input.edit-in{border:none;background:transparent;font-size:11px;color:var(--gr);width:80px;outline:none;}
.tag-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:13px;font-weight:700;padding:0 2px;}
.tag-ed{background:none;border:none;color:var(--blue);cursor:pointer;font-size:11px;padding:0 2px;}
.tag-add{display:flex;gap:6px;}
.tag-add input{padding:7px 10px;border:1.5px solid var(--bd);border-radius:8px;font-size:12px;outline:none;flex:1;}

/* SORGU */
.rbox{background:#fff8e1;border:1px solid #ffc107;border-radius:10px;padding:12px;margin-bottom:12px;font-size:12px;}
.rdots{display:flex;gap:5px;margin-top:5px;}
.dot{width:11px;height:11px;border-radius:50%;background:var(--gn);}
.dot.u{background:#ddd;}

/* UTILS */
.hidden{display:none;}
.loading{text-align:center;padding:40px;color:#999;}
.ok-m{background:#E2F2E8;color:var(--gn);padding:9px 13px;border-radius:8px;margin:7px 0;font-size:12px;}
.err-m{background:#FBE3E5;color:var(--red);padding:9px 13px;border-radius:8px;margin:7px 0;font-size:12px;}
.dup-w{background:#fff8e1;border:1px solid #ffc107;border-radius:7px;padding:9px 12px;margin-bottom:9px;font-size:11px;color:#856404;}
.tok{font-family:monospace;font-size:10px;background:#f0f0f0;padding:2px 6px;border-radius:4px;color:var(--blue);word-break:break-all;}
.div{height:1px;background:var(--bd);margin:12px 0;}
.info-box{background:#EDE9FE;border:1px solid #c4b5fd;border-radius:8px;padding:10px 12px;font-size:11px;color:#5b21b6;margin-bottom:12px;}
</style>
</head>

<!-- LOGIN -->
<div id="lp" class="lw">
  <div class="lb">
    <div class="ll">RE/MAX LAVANDA</div>
    <div class="ls">Ofis Yönetim Sistemi</div>
    <input type="text" id="lu" placeholder="Kullanıcı adı" autocomplete="username"/>

<!-- APP -->

  <div class="hd">

<div id="pm" class="mo">

    <div class="mda"><button class="btn btn-g" onclick="hpm()">İptal</button><button class="btn btn-p" onclick="chpass()">Kaydet</button></div>
  </div>
</div>

<div id="em" class="mo">

    <h3 id="et">Düzenle</h3>
    <div id="ec"></div>
    <div id="em-msg"></div>
    <div class="mda"><button class="btn btn-g" onclick="hem()">İptal</button><button class="btn btn-p" onclick="svEdit()">Kaydet</button></div>
  </div>
</div>

<script>

const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmcWttbHVxamFpaHBneGhxbHF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NTE4ODMsImV4cCI6MjA5ODMyNzg4M30.6jsmD-om_q2ac9zbrHORO8FU9TUjvqAsBh9ux1xhiD8';

};

const tok=new URLSearchParams(window.location.search).get('token');

function cap(s){if(!s)return'';return s.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' ');}
function td(){return new Date().toISOString().split('T')[0];}
function wAgo(){const d=new Date();d.setDate(d.getDate()-7);return d.toISOString().split('T')[0];}
function gTok(){const c='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';let t='';for(let i=0;i<14;i++)t+=c[Math.floor(Math.random()*c.length)];return t;}

async function api(t,m,b,f){
  let url=SB+'/rest/v1/'+t;if(f)url+='?'+f;
  const o={method:m||'GET',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':m==='POST'?'return=representation':(m==='PATCH'?'return=representation':'')}};

  const tx=await r.text();return tx?JSON.parse(tx):[];
}

async function load(){

// GAUGE
function gauge(pct,lbl){
  const r=55,cx=65,cy=65,sw=13;
  const ra=a=>a*Math.PI/180;
  const x1=cx+r*Math.cos(ra(-180)),y1=cy+r*Math.sin(ra(-180));
  const x2=cx+r*Math.cos(ra(0)),y2=cy+r*Math.sin(ra(0));
  const a=-180+pct*1.8;const ax=cx+r*Math.cos(ra(a)),ay=cy+r*Math.sin(ra(a));
  const col=pct<30?'#DC1C2E':pct<60?'#C9821A':'#1C8C4B';
  return`<div class="gauge-w"><svg viewBox="0 0 130 75" style="width:130px;height:75px">
    <path d="M${x1},${y1} A${r},${r} 0 0,1 ${x2},${y2}" fill="none" stroke="#f0f0f0" stroke-width="${sw}" stroke-linecap="round"/>
    <path d="M${x1},${y1} A${r},${r} 0 0,1 ${ax},${ay}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-linecap="round"/>
    <text x="${cx}" y="${cy-2}" text-anchor="middle" font-size="16" font-weight="800" fill="${col}">${pct}%</text>
    <text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="8" fill="#999">${lbl}</text>
  </svg></div>`;
}

function progBar(nm,v,mx,col){
  const p=mx>0?Math.round(v/mx*100):0;
  return`<div class="pi2"><div class="pl"><span class="pn">${nm}</span><span class="pv">${v}/${mx} (${p}%)</span></div><div class="pb2"><div class="pf" style="width:${p}%;background:${col}"></div></div></div>`;
}

// ÖZET
function rOzet(c,per,cs,ce){
  per=per||'month';
  const now=new Date();let st,en=td();
  if(per==='week'){const d=new Date();d.setDate(d.getDate()-7);st=d.toISOString().split('T')[0];}
  else if(per==='month'){st=new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0];}
  else if(per==='3m'){const d=new Date();d.setMonth(d.getMonth()-3);st=d.toISOString().split('T')[0];}
  else if(per==='year'){st=now.getFullYear()+'-01-01';}
  else if(per==='custom'&&cs&&ce){st=cs;en=ce;}
  if(!st)st=new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0];

  const ls=D.leads.filter(l=>l.tarih>=st&&l.tarih<=en);
  const rs=D.rec.filter(r=>(r.created_at||'').slice(0,10)>=st&&(r.created_at||'').slice(0,10)<=en);
  const tL=ls.length,wL=ls.filter(l=>l.durum==='Kazanıldı').length;
  const tR=rs.length,okR=rs.filter(r=>!['Olumsuz','Kara Liste'].includes(r.durum)).length;
  const rL=tL>0?Math.round(wL/tL*100):0,rR=tR>0?Math.round(okR/tR*100):0;
  const byD={};ls.forEach(l=>{if(l.danisman){if(!byD[l.danisman])byD[l.danisman]={t:0,k:0};byD[l.danisman].t++;if(l.durum==='Kazanıldı')byD[l.danisman].k++;}});
  const byLS={};ls.forEach(l=>{const k=l.kaynak||'?';if(!byLS[k])byLS[k]={t:0,k:0};byLS[k].t++;if(l.durum==='Kazanıldı')byLS[k].k++;});
  const byRS={};rs.forEach(r=>{const k=r.kaynak||'?';if(!byRS[k])byRS[k]={t:0,ok:0};byRS[k].t++;if(!['Olumsuz','Kara Liste'].includes(r.durum))byRS[k].ok++;});
  const byRD={};rs.forEach(r=>{const d=r.durum||'?';byRD[d]=(byRD[d]||0)+1;});

  const ps=[{id:'week',l:'Bu Hafta'},{id:'month',l:'Bu Ay'},{id:'3m',l:'3 Ay'},{id:'year',l:'Bu Yıl'},{id:'custom',l:'Özel'}];
  let h='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">';
  ps.forEach(p=>h+='<button class="btn btn-sm '+(per===p.id?'btn-p':'btn-g')+'" onclick="rOzetP(\''+p.id+'\')">'+p.l+'</button>');
  h+='</div>';

  h+='<input type="date" id="cs" value="'+(st||'')+'"/> <span>—</span> <input type="date" id="ce" value="'+(en||'')+'"/>';
  h+='<button class="btn btn-sm btn-p" onclick="apCust()">Uygula</button></div>';

  h+='<div class="two-col">';
  // SOL
  h+='<div class="col-box"><h2>🏠 Portföy</h2>';
  h+='<div style="display:flex;justify-content:space-around;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px">';
  h+=gauge(rL,'Dönüşüm');
  h+='<div style="text-align:center"><div style="font-size:22px;font-weight:800;color:var(--dk)">'+tL+'</div><div style="font-size:10px;color:#999">Toplam</div></div>';
  h+='<div style="text-align:center"><div style="font-size:22px;font-weight:800;color:var(--gn)">'+wL+'</div><div style="font-size:10px;color:#999">Kazanılan</div></div>';
  h+='</div><div class="div"></div>';
  h+='<div style="font-size:11px;font-weight:700;color:var(--dk);margin-bottom:8px">Danışman Performansı</div>';
  Object.entries(byD).sort((a,b)=>b[1].k/Math.max(b[1].t,1)-a[1].k/Math.max(a[1].t,1)).forEach(([ad,d])=>{
    const r=d.t>0?Math.round(d.k/d.t*100):0;
    h+=progBar(ad,d.k,d.t,r>=60?'var(--gn)':r>=30?'var(--or)':'var(--red)');
  });
  if(!Object.keys(byD).length)h+='<div style="color:#ccc;font-size:11px;text-align:center">Veri yok</div>';
  h+='<div class="div"></div><div style="font-size:11px;font-weight:700;color:var(--dk);margin-bottom:8px">Kaynak Başarısı</div>';
  h+='<table class="mt"><thead><tr><th>Kaynak</th><th>Lead</th><th>Kazanılan</th><th>Oran</th></tr></thead><tbody>';
  h+=Object.entries(byLS).sort((a,b)=>b[1].t-a[1].t).map(([k,d])=>{const r=d.t>0?Math.round(d.k/d.t*100):0;return'<tr><td>'+k+'</td><td>'+d.t+'</td><td>'+d.k+'</td><td style="color:'+(r>=50?'var(--gn)':'var(--red)')+'">'+r+'%</td></tr>';}).join('');
  h+='</tbody></table></div>';
  // SAĞ
  h+='<div class="col-box"><h2>👥 Recruiting</h2>';
  h+='<div style="display:flex;justify-content:space-around;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px">';
  h+=gauge(rR,'Aktif Oran');
  h+='<div style="text-align:center"><div style="font-size:22px;font-weight:800;color:var(--dk)">'+tR+'</div><div style="font-size:10px;color:#999">Toplam</div></div>';
  h+='<div style="text-align:center"><div style="font-size:22px;font-weight:800;color:var(--gn)">'+okR+'</div><div style="font-size:10px;color:#999">Aktif</div></div>';
  h+='</div><div class="div"></div>';
  h+='<div style="font-size:11px;font-weight:700;color:var(--dk);margin-bottom:8px">Durum Dağılımı</div>';
  const cols={'Görüşüldü':'var(--blue)','1. Görüşme':'var(--blue)','2. Görüşme':'var(--gn)','Sıcak':'var(--or)','Olumsuz':'var(--red)','Kara Liste':'#333','Beklemede':'#999','Randevu':'#5b21b6'};
  Object.entries(byRD).sort((a,b)=>b[1]-a[1]).forEach(([d,n])=>h+=progBar(d,n,tR,cols[d]||'var(--blue)'));
  if(!Object.keys(byRD).length)h+='<div style="color:#ccc;font-size:11px;text-align:center">Veri yok</div>';
  h+='<div class="div"></div><div style="font-size:11px;font-weight:700;color:var(--dk);margin-bottom:8px">Kaynak Başarısı</div>';
  h+='<table class="mt"><thead><tr><th>Kaynak</th><th>Aday</th><th>Aktif</th><th>Oran</th></tr></thead><tbody>';
  h+=Object.entries(byRS).sort((a,b)=>b[1].t-a[1].t).map(([k,d])=>{const r=d.t>0?Math.round(d.ok/d.t*100):0;return'<tr><td>'+k+'</td><td>'+d.t+'</td><td>'+d.ok+'</td><td style="color:'+(r>=50?'var(--gn)':'var(--red)')+'">'+r+'%</td></tr>';}).join('');
  h+='</tbody></table></div></div>';
  c.innerHTML=h;
}

    document.getElementById('lfw')?.classList.remove('hidden');
    const tel=document.getElementById('f_tel');const ad=document.getElementById('f_ad');
    if(tel)tel.value=s.tel||'';if(ad)ad.value=s.ad||'';
    // Santral kaydını kapat
    sant[i].dur='closed';localStorage.setItem('rmx_sant',JSON.stringify(sant));
  },300);
}

function delSant(i){if(!confirm('Silinsin mi?'))return;const s=JSON.parse(localStorage.getItem('rmx_sant')||'[]');s.splice(i,1);localStorage.setItem('rmx_sant',JSON.stringify(s));rSant(document.getElementById('ct'));}

// DANIŞMANLAR
function rDans(c){
  let h='<div class="th"><div class="tt">🔑 Danışmanlar</div><div class="ta"><button class="btn btn-p" onclick="sDanF()">+ Yeni Danışman</button></div></div>';
  h+='<div id="danfw" class="hidden fw"><h3>Yeni Danışman</h3>';
  h+='<div class="fg"><div class="fgr"><label>Ad Soyad *</label><input id="d_ad" oninput="this.value=cap(this.value)"/></div><div class="fgr"><label>PIN (4 hane) *</label><input id="d_pin" maxlength="4" placeholder="1234"/></div></div>';
  h+='<div class="fa"><button class="btn btn-p" onclick="svDan()">Token Oluştur & Kaydet</button><button class="btn btn-g" onclick="hDanF()">İptal</button></div>';
  h+='<div id="danfm"></div></div>';
  h+='<div class="tw"><table><thead><tr><th>Ad</th><th>PIN</th><th>Link</th><th>Atanan</th><th>Kazan.</th><th>Oran</th></tr></thead><tbody>';
  h+=D.dans.map(d=>{
    const link=window.location.origin+window.location.pathname+'?token='+d.token;
    const ml=D.leads.filter(l=>l.danisman===d.ad);const w=ml.filter(l=>l.durum==='Kazanıldı').length;
    return'<tr><td><strong>'+d.ad+'</strong></td><td><code>'+(d.pin||'—')+'</code></td><td><span class="tok">'+link.replace('https://','')+'</span> <button class="btn btn-sm btn-g" onclick="cpL(\''+link+'\')">📋</button></td><td>'+ml.length+'</td><td>'+w+'</td><td>'+(ml.length>0?Math.round(w/ml.length*100):0)+'%</td></tr>';
  }).join('');
  h+='</tbody></table></div>';
  c.innerHTML=h;
}
function sDanF(){document.getElementById('danfw').classList.remove('hidden');}
function hDanF(){document.getElementById('danfw').classList.add('hidden');}
async function svDan(){
  const ad=cap(document.getElementById('d_ad').value.trim());const pin=document.getElementById('d_pin').value.trim();
  if(!ad||pin.length!==4){document.getElementById('danfm').innerHTML='<div class="err-m">Ad ve 4 haneli PIN zorunlu!</div>';return;}
  try{await api('danismanlar','POST',{ad,token:gTok(),pin});document.getElementById('danfm').innerHTML='<div class="ok-m">✅ Eklendi!</div>';await load();setTimeout(()=>{hDanF();rDans(document.getElementById('ct'));},900);}
  catch(e){document.getElementById('danfm').innerHTML='<div class="err-m">❌ '+e.message+'</div>';}
}
function cpL(l){navigator.clipboard.writeText(l).then(()=>alert('Kopyalandı!')).catch(()=>{const t=document.createElement('textarea');t.value=l;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);alert('Kopyalandı!');});}

// AYARLAR
function rAy(c){
  const secs=[
    {k:'lSrc',t:'🏠 Portföy Kaynakları'},{k:'rSrc',t:'👥 Recruiting Kaynakları'},
    {k:'lDur',t:'🏠 Portföy Durumları'},{k:'rDur',t:'👥 Recruiting Durumları'},
    {k:'tipler',t:'🏘️ Gayrimenkul Tipleri'},{k:'islemler',t:'🏘️ İşlem Türleri'},{k:'iller',t:'📍 İller'}
  ];
  let h='';
  secs.forEach(s=>{
    h+='<div class="ss2"><h3>'+s.t+'</h3><div class="tag-l" id="tl_'+s.k+'">';
    h+=CFG[s.k].map((v,i)=>'<div class="tag-i"><span>'+v+'</span><button class="tag-ed" onclick="edTag(\''+s.k+'\','+i+')" title="Düzenle">✏️</button><button class="tag-del" onclick="dlTag(\''+s.k+'\','+i+')" title="Sil">×</button></div>').join('');
    h+='</div><div class="tag-add"><input id="na_'+s.k+'" placeholder="Yeni ekle..."/><button class="btn btn-p btn-sm" onclick="addTag(\''+s.k+'\')">+ Ekle</button></div></div>';
  });
  h+='<div class="ss2"><h3>⚙️ Ofis Şifre & PIN Sıfırla</h3>';
  h+='<div class="fg"><div class="fgr"><label>Yeni Şifre</label><input type="password" id="anp"/></div><div class="fgr"><label>Yeni PIN (4 hane)</label><input id="anpin" maxlength="4" placeholder="4 hane"/></div></div>';
  h+='<div class="fa"><button class="btn btn-p" onclick="adRst()">Sıfırla</button></div><div id="arm"></div></div>';
  c.innerHTML=h;
}
function edTag(k,i){
  const cur=CFG[k][i];
  const yeni=prompt('Değeri düzenle:',cur);
  if(yeni===null)return;
  const v=cap(yeni.trim());
  if(!v)return;
  CFG[k][i]=v;svCFG();rAy(document.getElementById('ct'));
}
function addTag(k){const el=document.getElementById('na_'+k);const v=cap(el.value.trim());if(!v)return;if(!CFG[k].includes(v)){CFG[k].push(v);svCFG();}el.value='';rAy(document.getElementById('ct'));}
function dlTag(k,i){if(confirm('Silmek istiyor musunuz?')){CFG[k].splice(i,1);svCFG();rAy(document.getElementById('ct'));}}
function adRst(){const p=document.getElementById('anp').value.trim();const pin=document.getElementById('anpin').value.trim();let m='';if(p&&p.length>=4){U['ofis'].pass=p;svU();m+='Şifre güncellendi. ';}if(pin&&pin.length===4){U['ofis'].pin=pin;svU();m+='PIN güncellendi.';}document.getElementById('arm').innerHTML=m?'<div class="ok-m">✅ '+m+'</div>':'<div class="err-m">En az biri doldurulmalı!</div>';}

// DANİŞMAN PANELİ
function rDan(c){
  const my=D.leads.filter(l=>l.danisman===CU.danAd);
  const op=my.filter(l=>!['Kazanıldı','Kaybedildi'].includes(l.durum)).length;
  const wn=my.filter(l=>l.durum==='Kazanıldı').length;
  const ht=my.filter(l=>l.durum==='Sıcak').length;
  const rt=my.length>0?Math.round(wn/my.length*100):0;
  let h='<div class="grid"><div class="card"><h3>Toplam</h3><div class="cs">'+my.length+'</div></div>';
  h+='<div class="card red"><h3>Açık</h3><div class="cs">'+op+'</div></div>';
  h+='<div class="card green"><h3>Kazanılan</h3><div class="cs">'+wn+'</div></div>';
  h+='<div class="card orange"><h3>🔥 Sıcak</h3><div class="cs">'+ht+'</div></div>';
  h+='<div class="card blue"><h3>Dönüşüm</h3><div class="cs">'+rt+'%</div></div></div>';
  h+=gauge(rt,'Dönüşüm Oranım');
  h+='<div class="tw" style="margin-top:12px"><table><thead><tr><th>Tarih</th><th>Müşteri</th><th>Tel</th><th>Kaynak</th><th>Açıklama</th><th>Durum</th><th>Takip</th></tr></thead><tbody>';
  h+=my.map(l=>'<tr><td>'+(l.tarih||'—')+'</td><td><strong>'+(l.ad||'')+'</strong></td><td>'+wa(l.telefon)+'</td><td>'+(l.kaynak||'—')+'</td><td>'+(l.aciklama||'—')+'</td><td><select class="ss" onchange="updS(\''+l.id+'\',this.value)">'+opts(CFG.lDur,l.durum)+'</select></td><td>'+(l.sonraki_takip||'—')+'</td></tr>').join('');
  h+='</tbody></table></div>';
  c.innerHTML=h;
}
async function updS(id,d){try{await api('gd_leads','PATCH',{durum:d},'id=eq.'+id);const l=D.leads.find(l=>l.id===id);if(l)l.durum=d;}catch(e){alert('Hata: '+e.message);}}

// PORTFÖY HAVUZU
function rHavuz(c){
  let h='<div class="fw"><h3>🏘️ Arayış / Portföy Ekle</h3>';
  h+='<div class="fg">';
  h+='<div class="fgr"><label>İşlem</label><select id="h_is">'+opts(CFG.islemler,'Satılık')+'</select></div>';
  h+='<div class="fgr"><label>Tip</label><select id="h_tip">'+opts(CFG.tipler,'Daire')+'</select></div>';
  h+='<div class="fgr"><label>İl</label><select id="h_il">'+opts(CFG.iller,'Tekirdağ')+'</select></div>';
  h+='<div class="fgr"><label>İlçe</label><input id="h_ilce" placeholder="İlçe..."/></div>';
  h+='<div class="fgr"><label>Adres / Mahalle</label><input id="h_adr" placeholder="Adres..."/></div>';
  h+='<div class="fgr"><label>Ada / Parsel</label><input id="h_ada" placeholder="Opsiyonel"/></div>';
  h+='<div class="fgr"><label>m²</label><input id="h_m2" type="number" placeholder="m²"/></div>';
  h+='<div class="fgr"><label>Oda</label><input id="h_oda" placeholder="2+1, 3+1..."/></div>';
  h+='<div class="fgr"><label>Fiyat</label><input id="h_fiyat" placeholder="₺ Fiyat"/></div>';
  h+='<div class="fgr"><label>Tapu</label><select id="h_tapu"><option>Temiz</option><option>Hisseli</option><option>İpotekli</option><option>Belirsiz</option></select></div>';
  h+='</div>';
  h+='<div class="fgr" style="margin-top:10px"><label>Müşteri İsteği / Not</label><textarea id="h_not" placeholder="Açıklama..."></textarea></div>';
  h+='<div class="fa"><button class="btn btn-p" onclick="svHavuz()">Havuza Ekle</button></div>';
  h+='<div id="hfm"></div></div>';
  h+='<div class="th"><div class="tt">📋 Portföy Arayışları ('+D.havuz.length+')</div></div>';
  if(!D.havuz.length)h+='<div style="text-align:center;padding:24px;color:#ccc;background:#fff;border-radius:12px;border:1px solid var(--bd)">Henüz arayış eklenmemiş</div>';
  else D.havuz.forEach(h2=>{
    h+='<div class="hav-item"><div class="hav-hd"><div><div class="hav-tip">'+badge(h2.islem)+' '+h2.tip+' — '+h2.il+'/'+(h2.ilce||'')+'</div><div class="hav-dan">👤 '+h2.danisman_ad+' • '+(h2.created_at||'').slice(0,10)+'</div></div></div>';
    h+='<div class="hav-tags">';
    if(h2.m2)h+='<span class="hav-tag">📐 '+h2.m2+' m²</span>';
    if(h2.oda)h+='<span class="hav-tag">🛏 '+h2.oda+'</span>';
    if(h2.fiyat)h+='<span class="hav-tag">💰 '+h2.fiyat+'</span>';
    if(h2.tapu)h+='<span class="hav-tag">📋 '+h2.tapu+'</span>';
    if(h2.ada)h+='<span class="hav-tag">Ada: '+h2.ada+'</span>';
    h+='</div>';
    if(h2.aciklama)h+='<div style="margin-top:6px;font-size:11px;color:#666">'+h2.aciklama+'</div>';

    h+='</div>';
  });
  c.innerHTML=h;
}
async function svHavuz(){
  const item={islem:document.getElementById('h_is').value,tip:document.getElementById('h_tip').value,il:document.getElementById('h_il').value,ilce:document.getElementById('h_ilce').value,adres:document.getElementById('h_adr').value,ada:document.getElementById('h_ada').value,m2:document.getElementById('h_m2').value,oda:document.getElementById('h_oda').value,fiyat:document.getElementById('h_fiyat').value,tapu:document.getElementById('h_tapu').value,aciklama:document.getElementById('h_not').value,danisman_ad:CU.danAd};
  try{await api('havuz','POST',item);document.getElementById('hfm').innerHTML='<div class="ok-m">✅ Eklendi!</div>';await load();setTimeout(()=>rHavuz(document.getElementById('ct')),900);}
  catch(e){document.getElementById('hfm').innerHTML='<div class="err-m">❌ '+e.message+'</div>';}
}
async function delHavuz(id){if(!confirm('Silinsin mi?'))return;try{await api('havuz','DELETE',null,'id=eq.'+id);await load();rHavuz(document.getElementById('ct'));}catch(e){alert('Hata: '+e.message);}}

async function delNot(id){if(!confirm('Silinsin mi?'))return;try{await api('danisman_notlar','DELETE',null,'id=eq.'+id);await load();rNotlar(document.getElementById('ct'));}catch(e){alert('Hata: '+e.message);}}

// EDIT
window._santIdx=undefined;

  const rec=tbl==='gd_leads'?D.leads.find(l=>l.id===id):D.rec.find(r=>r.id===id);
  if(!rec)return;eRec=rec;eTbl=tbl;
  const dO=D.dans.map(d=>'<option value="'+d.ad+'"'+(rec.danisman===d.ad?' selected':'')+'>'+d.ad+'</option>').join('');
  let h='<div class="fg">';
  h+='<div class="fgr"><label>Ad Soyad</label><input id="e_ad" value="'+(rec.ad||'')+'" oninput="this.value=cap(this.value)"/></div>';
  h+='<div class="fgr"><label>Telefon</label><input id="e_tel" value="'+(rec.telefon||'')+'"/></div>';
  if(tbl==='gd_leads'){
    document.getElementById('et').textContent='✏️ Lead — '+rec.ad;
    h+='<div class="fgr"><label>Kaynak</label><select id="e_k">'+opts(CFG.lSrc,rec.kaynak)+'</select></div>';
    h+='<div class="fgr"><label>Danışman</label><input id="e_dan" list="eDL" value="'+(rec.danisman||'')+'"/><datalist id="eDL">'+dO+'</datalist></div>';
    h+='<div class="fgr"><label>Durum</label><select id="e_d">'+opts(CFG.lDur,rec.durum)+'</select></div>';
    h+='<div class="fgr"><label>Takip</label><input type="date" id="e_t" value="'+(rec.sonraki_takip||'')+'"/></div>';
    h+='</div><div class="fgr" style="margin-top:10px"><label>Açıklama</label><textarea id="e_a">'+(rec.aciklama||'')+'</textarea></div>';
  }else{
    document.getElementById('et').textContent='✏️ Aday — '+rec.ad;
    h+='<div class="fgr"><label>Kaynak</label><select id="e_k">'+opts(CFG.rSrc,rec.kaynak)+'</select></div>';
    h+='<div class="fgr"><label>Durum</label><select id="e_d">'+opts(CFG.rDur,rec.durum)+'</select></div>';
    h+='<div class="fgr"><label>Randevu Tarihi</label><input type="date" id="e_rv" value="'+(rec.randevu_tarihi||'')+'"/></div>';
    h+='<div class="fgr"><label>Randevu Saati</label><input type="time" id="e_rs" value="'+(rec.randevu_saati||'')+'"/></div>';
    h+='</div><div class="fgr" style="margin-top:10px"><label>Açıklama</label><textarea id="e_a">'+(rec.aciklama||'')+'</textarea></div>';
  }
  document.getElementById('ec').innerHTML=h;

}
function hem(){document.getElementById('em').classList.remove('show');eRec=null;eTbl=null;window._santIdx=undefined;}

// ŞİFRE
function spm(){document.getElementById('pm').classList.add('show');}
function hpm(){document.getElementById('pm').classList.remove('show');}
function chpass(){
  const o=document.getElementById('op').value;const n1=document.getElementById('np').value;const n2=document.getElementById('np2').value;
  if(U[CU.username].pass!==o){document.getElementById('pm-msg').innerHTML='<div class="err-m">Mevcut şifre hatalı!</div>';return;}
  if(n1!==n2){document.getElementById('pm-msg').innerHTML='<div class="err-m">Şifreler eşleşmiyor!</div>';return;}
  if(n1.length<4){document.getElementById('pm-msg').innerHTML='<div class="err-m">En az 4 karakter!</div>';return;}
  U[CU.username].pass=n1;svU();document.getElementById('pm-msg').innerHTML='<div class="ok-m">✅ Güncellendi!</div>';setTimeout(hpm,1500);
}

// CSV
function exp(t){
  const data=t==='l'?D.leads:D.rec;if(!data.length){alert('Veri yok!');return;}
  const keys=Object.keys(data[0]).filter(k=>k!=='id');
  let csv=keys.join(',')+'\n';data.forEach(r=>{csv+=keys.map(k=>'"'+(r[k]||'').toString().replace(/"/g,'""')+'"').join(',')+'\n';});
  const b=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=(t==='l'?'portfolyo':'recruiting')+'_'+td()+'.csv';a.click();
}

// BAŞLAT
(async()=>{
  const isT=await chkToken();
  if(!isT){if(!chkRem()){document.getElementById('lp').classList.remove('hidden');['lu','lpass'].forEach(id=>document.getElementById(id).addEventListener('keypress',e=>{if(e.key==='Enter')doLogin();}));}}
})();
