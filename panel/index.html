<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RE/MAX LAVANDA - Ofis Yönetim Sistemi</title>
<style>
:root {
  --red: #DC1C2E;
  --blue: #003DA5;
  --darkblue: #0C2749;
  --gray: #404041;
  --lightgray: #F5F6F8;
  --border: #E3E6EB;
  --green: #1C8C4B;
  --orange: #C9821A;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--lightgray); color: var(--gray); min-height: 100vh; }

/* LOGIN */
.login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, var(--darkblue), var(--blue)); }
.login-box { background: white; border-radius: 20px; padding: 48px 40px; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; }
.login-logo { font-size: 22px; font-weight: 800; color: var(--darkblue); margin-bottom: 4px; letter-spacing: 0.5px; }
.login-sub { font-size: 12px; color: #999; margin-bottom: 32px; }
.login-box input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; margin-bottom: 12px; outline: none; transition: border 0.2s; }
.login-box input:focus { border-color: var(--blue); }
.btn-login { width: 100%; padding: 13px; background: var(--darkblue); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
.btn-login:hover { background: var(--blue); }
.login-error { color: var(--red); font-size: 12px; margin-top: 8px; }
.login-info { font-size: 11px; color: #bbb; margin-top: 16px; }

/* HEADER */
.header { background: linear-gradient(135deg, var(--darkblue), var(--blue)); color: white; padding: 16px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
.header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 17px; font-weight: 800; letter-spacing: 0.5px; }
.subtitle { font-size: 11px; opacity: 0.8; margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.user-badge { background: rgba(255,255,255,0.15); padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; }
.last-login { font-size: 10px; opacity: 0.7; }
.btn-header { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: white; padding: 6px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; transition: all 0.2s; }
.btn-header:hover { background: rgba(255,255,255,0.25); }

/* TABS */
.tab-bar { background: white; border-bottom: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.tabs { display: flex; max-width: 1400px; margin: 0 auto; padding: 0 20px; overflow-x: auto; }
.tab { padding: 14px 18px; font-size: 13px; font-weight: 500; border: none; background: none; cursor: pointer; color: #999; border-bottom: 3px solid transparent; white-space: nowrap; transition: all 0.2s; }
.tab:hover { color: var(--darkblue); }
.tab.active { color: var(--darkblue); border-bottom-color: var(--red); font-weight: 600; }

/* CONTENT */
.content { max-width: 1400px; margin: 0 auto; padding: 24px 20px; }

/* CARDS */
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.card { background: white; border: 1px solid var(--border); border-radius: 14px; padding: 20px; transition: all 0.2s; }
.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
.card h3 { font-size: 12px; color: #999; margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.card-stat { font-size: 30px; font-weight: 800; color: var(--darkblue); line-height: 1; }
.card-sub { font-size: 11px; color: #bbb; margin-top: 6px; }
.card.red .card-stat { color: var(--red); }
.card.green .card-stat { color: var(--green); }
.card.orange .card-stat { color: var(--orange); }

/* TODAY BOX */
.today-box { background: linear-gradient(135deg, #fff8e1, #fff3cd); border: 1px solid #ffc107; border-radius: 14px; padding: 20px; margin-bottom: 20px; }
.today-box h3 { font-size: 14px; font-weight: 700; color: #856404; margin-bottom: 12px; }
.today-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,193,7,0.3); font-size: 13px; }
.today-item:last-child { border-bottom: none; }

/* TABLE */
.table-header { display: flex; justify-content: space-between; align-items: center; margin: 20px 0 12px 0; }
.table-title { font-size: 15px; font-weight: 700; color: var(--darkblue); }
.table-actions { display: flex; gap: 8px; align-items: center; }
.table-wrap { background: white; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.search-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.search-bar input, .search-bar select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; outline: none; }
.search-bar input:focus, .search-bar select:focus { border-color: var(--blue); }
table { width: 100%; border-collapse: collapse; }
th { background: var(--lightgray); padding: 11px 14px; text-align: left; font-size: 11px; font-weight: 700; border-bottom: 1px solid var(--border); color: #666; text-transform: uppercase; letter-spacing: 0.3px; }
td { padding: 11px 14px; font-size: 13px; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafafa; }

/* BADGE */
.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-arandi { background: #E8F0FE; color: #1a56db; }
.badge-cagrildi { background: #FEF3C7; color: #92400e; }
.badge-gorusuldu { background: #EDE9FE; color: #5b21b6; }
.badge-sicak { background: #FBEEDB; color: var(--orange); }
.badge-soguk { background: #F0F0F0; color: #555; }
.badge-kazanildi { background: #E2F2E8; color: var(--green); }
.badge-kaybedildi { background: #FBE3E5; color: var(--red); }
.badge-beklemede { background: #FEF3C7; color: #92400e; }
.badge-olumsuz { background: #FBE3E5; color: var(--red); }
.badge-karalist { background: #1a1a1a; color: white; }

/* BUTTONS */
.btn { padding: 8px 16px; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: var(--darkblue); color: white; }
.btn-primary:hover { background: var(--blue); }
.btn-success { background: var(--green); color: white; }
.btn-danger { background: var(--red); color: white; }
.btn-warning { background: var(--orange); color: white; }
.btn-ghost { background: white; color: var(--gray); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--lightgray); }
.btn-sm { padding: 4px 10px; font-size: 11px; border-radius: 6px; }
.btn-wa { background: #25D366; color: white; }

/* FORM */
.form-wrap { background: white; border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 16px; }
.form-wrap h3 { font-size: 15px; font-weight: 700; color: var(--darkblue); margin-bottom: 20px; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: 11px; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 0.3px; }
.form-group input, .form-group select, .form-group textarea { padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; outline: none; font-family: inherit; transition: border 0.2s; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--blue); }
.form-group textarea { resize: vertical; min-height: 80px; }
.form-actions { margin-top: 16px; display: flex; gap: 8px; }

/* STATUS SELECT */
.status-select { padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; cursor: pointer; background: white; }

/* SOURCE GRID */
.source-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-top: 12px; }
.source-card { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
.source-card .sn { font-size: 11px; color: #999; margin-bottom: 6px; text-transform: uppercase; }
.source-card .sv { font-size: 22px; font-weight: 800; color: var(--darkblue); }

/* TOKEN */
.token-link { font-family: monospace; font-size: 10px; background: #f0f0f0; padding: 4px 8px; border-radius: 4px; color: var(--blue); word-break: break-all; }

/* MODAL */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: white; border-radius: 16px; padding: 32px; width: 480px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.modal h3 { font-size: 16px; font-weight: 700; color: var(--darkblue); margin-bottom: 20px; }
.modal-actions { margin-top: 20px; display: flex; gap: 8px; justify-content: flex-end; }

/* DUPLICATE WARNING */
.dup-warning { background: #fff8e1; border: 1px solid #ffc107; border-radius: 8px; padding: 12px 16px; margin-bottom: 12px; font-size: 13px; color: #856404; }

/* UTILS */
.hidden { display: none; }
.loading { text-align: center; padding: 40px; color: #999; }
.success-msg { background: #E2F2E8; color: var(--green); padding: 12px 16px; border-radius: 8px; margin: 8px 0; font-size: 13px; }
.error-msg { background: #FBE3E5; color: var(--red); padding: 12px 16px; border-radius: 8px; margin: 8px 0; font-size: 13px; }
.date-filter { display: flex; gap: 8px; align-items: center; background: white; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; flex-wrap: wrap; }
.date-filter label { font-size: 11px; font-weight: 700; color: #666; }
.date-filter input { padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; }
.section-divider { height: 1px; background: var(--border); margin: 24px 0; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">RE/MAX LAVANDA</div>
    <div class="login-sub">Ofis Yönetim Sistemi</div>
    <input type="text" id="loginUser" placeholder="Kullanıcı adı" autocomplete="username" />
    <input type="password" id="loginPass" placeholder="Şifre" autocomplete="current-password" />
    <button class="btn-login" onclick="doLogin()">Giriş Yap</button>
    <div id="loginError" class="login-error"></div>
    <div class="login-info">Sadece yetkili kullanıcılar erişebilir</div>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" class="hidden">
  <div class="header">
    <div class="header-content">
      <div>
        <div class="logo">RE/MAX LAVANDA</div>
        <div class="subtitle">Ofis Yönetim Sistemi</div>
      </div>
      <div class="header-right">
        <div>
          <div class="user-badge" id="userBadge">👤</div>
          <div class="last-login" id="lastLoginInfo"></div>
        </div>
        <button class="btn-header" onclick="showPasswordModal()">🔑 Şifre</button>
        <button class="btn-header" onclick="doLogout()">Çıkış</button>
      </div>
    </div>
  </div>
  <div class="tab-bar"><div class="tabs" id="navTabs"></div></div>
  <div class="content" id="content"><div class="loading">Yükleniyor...</div></div>
</div>

<!-- ŞİFRE DEĞİŞTİRME MODAL -->
<div id="passwordModal" class="modal-overlay">
  <div class="modal">
    <h3>🔑 Şifre Değiştir</h3>
    <div class="form-group" style="margin-bottom:12px">
      <label>Mevcut Şifre</label>
      <input type="password" id="oldPass" placeholder="Mevcut şifre" />
    </div>
    <div class="form-group" style="margin-bottom:12px">
      <label>Yeni Şifre</label>
      <input type="password" id="newPass" placeholder="Yeni şifre" />
    </div>
    <div class="form-group">
      <label>Yeni Şifre (Tekrar)</label>
      <input type="password" id="newPass2" placeholder="Yeni şifre tekrar" />
    </div>
    <div id="passMsg"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="hidePasswordModal()">İptal</button>
      <button class="btn btn-primary" onclick="changePassword()">Kaydet</button>
    </div>
  </div>
</div>

<!-- ADMIN ŞİFRE SIFIRLAMA MODAL -->
<div id="adminResetModal" class="modal-overlay">
  <div class="modal">
    <h3>🔑 Kullanıcı Şifresi Sıfırla</h3>
    <div class="form-group" style="margin-bottom:12px">
      <label>Kullanıcı</label>
      <select id="resetUser">
        <option value="ofis">Ofis</option>
      </select>
    </div>
    <div class="form-group">
      <label>Yeni Şifre</label>
      <input type="password" id="resetPass" placeholder="Yeni şifre" />
    </div>
    <div id="resetMsg"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="hideAdminResetModal()">İptal</button>
      <button class="btn btn-primary" onclick="adminResetPassword()">Sıfırla</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div id="editModal" class="modal-overlay">
  <div class="modal" style="width:600px">
    <h3 id="editModalTitle">Düzenle</h3>
    <div id="editModalContent"></div>
    <div id="editModalMsg"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="hideEditModal()">İptal</button>
      <button class="btn btn-primary" onclick="saveEdit()">Kaydet</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://vfqkmluqjaihpgxhqlqt.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmcWttbHVxamFpaHBneGhxbHF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NTE4ODMsImV4cCI6MjA5ODMyNzg4M30.6jsmD-om_q2ac9zbrHORO8FU9TUjvqAsBh9ux1xhiD8';

let USERS = JSON.parse(localStorage.getItem('rmx_users') || 'null') || {
  'admin': { pass: 'lavanda2024', role: 'admin', name: 'Admin' },
  'ofis': { pass: '1234', role: 'ofis', name: 'Ofis' }
};

let currentUser = null;
let allData = { leads: [], recruiting: [], danismanlar: [] };
let editingRecord = null;
let editingTable = null;

const urlParams = new URLSearchParams(window.location.search);
const urlToken = urlParams.get('token');

function saveUsers() { localStorage.setItem('rmx_users', JSON.stringify(USERS)); }

async function api(table, method, body, filter) {
  let url = SUPABASE_URL + '/rest/v1/' + table;
  if (filter) url += '?' + filter;
  const opts = {
    method: method || 'GET',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : (method === 'PATCH' ? 'return=representation' : '')
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (!res.ok) { const err = await res.text(); throw new Error(err); }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function loadData() {
  const [leads, recruiting, danismanlar] = await Promise.all([
    api('gd_leads', 'GET', null, 'select=*&order=created_at.desc'),
    api('recruiting_candidates', 'GET', null, 'select=*&order=created_at.desc'),
    api('danismanlar', 'GET', null, 'select=*&order=created_at.asc')
  ]);
  allData.leads = leads || [];
  allData.recruiting = recruiting || [];
  allData.danismanlar = danismanlar || [];
}

function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  if (USERS[u] && USERS[u].pass === p) {
    currentUser = { ...USERS[u], username: u };
    const now = new Date().toLocaleString('tr-TR');
    localStorage.setItem('lastLogin_' + u, now);
    startApp();
  } else {
    document.getElementById('loginError').textContent = 'Kullanıcı adı veya şifre hatalı!';
  }
}

function doLogout() {
  currentUser = null;
  document.getElementById('mainApp').classList.add('hidden');
  document.getElementById('loginPage').classList.remove('hidden');
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
}

async function startApp() {
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('userBadge').textContent = '👤 ' + currentUser.name;
  const last = localStorage.getItem('lastLogin_' + currentUser.username);
  if (last) document.getElementById('lastLoginInfo').textContent = 'Son giriş: ' + last;
  try {
    await loadData();
    renderTabs();
    renderContent(currentUser.role === 'admin' ? 'ozet' : currentUser.role === 'ofis' ? 'lead-giris' : 'danisman-panel');
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="error-msg">❌ Bağlantı hatası: ' + e.message + '</div>';
  }
}

async function checkToken() {
  if (!urlToken) return false;
  try {
    await loadData();
    const d = allData.danismanlar.find(x => x.token === urlToken);
    if (d) {
      currentUser = { role: 'danisman', name: d.ad, danismanId: d.id, danismanAd: d.ad };
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('mainApp').classList.remove('hidden');
      document.getElementById('userBadge').textContent = '👤 ' + d.ad;
      document.getElementById('lastLoginInfo').textContent = '';
      renderTabs();
      renderContent('danisman-panel');
      return true;
    }
  } catch(e) {}
  return false;
}

function renderTabs() {
  const nav = document.getElementById('navTabs');
  nav.innerHTML = '';
  let tabs = [];
  if (currentUser.role === 'admin') {
    tabs = [
      { id: 'ozet', label: '📊 Özet' },
      { id: 'gd-leads', label: '👤 GD Leads' },
      { id: 'recruiting', label: '👥 Recruiting' },
      { id: 'danismanlar', label: '🔑 Danışmanlar' },
      { id: 'kaynaklar', label: '📈 Kaynaklar' },
      { id: 'ayarlar', label: '⚙️ Ayarlar' }
    ];
  } else if (currentUser.role === 'ofis') {
    tabs = [
      { id: 'lead-giris', label: '➕ GD Lead Ekle' },
      { id: 'lead-listesi', label: '📋 Son Leadler' },
      { id: 'recruit-giris', label: '➕ Aday Ekle' }
    ];
  } else if (currentUser.role === 'danisman') {
    tabs = [{ id: 'danisman-panel', label: '📋 Portföylerim' }];
  }
  tabs.forEach(function(t, i) {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.textContent = t.label;
    btn.onclick = function() {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      btn.classList.add('active');
      renderContent(t.id);
    };
    nav.appendChild(btn);
  });
}

function badge(durum) {
  const map = { 'Arandı':'arandi','Çağrıldı':'cagrildi','Görüşüldü':'gorusuldu','Sıcak':'sicak','Soğuk':'soguk','Kazanıldı':'kazanildi','Kaybedildi':'kaybedildi','Beklemede':'beklemede','Olumsuz':'olumsuz','Kara Liste':'karalist' };
  const cls = map[durum] || 'soguk';
  return '<span class="badge badge-' + cls + '">' + (durum || '—') + '</span>';
}

function waBtn(tel) {
  if (!tel) return '—';
  const clean = tel.replace(/\D/g,'');
  const num = clean.startsWith('0') ? '90' + clean.slice(1) : (clean.startsWith('90') ? clean : '90' + clean);
  return '<a href="https://wa.me/' + num + '" target="_blank" class="btn btn-sm btn-wa">💬</a>';
}

function renderContent(tabId) {
  const c = document.getElementById('content');
  if (tabId === 'ozet') renderOzet(c);
  else if (tabId === 'gd-leads') renderGDLeads(c);
  else if (tabId === 'recruiting') renderRecruiting(c);
  else if (tabId === 'danismanlar') renderDanismanlar(c);
  else if (tabId === 'kaynaklar') renderKaynaklar(c);
  else if (tabId === 'ayarlar') renderAyarlar(c);
  else if (tabId === 'lead-giris') renderLeadGiris(c);
  else if (tabId === 'lead-listesi') renderLeadListesi(c);
  else if (tabId === 'recruit-giris') renderRecruitGiris(c);
  else if (tabId === 'danisman-panel') renderDanismanPanel(c);
}

function today() { return new Date().toISOString().split('T')[0]; }
function weekAgo() { const d = new Date(); d.setDate(d.getDate()-7); return d.toISOString().split('T')[0]; }

function renderOzet(c) {
  const open = allData.leads.filter(l => !['Kazanıldı','Kaybedildi','Kara Liste'].includes(l.durum)).length;
  const won = allData.leads.filter(l => l.durum === 'Kazanıldı').length;
  const hot = allData.leads.filter(l => l.durum === 'Sıcak').length;
  const activeR = allData.recruiting.filter(r => r.durum !== 'Olumsuz' && r.durum !== 'Kara Liste').length;
  const todayLeads = allData.leads.filter(l => l.sonraki_takip === today());
  const byD = {};
  allData.leads.forEach(l => {
    if (l.danisman) {
      if (!byD[l.danisman]) byD[l.danisman] = {t:0,k:0,a:0};
      byD[l.danisman].t++;
      if (l.durum === 'Kazanıldı') byD[l.danisman].k++;
      else byD[l.danisman].a++;
    }
  });

  let html = '<div class="grid">';
  html += '<div class="card"><h3>Toplam Lead</h3><div class="card-stat">' + allData.leads.length + '</div></div>';

async function checkDup(val, type) {
  if (val.length < 3) return;
  const warnEl = document.getElementById(type === 'lead' ? 'leadDupWarn' : 'recruitDupWarn');
  if (!warnEl) return;
  const existing = type === 'lead'
    ? allData.leads.find(l => (l.ad||'').toLowerCase().includes(val.toLowerCase()))
    : allData.recruiting.find(r => (r.ad||'').toLowerCase().includes(val.toLowerCase()));
  if (existing) {
    warnEl.innerHTML = '<div class="dup-warning">⚠️ Bu isimde kayıt mevcut! <strong>' + existing.ad + '</strong> — Durum: ' + (existing.durum||'—') + ' — Tarih: ' + (existing.tarih||existing.created_at||'—') + '</div>';

  }
}

function generateToken() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
  let t = '';
  for (let i = 0; i < 14; i++) t += chars[Math.floor(Math.random()*chars.length)];
  return t;
}

  const body = document.getElementById('ofisLeadsBody');
  if (body) body.innerHTML = filtered.map(l => '<tr><td>' + (l.tarih||'—') + '</td><td><strong>' + (l.ad||'') + '</strong></td><td>' + waBtn(l.telefon) + ' ' + (l.telefon||'') + '</td><td>' + badge(l.durum) + '</td><td>' + (l.danisman||'—') + '</td></tr>').join('');
}

function renderRecruitGiris(c) {
  let html = '<div class="form-wrap"><h3>➕ Yeni Aday Ekle</h3><div id="ofisRecruitDupWarn"></div>';
  html += '<div class="form-grid">';
  html += '<div class="form-group"><label>Ad Soyad *</label><input id="ra_ad" placeholder="Ad Soyad" oninput="checkDupRecruitOfis(this.value)" /></div>';
  html += '<div class="form-group"><label>Telefon</label><input id="ra_tel" placeholder="5XX XXX XX XX" /></div>';
  html += '<div class="form-group"><label>Kaynak</label><select id="ra_kaynak"><option>Leman</option><option>Eren</option><option>Secret</option><option>Remax</option><option>Halk Eğitim</option><option>Kariyer</option><option>Sahibinden</option><option>Seminer</option><option>Diğer</option></select></div>';
  html += '<div class="form-group"><label>Durum</label><select id="ra_durum"><option>Beklemede</option><option>Sıcak</option><option>1. Görüşme</option><option>2. Görüşme</option><option>Randevu</option><option>Görüşüldü</option><option>Olumsuz</option></select></div>';

function checkDupRecruitOfis(val) {
  if (val.length < 3) return;
  const existing = allData.recruiting.find(r => (r.ad||'').toLowerCase().includes(val.toLowerCase()) || (r.telefon||'').includes(val));
  const el = document.getElementById('ofisRecruitDupWarn');
  if (existing && el) el.innerHTML = '<div class="dup-warning">⚠️ Bu kişiyle daha önce görüşülmüş! <strong>' + existing.ad + '</strong> — ' + (existing.durum||'—') + '</div>';
  else if (el) el.innerHTML = '';
}

async function saveRecruitOfis() {
  const ad = document.getElementById('ra_ad').value.trim();
  if (!ad) { document.getElementById('ofisRecruitMsg').innerHTML = '<div class="error-msg">Ad zorunlu!</div>'; return; }
  const data = { ad, telefon: document.getElementById('ra_tel').value.trim(), kaynak: document.getElementById('ra_kaynak').value, durum: document.getElementById('ra_durum').value, aciklama: document.getElementById('ra_aciklama').value.trim(), randevu_tarihi: document.getElementById('ra_randevu').value||null };
  try {
    await api('recruiting_candidates', 'POST', data);
    document.getElementById('ofisRecruitMsg').innerHTML = '<div class="success-msg">✅ Aday eklendi!</div>';
    document.getElementById('ra_ad').value=''; document.getElementById('ra_tel').value=''; document.getElementById('ra_aciklama').value='';
    await loadData();
  } catch(e) {
    document.getElementById('ofisRecruitMsg').innerHTML = '<div class="error-msg">❌ ' + e.message + '</div>';
  }
}

function renderDanismanPanel(c) {
  const myLeads = allData.leads.filter(l => l.danisman === currentUser.danismanAd);
  const open = myLeads.filter(l => !['Kazanıldı','Kaybedildi'].includes(l.durum)).length;
  const won = myLeads.filter(l => l.durum === 'Kazanıldı').length;
  const hot = myLeads.filter(l => l.durum === 'Sıcak').length;
  const oran = myLeads.length > 0 ? Math.round(won/myLeads.length*100) : 0;
  let html = '<div class="grid">';
  html += '<div class="card"><h3>Toplam Atanan</h3><div class="card-stat">' + myLeads.length + '</div></div>';
  html += '<div class="card red"><h3>Açık</h3><div class="card-stat">' + open + '</div></div>';
  html += '<div class="card green"><h3>Kazanılan</h3><div class="card-stat">' + won + '</div></div>';
  html += '<div class="card orange"><h3>🔥 Sıcak</h3><div class="card-stat">' + hot + '</div></div>';
  html += '<div class="card"><h3>Dönüşüm</h3><div class="card-stat">' + oran + '%</div></div>';
  html += '</div>';
  html += '<div class="table-header"><div class="table-title">📋 Bana Atanan Portföyler</div></div>';
  html += '<div class="table-wrap"><table><thead><tr><th>Tarih</th><th>Müşteri</th><th>Telefon</th><th>Kaynak</th><th>Açıklama</th><th>Durum</th><th>Takip</th></tr></thead><tbody>';
  html += myLeads.map(l => '<tr><td>' + (l.tarih||'—') + '</td><td><strong>' + (l.ad||'') + '</strong></td><td>' + waBtn(l.telefon) + '</td><td>' + (l.kaynak||'—') + '</td><td>' + (l.aciklama||'—') + '</td><td><select class="status-select" onchange="updateLeadStatus(\'' + l.id + '\', this.value)">' + ['Arandı','Çağrıldı','Görüşüldü','Sıcak','Soğuk','Kazanıldı','Kaybedildi'].map(s => '<option' + (l.durum===s?' selected':'') + '>' + s + '</option>').join('') + '</select></td><td>' + (l.sonraki_takip||'—') + '</td></tr>').join('');
  html += '</tbody></table></div>';
  c.innerHTML = html;
}

async function updateLeadStatus(id, durum) {
  try {
    await api('gd_leads', 'PATCH', { durum }, 'id=eq.' + id);
    const lead = allData.leads.find(l => l.id === id);
    if (lead) lead.durum = durum;
  } catch(e) { alert('Hata: ' + e.message); }
}

function editRecord(table, id) {
  const record = table === 'gd_leads' ? allData.leads.find(l => l.id === id) : allData.recruiting.find(r => r.id === id);
  if (!record) return;
  editingRecord = record;
  editingTable = table;
  const danismanOptions = allData.danismanlar.map(d => '<option value="' + d.ad + '"' + (record.danisman===d.ad?' selected':'') + '>' + d.ad + '</option>').join('');
  let html = '';
  if (table === 'gd_leads') {
    document.getElementById('editModalTitle').textContent = '✏️ Lead Düzenle — ' + record.ad;
    html += '<div class="form-grid">';
    html += '<div class="form-group"><label>Ad Soyad</label><input id="e_ad" value="' + (record.ad||'') + '" /></div>';
    html += '<div class="form-group"><label>Telefon</label><input id="e_tel" value="' + (record.telefon||'') + '" /></div>';
    html += '<div class="form-group"><label>Kaynak</label><select id="e_kaynak"><option' + (record.kaynak==='Sponsorlu'?' selected':'') + '>Sponsorlu</option><option' + (record.kaynak==='Remax'?' selected':'') + '>Remax</option><option' + (record.kaynak==='Selen'?' selected':'') + '>Selen</option><option' + (record.kaynak==='Referans'?' selected':'') + '>Referans</option><option' + (record.kaynak==='Diğer'?' selected':'') + '>Diğer</option></select></div>';
    html += '<div class="form-group"><label>Danışman</label><input id="e_danisman" list="editDanismanList" value="' + (record.danisman||'') + '" /><datalist id="editDanismanList">' + danismanOptions + '</datalist></div>';
    html += '<div class="form-group"><label>Durum</label><select id="e_durum">' + ['Arandı','Çağrıldı','Görüşüldü','Sıcak','Soğuk','Kazanıldı','Kaybedildi','Kara Liste'].map(s => '<option' + (record.durum===s?' selected':'') + '>' + s + '</option>').join('') + '</select></div>';
    html += '<div class="form-group"><label>Sonraki Takip</label><input type="date" id="e_takip" value="' + (record.sonraki_takip||'') + '" /></div>';
    html += '</div><div class="form-group" style="margin-top:12px"><label>Açıklama</label><textarea id="e_aciklama">' + (record.aciklama||'') + '</textarea></div>';
  } else {
    document.getElementById('editModalTitle').textContent = '✏️ Aday Düzenle — ' + record.ad;
    html += '<div class="form-grid">';
    html += '<div class="form-group"><label>Ad Soyad</label><input id="e_ad" value="' + (record.ad||'') + '" /></div>';
    html += '<div class="form-group"><label>Telefon</label><input id="e_tel" value="' + (record.telefon||'') + '" /></div>';
    html += '<div class="form-group"><label>Kaynak</label><select id="e_kaynak"><option' + (record.kaynak==='Leman'?' selected':'') + '>Leman</option><option' + (record.kaynak==='Eren'?' selected':'') + '>Eren</option><option' + (record.kaynak==='Secret'?' selected':'') + '>Secret</option><option' + (record.kaynak==='Remax'?' selected':'') + '>Remax</option><option' + (record.kaynak==='Halk Eğitim'?' selected':'') + '>Halk Eğitim</option><option' + (record.kaynak==='Kariyer'?' selected':'') + '>Kariyer</option><option' + (record.kaynak==='Sahibinden'?' selected':'') + '>Sahibinden</option><option' + (record.kaynak==='Seminer'?' selected':'') + '>Seminer</option><option' + (record.kaynak==='Diğer'?' selected':'') + '>Diğer</option></select></div>';
    html += '<div class="form-group"><label>Durum</label><select id="e_durum">' + ['Beklemede','Sıcak','1. Görüşme','2. Görüşme','Randevu','Görüşüldü','Olumsuz','Kara Liste'].map(s => '<option' + (record.durum===s?' selected':'') + '>' + s + '</option>').join('') + '</select></div>';
    html += '<div class="form-group"><label>Randevu Tarihi</label><input type="date" id="e_randevu" value="' + (record.randevu_tarihi||'') + '" /></div>';

  }
  document.getElementById('editModalContent').innerHTML = html;
  document.getElementById('editModal').classList.add('show');
}

function hideEditModal() { document.getElementById('editModal').classList.remove('show'); editingRecord = null; editingTable = null; }

async function saveEdit() {
  if (!editingRecord || !editingTable) return;
  let data = {};
  if (editingTable === 'gd_leads') {
    data = { ad: document.getElementById('e_ad').value.trim(), telefon: document.getElementById('e_tel').value.trim(), kaynak: document.getElementById('e_kaynak').value, danisman: document.getElementById('e_danisman').value.trim()||null, durum: document.getElementById('e_durum').value, aciklama: document.getElementById('e_aciklama').value.trim(), sonraki_takip: document.getElementById('e_takip').value||null };
  } else {
    data = { ad: document.getElementById('e_ad').value.trim(), telefon: document.getElementById('e_tel').value.trim(), kaynak: document.getElementById('e_kaynak').value, durum: document.getElementById('e_durum').value, aciklama: document.getElementById('e_aciklama').value.trim(), randevu_tarihi: document.getElementById('e_randevu').value||null };
  }
  try {
    await api(editingTable, 'PATCH', data, 'id=eq.' + editingRecord.id);
    document.getElementById('editModalMsg').innerHTML = '<div class="success-msg">✅ Güncellendi!</div>';
    await loadData();
    setTimeout(() => { hideEditModal(); renderContent(editingTable==='gd_leads'?'gd-leads':'recruiting'); }, 800);
  } catch(e) {
    document.getElementById('editModalMsg').innerHTML = '<div class="error-msg">❌ ' + e.message + '</div>';
  }
}

function showPasswordModal() { document.getElementById('passwordModal').classList.add('show'); }
function hidePasswordModal() { document.getElementById('passwordModal').classList.remove('show'); }
function hideAdminResetModal() { document.getElementById('adminResetModal').classList.remove('show'); }

function changePassword() {
  const old = document.getElementById('oldPass').value;
  const n1 = document.getElementById('newPass').value;
  const n2 = document.getElementById('newPass2').value;
  if (USERS[currentUser.username].pass !== old) { document.getElementById('passMsg').innerHTML = '<div class="error-msg">Mevcut şifre hatalı!</div>'; return; }
  if (n1 !== n2) { document.getElementById('passMsg').innerHTML = '<div class="error-msg">Şifreler eşleşmiyor!</div>'; return; }
  if (n1.length < 4) { document.getElementById('passMsg').innerHTML = '<div class="error-msg">Şifre en az 4 karakter olmalı!</div>'; return; }
  USERS[currentUser.username].pass = n1;
  saveUsers();
  document.getElementById('passMsg').innerHTML = '<div class="success-msg">✅ Şifre güncellendi!</div>';
  setTimeout(hidePasswordModal, 1500);
}

function exportCSV(type) {
  const data = type === 'leads' ? allData.leads : allData.recruiting;
  if (!data.length) { alert('Veri yok!'); return; }
  const keys = Object.keys(data[0]).filter(k => k !== 'id');
  let csv = keys.join(',') + '\n';
  data.forEach(row => { csv += keys.map(k => '"' + (row[k]||'').toString().replace(/"/g,'""') + '"').join(',') + '\n'; });
  const blob = new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = (type==='leads'?'gd_leads':'recruiting') + '_' + today() + '.csv'; a.click();
}

  const isToken = await checkToken();

    ['loginUser','loginPass'].forEach(id => {
      document.getElementById(id).addEventListener('keypress', e => { if(e.key==='Enter') doLogin(); });
    });
