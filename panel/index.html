<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RE/MAX LAVANDA - Ofis Yönetim Sistemi</title>
<style>
:root { --red: #DC1C2E; --blue: #003DA5; --darkblue: #0C2749; --gray: #404041; --lightgray: #F5F6F8; --border: #E3E6EB; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--lightgray); color: var(--gray); }
.header { background: linear-gradient(135deg, var(--darkblue), var(--blue)); color: white; padding: 24px 20px; }
.header-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 20px; font-weight: 700; }
.subtitle { font-size: 12px; opacity: 0.9; margin-top: 4px; }
.tabs { display: flex; background: white; border-bottom: 1px solid var(--border); max-width: 1200px; margin: 0 auto; padding: 0 20px; }
.tab { padding: 16px 20px; font-size: 14px; font-weight: 500; border: none; background: none; cursor: pointer; color: #999; border-bottom: 3px solid transparent; }
.tab.active { color: var(--darkblue); border-bottom-color: var(--red); }
.content { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 24px; }
.card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.card h3 { font-size: 14px; color: var(--darkblue); margin-bottom: 8px; font-weight: 600; }
.card-stat { font-size: 32px; font-weight: 700; color: var(--red); margin: 12px 0; }
.card-meta { font-size: 12px; color: #999; }
table { width: 100%; border-collapse: collapse; background: white; border: 1px solid var(--border); margin-top: 12px; }
th { background: var(--lightgray); padding: 12px; text-align: left; font-size: 12px; font-weight: 600; border-bottom: 1px solid var(--border); }
td { padding: 12px; font-size: 13px; border-bottom: 1px solid #f5f5f5; }
.badge { display: inline-block; padding: 4px 12px; border-radius: 16px; font-size: 11px; font-weight: 600; }
.badge-hot { background: #FBEEDB; color: #C9821A; }
.badge-ok { background: #E2F2E8; color: #1C8C4B; }
.tab-pane { display: none; }
.tab-pane.show { display: block; }
.section-title { font-size: 16px; font-weight: 700; color: var(--darkblue); margin: 24px 0 16px 0; }
</style>
</head>
<body>

<div class="header">
  <div class="header-content">
    <div><div class="logo">RE/MAX LAVANDA</div><div class="subtitle">Ofis Yönetim Sistemi</div></div>
    <div>👤 Admin Panel</div>
  </div>
</div>

<div class="tabs" id="navTabs"></div>

<div class="content" id="content"></div>

<script>
const gdLeads = [
  { ad: 'Arslan Çavdar', telefon: '5326256255', kaynak: 'Sponsorlu', aciklama: 'Kapaklı daire', durum: 'Arandı', danisman: 'Burak' },
  { ad: 'Recep Vardı', telefon: '5342581089', kaynak: 'Sponsorlu', aciklama: 'Hisseli arsa', durum: 'Arandı', danisman: 'Nihal' },
  { ad: 'Nuh Özer', telefon: '5432985544', kaynak: 'Remax', aciklama: 'Çorlu Park shop', durum: 'Görüşüldü', danisman: 'İbrahim' }
];

const recruitingCandidates = [
  { ad: 'Yasin Kayır', telefon: '5427145971', kaynak: 'Eren', durum: 'Sıcak', aciklama: 'Hazır' },
  { ad: 'Uğur Kılıç', telefon: '5356713610', kaynak: 'Eren', durum: 'Sıcak', aciklama: 'Pazartesi' }
];

function renderTabs() {
  const navbar = document.getElementById('navTabs');
  const tabs = [
    { id: 'panel', label: '📊 Panel' },
    { id: 'leads', label: '👤 GD Leads' },
    { id: 'recruiting', label: '👥 Recruiting' }
  ];
  tabs.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.textContent = t.label;
    btn.onclick = () => switchTab(t.id);
    navbar.appendChild(btn);
  });
}

function switchTab(tabId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderContent(tabId);
}

function renderContent(tabId) {
  const content = document.getElementById('content');
  
  if (tabId === 'panel') {
    content.innerHTML = `
      <div class="grid">
        <div class="card"><h3>📋 Açık Leads</h3><div class="card-stat">${gdLeads.length}</div></div>
        <div class="card"><h3>👥 Aktif Adaylar</h3><div class="card-stat">${recruitingCandidates.length}</div></div>
      </div>
      <div class="section-title">📊 Son Veriler</div>
      <table><thead><tr><th>Ad</th><th>Telefon</th><th>Kaynak</th><th>Durum</th></tr></thead><tbody>
        ${gdLeads.map(l => `<tr><td><strong>${l.ad}</strong></td><td>${l.telefon}</td><td>${l.kaynak}</td><td><span class="badge badge-hot">${l.durum}</span></td></tr>`).join('')}
      </tbody></table>
    `;
  } else if (tabId === 'leads') {
    content.innerHTML = `<div class="section-title">👤 GD Leads</div><table><thead><tr><th>Ad</th><th>Telefon</th><th>Kaynak</th><th>Durum</th></tr></thead><tbody>
      ${gdLeads.map(l => `<tr><td><strong>${l.ad}</strong></td><td>${l.telefon}</td><td>${l.kaynak}</td><td><span class="badge badge-hot">${l.durum}</span></td></tr>`).join('')}
    </tbody></table>`;
  } else if (tabId === 'recruiting') {
    content.innerHTML = `<div class="section-title">👥 Adaylar</div><table><thead><tr><th>Ad</th><th>Telefon</th><th>Kaynak</th><th>Durum</th></tr></thead><tbody>
      ${recruitingCandidates.map(r => `<tr><td><strong>${r.ad}</strong></td><td>${r.telefon}</td><td>${r.kaynak}</td><td><span class="badge badge-ok">${r.durum}</span></td></tr>`).join('')}
    </tbody></table>`;
  }
}

renderTabs();
renderContent('panel');
</script>

</body>
</html>
