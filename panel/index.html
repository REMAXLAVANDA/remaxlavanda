// ── Rozet hesaplama ──
function danRozetler(danAd){
  const progress=D.obProgress.filter(p=>p.danisman_ad===danAd);
  const tamamlanan=new Set(progress.filter(p=>p.durum==='admin_onaylandi'||p.durum==='tamamlandi').map(p=>p.task_key));
  const rozetler=[];

  // Başlangıç Hazır: sozlesme + evraklar + panel_user
  if(['sozlesme','evraklar','panel_user'].every(k=>tamamlanan.has(k)))rozetler.push('baslangic_hazir');
  // Power Start
  if(tamamlanan.has('ps_tamam'))rozetler.push('power_start');
  // Seviye 5
  if(tamamlanan.has('sev5_belge'))rozetler.push('seviye5_hazir');
  // 100 Saat
  if(tamamlanan.has('eg100_tamam'))rozetler.push('eg100_tamam');
  // İlk Portföy
  const portfoy=D.disPortfolyo.filter(p=>p.danisman_ad===danAd).length||D.leads.filter(l=>l.danisman===danAd).length;
  if(portfoy>0)rozetler.push('ilk_portfolyo');
  // İlk İşlem
  if(tamamlanan.has('ilk_islem')||D.leads.filter(l=>l.danisman===danAd&&l.durum==='Kazanıldı').length>0)rozetler.push('ilk_islem');
  // Eğitim Disiplini
  const egitimler=D.danEgitim.filter(e=>e.danisman_ad===danAd);
  if(egitimler.length>0&&egitimler.filter(e=>e.durum==='Tamamlandı').length/egitimler.length>=0.8)rozetler.push('egitim_disp');
  // Ofis Uyumlu: tüm 21 task tamamlandı
  if(OB_TASKS_DEFAULT.every(t=>tamamlanan.has(t.key)))rozetler.push('ofis_uyumlu');

  return rozetler;
}

// ── CSS rozet chip ──
function rozetChip(key,kucuk){
  const r=ROZET_TANIMLARI.find(x=>x.key===key);
  if(!r)return'';
  const s=kucuk?'font-size:10px;padding:2px 7px':'font-size:12px;padding:4px 10px';
  return'<span title="'+r.aciklama+'" style="'+s+';background:'+r.renk+'20;color:'+r.renk+';border:1px solid '+r.renk+'40;border-radius:20px;font-weight:700;white-space:nowrap">'+r.icon+' '+r.label+'</span>';
}

function katIkon(k){
  const m={Evrak:'📄',Sistem:'💻',Eğitim:'📚',Belge:'📋',Materyal:'💼',Profil:'📱',Satış:'🎯'};
  return m[k]||'•';
}

// Task toggle
async function obTaskToggle(danAd,taskKey,adminOnay,cb){
  const task=OB_TASKS_DEFAULT.find(t=>t.key===taskKey);
  const mevcut=D.obProgress.find(p=>p.danisman_ad===danAd&&p.task_key===taskKey);
  const isA=CU.role==='admin'||CU.role==='ofis';
  const yeniDurum=isA?(cb.checked?'admin_onaylandi':'bos'):(adminOnay?'danisman_isaretledi':'tamamlandi');

  const payload={
    danisman_ad:danAd,task_key:taskKey,
    durum:cb.checked?yeniDurum:'bos',
    tamamlanma_tarihi:cb.checked?td():null,
    sorumlu:CU.name||'Kullanıcı',
  };

  try{
    if(mevcut){
      await api('gd_onboarding_progress','PATCH',payload,'id=eq.'+mevcut.id);
      const idx=D.obProgress.findIndex(p=>p.id===mevcut.id);
      if(idx>=0)D.obProgress[idx]={...D.obProgress[idx],...payload};
    }else{
      const r=await api('gd_onboarding_progress','POST',payload);
      const row=Array.isArray(r)?r[0]:r;
      if(row)D.obProgress.push(row);
    }
    toast(cb.checked?'✅ '+task.label+' tamamlandı':'Geri alındı');
    // Rozet kontrolü
    obRozetKontrol(danAd);
  }catch(e){
    cb.checked=!cb.checked;
    toast('Hata: '+e.message,false);
  }
}

// Admin onay
async function obAdminOnayla(danAd,taskKey){
  const mevcut=D.obProgress.find(p=>p.danisman_ad===danAd&&p.task_key===taskKey);
  if(!mevcut)return;
  try{
    await api('gd_onboarding_progress','PATCH',{durum:'admin_onaylandi',tamamlanma_tarihi:td(),sorumlu:CU.name},'id=eq.'+mevcut.id);

async function obRozetKontrol(danAd){
  const mevcutRozetler=D.gdBadges.filter(b=>b.danisman_ad===danAd).map(b=>b.rozet_key);
  const kazanilanlar=danRozetler(danAd);
  for(const key of kazanilanlar){
    if(!mevcutRozetler.includes(key)){
      try{
        const r=await api('gd_badges','POST',{danisman_ad:danAd,rozet_key:key,kazanilma_tarihi:td()});

        if(row)D.gdBadges.push(row);
        const rDef=ROZET_TANIMLARI.find(x=>x.key===key);
        toast('🏅 '+danAd+' — '+rDef?.label+' rozeti kazandı!');
      }catch(e){}
    }
  }
}

async function svObChecklist(){
  const dan=document.getElementById('ob_cl_dan').value;
  if(!dan){document.getElementById('ob_cl_msg').innerHTML='<div class="err-m">Danışman seçin!</div>';return;}
  const mevcut=D.obProgress.filter(p=>p.danisman_ad===dan);
  if(mevcut.length>0&&!confirm('Bu danışman için zaten '+mevcut.length+' kayıt var. Yine de devam?'))return;
  try{
    // Henüz kaydı olmayan task'ları oluştur
    const mevcutKeys=new Set(mevcut.map(p=>p.task_key));
    const eksikler=OB_TASKS_DEFAULT.filter(t=>!mevcutKeys.has(t.key));
    for(const task of eksikler){
      const r=await api('gd_onboarding_progress','POST',{danisman_ad:dan,task_key:task.key,durum:'bos'});
      const row=Array.isArray(r)?r[0]:r;
      if(row)D.obProgress.push(row);
    }
    document.getElementById('ob-cl-modal').classList.remove('show');
    toast('✅ '+dan+' için checklist hazırlandı ('+eksikler.length+' adım)');
    rObOnboarding(document.getElementById('ct'));

}

    h+='<div class="fgr" id="tr_modul_say_wrap" style="display:none"><label>Modül Adedi</label><input id="tr_modul_say" type="number" min="2" max="20" value="3" placeholder="3"/></div>';
    h+='<div class="fgr"><label>Başlangıç Tarihi</label><input type="date" id="tr_tarih" value="'+td()+'"/></div>';
    h+='<div class="fgr"><label>Eğitimci</label><input id="tr_egitimci" placeholder="Eğitimci adı..."/></div>';
    h+='<div class="fgr" style="grid-column:1/-1"><label>Açıklama</label><textarea id="tr_aciklama" style="min-height:44px" placeholder="Eğitim hakkında..."></textarea></div>';

    h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:5px">';

      const att=D.trAttendance.filter(a=>a.program_id===prog.id);

      h+='<div style="background:#fff;border:1px solid var(--bd);border-radius:12px;margin-bottom:14px;overflow:hidden">';

      h+='<div style="font-size:11px;color:#94a3b8;margin-top:2px">';
      h+=(prog.tip==='modullu'?'Modüllü · '+modules.length+' modül':'Tek Seferlik');
      h+=(prog.tarih?' · '+prog.tarih:'')+(prog.egitimci?' · '+prog.egitimci:'')+'</div></div>';

          h+='<div style="font-size:10px;color:#94a3b8">'+(m.tarih||'—')+'</div>';
          h+=(mPct!==null?'<div style="font-size:11px;font-weight:700;color:'+mc+';margin-top:3px">%'+mPct+' katılım</div>':'<div style="font-size:10px;color:#cbd5e1;margin-top:3px">Katılım girilmedi</div>');
          h+='</div>';
        });
        h+='</div></div>';
      }

      // Katılım tablosu (son 5 kayıt)
      const sonAtt=att.slice(0,6);
      if(sonAtt.length){
        h+='<div style="padding:0 16px 12px"><div style="display:flex;flex-wrap:wrap;gap:4px">';
        sonAtt.forEach(a=>{
          const dc=a.durum==='Katıldı'?'var(--gn)':a.durum==='Mazeretli'?'var(--or)':a.durum==='Geç Katıldı'?'#f59e0b':'var(--red)';
          h+='<span style="font-size:10px;padding:2px 7px;background:'+dc+'15;color:'+dc+';border:1px solid '+dc+'30;border-radius:10px;font-weight:600">'+a.danisman_ad+' · '+a.durum+'</span>';
        });
        if(att.length>6)h+='<span style="font-size:10px;color:#94a3b8">+'+( att.length-6)+' daha</span>';
        h+='</div></div>';
      }

      h+='</div>';
    });
  }

  // Katılım giriş modali
  h+=trKatilimModal();

  c.innerHTML=h;
}

function trTemizle(){document.querySelectorAll('.tr-dan-cb').forEach(cb=>cb.checked=false);trCbSay();}

async function svTrProgram(){
  const ad=document.getElementById('tr_ad').value.trim();
  const tip=document.getElementById('tr_tip').value;
  const tarih=document.getElementById('tr_tarih').value;
  const egitimci=document.getElementById('tr_egitimci').value.trim()||null;
  const aciklama=document.getElementById('tr_aciklama').value.trim()||null;
  const modul_say=tip==='modullu'?parseInt(document.getElementById('tr_modul_say').value)||3:0;
  const secili=[...document.querySelectorAll('.tr-dan-cb:checked')].map(cb=>cb.value);
  const msg=document.getElementById('tr_msg');

  if(!ad){msg.innerHTML='<div class="err-m">Eğitim adı zorunlu!</div>';return;}
  msg.innerHTML='<div style="color:var(--blue);font-size:12px">⏳ Kaydediliyor...</div>';

  try{
    // Program kaydet
    const pRows=await api('training_programs','POST',{ad,tip,tarih,egitimci,aciklama,modul_say});
    const prog=Array.isArray(pRows)?pRows[0]:pRows;
    if(!prog?.id)throw new Error('Program ID alınamadı');
    D.trPrograms.unshift(prog);

    // Modülleri oluştur
    const moduller=[];
    if(tip==='modullu'){
      for(let i=1;i<=modul_say;i++){
        const mRow=await api('training_modules','POST',{program_id:prog.id,modul_no:i,ad:'Modül '+i,tarih:null});
        const m=Array.isArray(mRow)?mRow[0]:mRow;
        if(m)moduller.push(m);
      }
      D.trModules.push(...moduller);
    }

    // Seçili danışmanlar için attendance kayıtları
    for(const danAd of secili){
      if(tip==='modullu'){
        for(const m of moduller){
          await api('training_attendance','POST',{program_id:prog.id,modul_id:m.id,danisman_ad:danAd,durum:'Katılmadı'});
        }
      }else{
        await api('training_attendance','POST',{program_id:prog.id,modul_id:null,danisman_ad:danAd,durum:'Katılmadı'});
      }
    }

    msg.innerHTML='<div class="ok-m">✅ Kaydedildi. '+secili.length+' danışman eklendi.</div>';
    await load();
    setTimeout(()=>rObEgitim(document.getElementById('ct')),900);
  }catch(e){msg.innerHTML='<div class="err-m">❌ '+e.message+'</div>';}
}

async function delTrProgram(id){
  if(!confirm('Eğitim programı ve tüm kayıtları silinsin mi?'))return;
  try{
    await api('training_attendance','DELETE',null,'program_id=eq.'+id);
    await api('training_modules','DELETE',null,'program_id=eq.'+id);
    await api('training_programs','DELETE',null,'id=eq.'+id);
    toast('✅ Silindi');await load();rObEgitim(document.getElementById('ct'));
  }catch(e){toast('Hata: '+e.message,false);}
}

async function trKatilimEkle(progId){
  const prog=D.trPrograms.find(p=>p.id===progId);
  if(!prog)return;
  const modules=D.trModules.filter(m=>m.program_id===progId).sort((a,b)=>a.modul_no-b.modul_no);
  const att=D.trAttendance.filter(a=>a.program_id===progId);

  let h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">';
  h+='<h3 style="margin:0">📚 '+prog.ad+' — Katılım</h3>';
  h+='<button onclick="document.getElementById(\'tr-katilim-modal\').classList.remove(\'show\')" style="background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8">×</button></div>';

  const durumSelect=(attId,cur)=>'<select style="padding:3px 6px;border:1px solid var(--bd);border-radius:6px;font-size:11px" onchange="updTrAtt(\''+attId+'\',this.value)">'
    +['Katıldı','Katılmadı','Mazeretli','Geç Katıldı'].map(d=>'<option'+(cur===d?' selected':'')+'>'+d+'</option>').join('')+'</select>';

  if(prog.tip==='modullu'&&modules.length){
    modules.forEach(m=>{
      h+='<div style="margin-bottom:14px"><div style="font-size:12px;font-weight:700;color:var(--dk);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">';
      h+=m.ad;
      h+='<button class="btn btn-xs btn-g" onclick="trModulTarihDuzenle(\''+m.id+'\',\''+m.ad+'\')">📅 Tarih</button></div>';
      const mAtt=att.filter(a=>a.modul_id===m.id);
      h+='<div style="display:flex;flex-direction:column;gap:4px">';
      mAtt.forEach(a=>{
        h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:#f8fafc;border-radius:6px">';
        h+='<span style="font-size:12px;font-weight:600">'+a.danisman_ad+'</span>';
        h+=durumSelect(a.id,a.durum);
        h+='</div>';
      });
      if(!mAtt.length)h+='<div style="font-size:11px;color:#94a3b8;padding:6px">Bu modül için katılımcı yok</div>';
      h+='</div>';
    });
  }else{
    const tekAtt=att;
    h+='<div style="display:flex;flex-direction:column;gap:4px">';
    tekAtt.forEach(a=>{
      h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:#f8fafc;border-radius:6px">';
      h+='<span style="font-size:12px;font-weight:600">'+a.danisman_ad+'</span>';
      h+=durumSelect(a.id,a.durum);
      h+='</div>';
    });
    if(!tekAtt.length)h+='<div style="font-size:11px;color:#94a3b8">Katılımcı yok</div>';
    h+='</div>';
  }

  h+='<div id="tr_att_msg"></div>';
  h+='<div class="mda"><button class="btn btn-g" onclick="document.getElementById(\'tr-katilim-modal\').classList.remove(\'show\')">Kapat</button>';
  h+='<button class="btn btn-p" onclick="trTopluKaydet(\''+progId+'\')">✅ Toplu Kaydet</button></div>';

  document.getElementById('tr-katilim-icerik').innerHTML=h;
  document.getElementById('tr-katilim-modal').classList.add('show');
}

async function updTrAtt(attId,durum){
  try{
    await api('training_attendance','PATCH',{durum},'id=eq.'+attId);
    const a=D.trAttendance.find(x=>x.id===attId);
    if(a)a.durum=durum;
    toast('✅ '+durum);
    // Eksik kontrolü için otomatik öneri
    trEksikKontrol(attId,durum);
  }catch(e){toast('Hata: '+e.message,false);}
}

async function trTopluKaydet(progId){
  const modal=document.getElementById('tr-katilim-modal');
  const selects=modal.querySelectorAll('select');
  let ok=0;
  for(const sel of selects){
    const m=sel.getAttribute('onchange')?.match(/updTrAtt\('([^']+)'/);
    if(!m)continue;
    const attId=m[1];
    try{await api('training_attendance','PATCH',{durum:sel.value},'id=eq.'+attId);ok++;}catch(e){}
  }
  toast('✅ '+ok+' kayıt güncellendi');
  await load();
  document.getElementById('tr-katilim-modal').classList.remove('show');
  rObEgitim(document.getElementById('ct'));
}

// Eksik modül — gelecek sefer öner
function trEksikKontrol(attId,durum){
  if(durum!=='Katılmadı')return;
  const a=D.trAttendance.find(x=>x.id===attId);
  if(!a||!a.modul_id)return;
  const m=D.trModules.find(x=>x.id===a.modul_id);
  const prog=m?D.trPrograms.find(x=>x.id===m.program_id):null;
  if(prog)console.log('[EKSİK MODül]',a.danisman_ad,'→',prog.ad,m?.ad);
}

function trModulTarihDuzenle(modulId,modulAd){
  const tarih=prompt('Modül tarihi (YYYY-AA-GG):');
  if(!tarih||!/^\d{4}-\d{2}-\d{2}$/.test(tarih)){alert('Geçersiz tarih formatı');return;}
  api('training_modules','PATCH',{tarih},'id=eq.'+modulId)
    .then(()=>{const m=D.trModules.find(x=>x.id===modulId);if(m)m.tarih=tarih;toast('✅ '+modulAd+' tarihi güncellendi');})
    .catch(e=>toast('Hata: '+e.message,false));
}

function eksRows(danFlt,progFlt,durumFlt){
  const thS2='padding:8px 10px;font-size:12px;border-bottom:1px solid #f1f5f9;vertical-align:middle';
  const eksikler=[];

  // Modüllü programlar için eksik tara
  D.trPrograms.filter(p=>p.tip==='modullu').forEach(prog=>{
    const modules=D.trModules.filter(m=>m.program_id===prog.id).sort((a,b)=>a.modul_no-b.modul_no);
    D.dans.forEach(dan=>{
      modules.forEach(m=>{
        const att=D.trAttendance.find(a=>a.program_id===prog.id&&a.modul_id===m.id&&a.danisman_ad===dan.ad);
        if(att&&(att.durum==='Katılmadı'||att.durum==='Mazeretli')){
          // Aynı programın sonraki modülünü bul (telafi fırsatı)
          const sonrakiMod=modules.find(x=>x.modul_no>m.modul_no&&x.tarih&&x.tarih>=td());
          eksikler.push({dan:dan.ad,prog:prog.ad,modul:m.ad,tarih:m.tarih||'—',durum:att.durum,telafi:sonrakiMod?sonrakiMod.ad+' ('+sonrakiMod.tarih+')':'Belirtilmedi',attId:att.id,progId:prog.id,modulId:m.id});
        }
      });
    });
  });

  // Tek seferlik eksikler
  D.trPrograms.filter(p=>p.tip==='tek').forEach(prog=>{
    D.trAttendance.filter(a=>a.program_id===prog.id&&(a.durum==='Katılmadı'||a.durum==='Mazeretli')).forEach(att=>{
      eksikler.push({dan:att.danisman_ad,prog:prog.ad,modul:'—',tarih:prog.tarih||'—',durum:att.durum,telafi:'—',attId:att.id,progId:prog.id,modulId:null});
    });
  });

  let filtred=eksikler;
  if(danFlt)filtred=filtred.filter(e=>e.dan===danFlt);
  if(progFlt)filtred=filtred.filter(e=>e.prog===progFlt);
  if(durumFlt)filtred=filtred.filter(e=>e.durum===durumFlt);

  if(!filtred.length)return'<tr><td colspan="6" style="'+thS2+';text-align:center;color:#94a3b8;padding:24px">✅ Eksik modül yok</td></tr>';

  return filtred.map(e=>{
    const dc=e.durum==='Katılmadı'?'var(--red)':'var(--or)';
    return'<tr>'
      +'<td style="'+thS2+';font-weight:700">'+e.dan+'</td>'
      +'<td style="'+thS2+'">'+e.prog+'</td>'
      +'<td style="'+thS2+'"><span style="font-weight:700;color:var(--dk)">'+e.modul+'</span></td>'
      +'<td style="'+thS2+';font-size:11px;color:#94a3b8">'+e.tarih+'</td>'
      +'<td style="'+thS2+'"><span style="background:'+dc+'15;color:'+dc+';padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700">'+e.durum+'</span></td>'
      +'<td style="'+thS2+'">'+(e.telafi!=='—'?'<span style="font-size:10px;color:var(--gn)">→ '+e.telafi+'</span>':'<span style="font-size:10px;color:#94a3b8">Yok</span>')+'</td>'
      +'</tr>';
  }).join('');
}

function eksFiltrele(){
  const d=document.getElementById('eks_dan')?.value||'';
  const p=document.getElementById('eks_prog')?.value||'';
  const dur=document.getElementById('eks_durum')?.value||'';
  const body=document.getElementById('eks-body');
  if(body)body.innerHTML=eksRows(d,p,dur);
}

function rPFRapor(c,tip){
  const sh='box-shadow:0 1px 3px rgba(0,0,0,.06)';
  const box='background:#fff;border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:14px';
  const thS='padding:7px 10px;text-align:left;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--bd);background:var(--lg)';
  const tdS='padding:7px 10px;font-size:12px;border-bottom:1px solid #f1f5f9';

  let h=pageHeader('Portföy Raporları','Portföy leadleri, takipler, kazanılan/kaybedilen kayıtlar ve danışman bazlı portföy performansı',
    '<button class="btn btn-g btn-sm" onclick="exp(\'l\')">📥 CSV</button>');

  // Alt menü
  const altMenu=[
    {id:'lead',l:'Lead Raporu'},
    {id:'huni',l:'Durum Hunisi'},
    {id:'geciken',l:'Geciken Takipler'},
    {id:'danisman',l:'Danışman Bazlı'},
    {id:'kazankaybeden',l:'Kazanılan/Kaybedilen'},
  ];
  h+='<div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">';
  altMenu.forEach(m=>{h+='<button class="btn btn-sm '+(tip===m.id?'btn-p':'btn-g')+'" onclick="rC(\'pf_'+m.id+'\')">'+m.l+'</button>';});
  h+='</div>';

  if(tip==='lead'){
    // Haftalık lead girişi
    const haftaMap={};const now=new Date();
    for(let i=7;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i*7);const lbl=getWeekLabel(d.toISOString().split('T')[0]);if(!haftaMap[lbl])haftaMap[lbl]=0;}
    D.leads.forEach(l=>{const lbl=getWeekLabel(l.tarih||l.created_at||'');if(haftaMap[lbl]!==undefined)haftaMap[lbl]++;});
    const haftalar=Object.entries(haftaMap);const maxH=Math.max(...haftalar.map(x=>x[1]),1);
    h+='<div style="'+box+'"><div style="font-size:13px;font-weight:700;color:var(--dk);margin-bottom:10px">📅 Haftalık Lead Girişi</div>';
    h+='<table style="width:100%;border-collapse:collapse"><thead><tr>';
    ['Hafta','Adet','Trend'].forEach(t=>h+='<th style="'+thS+'">'+t+'</th>');
    h+='</tr></thead><tbody>';
    haftalar.forEach(([lbl,cnt])=>{
      h+='<tr><td style="'+tdS+';font-weight:600">'+lbl+'</td><td style="'+tdS+';font-weight:700;color:var(--blue)">'+cnt+'</td>';
      h+='<td style="'+tdS+'"><div style="background:#f0f0f0;border-radius:3px;height:6px;width:120px"><div style="background:var(--blue);height:100%;width:'+Math.round(cnt/maxH*100)+'%;border-radius:3px"></div></div></td></tr>';
    });
    h+='</tbody></table></div>';

  }else if(tip==='huni'){
    const durumlar=CFG.lDur||[];
    h+='<div style="'+box+'"><div style="font-size:13px;font-weight:700;color:var(--dk);margin-bottom:10px">🔻 Portföy Durum Hunisi</div>';
    const topla=D.leads.length||1;
    durumlar.forEach(dur=>{
      const cnt=D.leads.filter(l=>l.durum===dur).length;
      const pct=Math.round(cnt/topla*100);
      const c=dur==='Kazanıldı'?'var(--gn)':dur==='Kaybedildi'||dur==='Kara Liste'?'var(--red)':dur==='Sıcak'?'var(--or)':'var(--blue)';
      h+='<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:12px;font-weight:600;color:#0f172a">'+dur+'</span><span style="font-size:12px;font-weight:700;color:'+c+'">'+cnt+' <span style="font-size:10px;color:#94a3b8">(%'+pct+')</span></span></div>';
      h+='<div style="background:#f1f5f9;border-radius:5px;height:8px"><div style="background:'+c+';height:100%;width:'+pct+'%;border-radius:5px"></div></div></div>';
    });
    h+='</div>';

  }else if(tip==='geciken'){
    const bugun=td();

      .sort((a,b)=>a.sonraki_takip.localeCompare(b.sonraki_takip));
    h+='<div style="'+box+'"><div style="font-size:13px;font-weight:700;color:var(--dk);margin-bottom:10px">⏰ Geciken Portföy Takipleri ('+geciken.length+')</div>';
    if(!geciken.length){h+='<div style="text-align:center;padding:24px;color:#94a3b8;font-size:12px">✅ Geciken takip yok</div>';}
    else{
      h+='<table style="width:100%;border-collapse:collapse"><thead><tr>';
      ['Müşteri','Danışman','Takip Tarihi','Gecikme','Durum',''].forEach(t=>h+='<th style="'+thS+'">'+t+'</th>');
      h+='</tr></thead><tbody>';
      geciken.forEach(l=>{
        const gun=Math.floor((Date.now()-new Date(l.sonraki_takip).getTime())/86400000);
        const gc=gun>14?'var(--red)':gun>7?'var(--or)':'#f59e0b';
        h+='<tr><td style="'+tdS+';font-weight:600">'+l.ad+'</td><td style="'+tdS+'">'+( l.danisman||'—')+'</td>'
          +'<td style="'+tdS+';color:var(--red)">'+l.sonraki_takip+'</td>'
          +'<td style="'+tdS+'"><span style="color:'+gc+';font-weight:700">'+gun+' gün</span></td>'
          +'<td style="'+tdS+'">'+badge(l.durum)+'</td>'
          +'<td style="'+tdS+'"><button class="btn btn-xs btn-g" onclick="doE(\'gd_leads\',\''+l.id+'\')">✏️</button></td></tr>';
      });
      h+='</tbody></table>';
    }
    h+='</div>';

  }else if(tip==='danisman'){
    const danMap={};
    D.leads.forEach(l=>{
      if(!l.danisman)return;
      if(!danMap[l.danisman])danMap[l.danisman]={ad:l.danisman,toplam:0,kazanilan:0,acik:0,sicak:0};
      danMap[l.danisman].toplam++;
      if(l.durum==='Kazanıldı')danMap[l.danisman].kazanilan++;
      if(!['Kazanıldı','Kaybedildi','Kara Liste'].includes(l.durum))danMap[l.danisman].acik++;
      if(l.durum==='Sıcak')danMap[l.danisman].sicak++;
    });
    const dans=Object.values(danMap).sort((a,b)=>b.toplam-a.toplam);
    h+='<div style="'+box+'"><div style="font-size:13px;font-weight:700;color:var(--dk);margin-bottom:10px">👤 Danışman Bazlı Portföy Performansı</div>';
    h+='<table style="width:100%;border-collapse:collapse"><thead><tr>';
    ['Danışman','Toplam','Açık','🔥 Sıcak','Kazanılan','Oran %'].forEach(t=>h+='<th style="'+thS+'">'+t+'</th>');
    h+='</tr></thead><tbody>';
    if(!dans.length)h+='<tr><td colspan="6" style="'+tdS+';text-align:center;color:#ccc">Veri yok</td></tr>';
    dans.forEach(d=>{
      const oran=d.toplam>0?Math.round(d.kazanilan/d.toplam*100):0;
      const oc=oran>=50?'var(--gn)':oran>=25?'var(--or)':'var(--red)';
      h+='<tr><td style="'+tdS+';font-weight:700">'+d.ad+'</td>'
        +'<td style="'+tdS+'">'+d.toplam+'</td>'
        +'<td style="'+tdS+'">'+d.acik+'</td>'
        +'<td style="'+tdS+';color:var(--or);font-weight:700">'+d.sicak+'</td>'
        +'<td style="'+tdS+';color:var(--gn);font-weight:700">'+d.kazanilan+'</td>'
        +'<td style="'+tdS+'"><span style="background:'+oc+'20;color:'+oc+';padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700">%'+oran+'</span></td></tr>';
    });
    h+='</tbody></table></div>';

  }else if(tip==='kazankaybeden'){
    const son90=new Date();son90.setDate(son90.getDate()-90);const son90s=son90.toISOString().split('T')[0];
    const kazan=D.leads.filter(l=>l.durum==='Kazanıldı'&&(l.tarih||l.created_at||'')>=son90s);
    const kaybet=D.leads.filter(l=>l.durum==='Kaybedildi'&&(l.tarih||l.created_at||'')>=son90s);

    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">';
    h+='<div style="'+box+'"><div style="font-size:13px;font-weight:700;color:var(--gn);margin-bottom:10px">✅ Kazanılan (Son 90 gün) — '+kazan.length+'</div>';
    if(!kazan.length)h+='<div style="color:#ccc;text-align:center;padding:16px;font-size:12px">Veri yok</div>';
    else{h+='<table style="width:100%;border-collapse:collapse"><thead><tr>';['Tarih','Müşteri','Danışman'].forEach(t=>h+='<th style="'+thS+'">'+t+'</th>');h+='</tr></thead><tbody>';
    kazan.forEach(l=>{h+='<tr><td style="'+tdS+';font-size:11px;color:#94a3b8">'+(l.tarih||'—')+'</td><td style="'+tdS+';font-weight:600">'+l.ad+'</td><td style="'+tdS+'">'+( l.danisman||'—')+'</td></tr>';});
    h+='</tbody></table>';}
    h+='</div>';

    h+='<div style="'+box+'"><div style="font-size:13px;font-weight:700;color:var(--red);margin-bottom:10px">❌ Kaybedilen (Son 90 gün) — '+kaybet.length+'</div>';
    if(!kaybet.length)h+='<div style="color:#ccc;text-align:center;padding:16px;font-size:12px">Veri yok</div>';
    else{h+='<table style="width:100%;border-collapse:collapse"><thead><tr>';['Tarih','Müşteri','Danışman'].forEach(t=>h+='<th style="'+thS+'">'+t+'</th>');h+='</tr></thead><tbody>';
    kaybet.forEach(l=>{h+='<tr><td style="'+tdS+';font-size:11px;color:#94a3b8">'+(l.tarih||'—')+'</td><td style="'+tdS+';font-weight:600">'+l.ad+'</td><td style="'+tdS+'">'+( l.danisman||'—')+'</td></tr>';});
    h+='</tbody></table>';}
    h+='</div></div>';
  }

  c.innerHTML=h;
}

  }else if(tip==='huni'){

      const oran=k.toplam>0?Math.round(k.basladi/k.toplam*100):0;
      const oc=oran>=30?'var(--gn)':oran>=10?'var(--or)':'var(--red)';
      h+='<tr><td style="'+tdS+';font-weight:700">'+k.kaynak+'</td><td style="'+tdS+'">'+k.toplam+'</td><td style="'+tdS+';color:var(--gn);font-weight:700">'+k.basladi+'</td><td style="'+tdS+'"><span style="background:'+oc+'20;color:'+oc+';padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700">%'+oran+'</span></td></tr>';

    h+='</div></div>';

  }else if(tip==='olumlu'){
    const olumlu=rcData.filter(r=>r.durum==='Başladı'||r.durum==='İlk 30 Gün');
    const olumsuz=rcData.filter(r=>r.durum==='Olumsuz'||r.durum==='Kara Liste');
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">';

    olumlu.forEach(r=>{h+='<div style="padding:7px 0;border-bottom:1px solid #f5f5f5"><div style="font-size:12px;font-weight:700">'+r.ad+'</div><div style="font-size:11px;color:#94a3b8">'+r.durum+' · '+(r.kaynak||'—')+'</div></div>';});
    if(!olumlu.length)h+='<div style="color:#ccc;text-align:center;padding:16px;font-size:12px">Veri yok</div>';

    if(!olumsuz.length)h+='<div style="color:#ccc;text-align:center;padding:16px;font-size:12px">Veri yok</div>';
    h+='</div></div>';
  }

  c.innerHTML=h;
}

// ── SKORBOARD KATILIM LİSTESİ ──
function rSkorKatilimListesi(c,tur){
  const thS='padding:7px 10px;text-align:left;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--bd);background:var(--lg)';
  const tdS='padding:7px 10px;font-size:12px;border-bottom:1px solid #f1f5f9';
  const tablo=tur==='Toplantı'?D.danToplanti:tur==='Eğitim'?D.danEgitim:D.etkinlikler;
  const icon=tur==='Toplantı'?'🤝':tur==='Eğitim'?'📚':'🎯';

  let h=pageHeader('Danışman Performans & Uygunluk Skorboard','Toplantı, eğitim, etkinlik, müşteri memnuniyeti, recruiting katkısı ve ilk işlem takibi',
    '<button class="btn btn-p btn-sm" onclick="rC(\'skor_etkinlik\')">+ Yeni Etkinlik</button>');

  h+='<div style="background:#fff;border:1px solid var(--bd);border-radius:12px;overflow:hidden">';
  h+='<div style="padding:12px 14px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center">';
  h+='<div style="font-size:13px;font-weight:700;color:var(--dk)">'+icon+' '+tur+' Katılım Takibi</div>';
  h+='</div>';

  if(!tablo||!tablo.length){
    h+='<div style="padding:24px;text-align:center;color:#94a3b8;font-size:12px">Henüz kayıt yok. <button class="btn btn-p btn-sm" onclick="rC(\'skor_etkinlik\')">+ Etkinlik Oluştur</button></div>';
  }else{
    const gruplu={};
    if(tur==='Toplantı'){
      tablo.forEach(t=>{
        const k=t.toplanti_adi||t.toplanti_tarihi||'Bilinmiyor';
        if(!gruplu[k])gruplu[k]={baslik:k,tarih:t.toplanti_tarihi,kayitlar:[]};
        gruplu[k].kayitlar.push(t);
      });
    }else if(tur==='Eğitim'){
      tablo.forEach(t=>{
        const k=t.egitim_adi||t.egitim_tarihi||'Bilinmiyor';
        if(!gruplu[k])gruplu[k]={baslik:k,tarih:t.egitim_tarihi,kayitlar:[]};
        gruplu[k].kayitlar.push(t);
      });
    }else{
      tablo.filter(e=>e.tur==='etkinlik').forEach(t=>{
        const k=t.baslik||t.tarih||'Bilinmiyor';
        if(!gruplu[k])gruplu[k]={baslik:k,tarih:t.tarih,kayitlar:[]};
        gruplu[k].kayitlar.push(t);
      });
    }
    const gruplar=Object.values(gruplu).sort((a,b)=>(b.tarih||'').localeCompare(a.tarih||''));
    if(!gruplar.length){
      h+='<div style="padding:24px;text-align:center;color:#94a3b8;font-size:12px">Kayıt bulunamadı.</div>';
    }else{
      gruplar.slice(0,10).forEach(g=>{
        const katildi=g.kayitlar.filter(r=>(r.durum==='Katıldı'||r.durum==='Tamamlandı')).length;
        const toplam=g.kayitlar.length;
        const pct=toplam>0?Math.round(katildi/toplam*100):0;
        const pc=pct>=75?'var(--gn)':pct>=50?'var(--or)':'var(--red)';
        h+='<div style="padding:12px 14px;border-bottom:1px solid #f5f5f5">';
        h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
        h+='<div><div style="font-size:12px;font-weight:700;color:#0f172a">'+g.baslik+'</div><div style="font-size:10px;color:#94a3b8">'+(g.tarih||'')+'</div></div>';
        h+='<div style="text-align:right"><div style="font-size:16px;font-weight:800;color:'+pc+'">%'+pct+'</div><div style="font-size:10px;color:#94a3b8">'+katildi+'/'+toplam+' katıldı</div></div></div>';
        h+='<div style="display:flex;flex-wrap:wrap;gap:5px">';
        g.kayitlar.forEach(r=>{
          const ad=r.danisman_ad||r.atanan_danismanlar||'?';
          const dur=r.durum||'?';
          const dc=dur==='Katıldı'||dur==='Tamamlandı'?'var(--gn)':dur==='Mazeretli'?'var(--or)':dur==='Geç Katıldı'?'#f59e0b':'var(--red)';
          h+='<span style="background:'+dc+'20;color:'+dc+';border:1px solid '+dc+'40;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:600">'+ad+' · '+dur+'</span>';
        });
        h+='</div></div>';
      });
    }
  }
  h+='</div>';

  // Özet tablo — danışman bazlı
  h+='<div style="background:#fff;border:1px solid var(--bd);border-radius:12px;overflow:hidden;margin-top:14px">';
  h+='<div style="padding:12px 14px;border-bottom:1px solid var(--bd);font-size:13px;font-weight:700;color:var(--dk)">👤 Danışman Bazlı Özet</div>';
  h+='<table style="width:100%;border-collapse:collapse"><thead><tr>';
  ['Danışman','Toplam','Katıldı','Katılmadı','Mazeretli','Geç','Oran %'].forEach(t=>h+='<th style="'+thS+'">'+t+'</th>');
  h+='</tr></thead><tbody>';
  D.dans.forEach(dan=>{
    const kayitlar=tur==='Toplantı'?D.danToplanti.filter(t=>t.danisman_ad===dan.ad)
      :tur==='Eğitim'?D.danEgitim.filter(t=>t.danisman_ad===dan.ad)
      :D.etkinlikler.filter(t=>t.tur==='etkinlik'&&normalizeAssigned(t.atanan_danismanlar).includes(dan.ad.toLowerCase()));
    if(!kayitlar.length)return;
    const katildi=kayitlar.filter(r=>r.durum==='Katıldı'||r.durum==='Tamamlandı').length;
    const katilmadi=kayitlar.filter(r=>r.durum==='Katılmadı').length;
    const mazeret=kayitlar.filter(r=>r.durum==='Mazeretli').length;
    const gec=kayitlar.filter(r=>r.durum==='Geç Katıldı').length;
    const oran=kayitlar.length>0?Math.round(katildi/kayitlar.length*100):0;
    const oc=oran>=75?'var(--gn)':oran>=50?'var(--or)':'var(--red)';
    h+='<tr><td style="'+tdS+';font-weight:700">'+dan.ad+'</td><td style="'+tdS+'">'+kayitlar.length+'</td>'
      +'<td style="'+tdS+';color:var(--gn);font-weight:600">'+katildi+'</td>'
      +'<td style="'+tdS+';color:var(--red)">'+katilmadi+'</td>'
      +'<td style="'+tdS+';color:var(--or)">'+mazeret+'</td>'
      +'<td style="'+tdS+';color:#f59e0b">'+gec+'</td>'
      +'<td style="'+tdS+'"><span style="background:'+oc+'20;color:'+oc+';padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700">%'+oran+'</span></td></tr>';
  });
  h+='</tbody></table></div>';

  c.innerHTML=h;
}

// ── TAKVİM FİLTRELİ ALT SAYFALAR ──
function rTakvimFiltreli(c,tur){
  window._calFiltre=tur==='dogumgunu'?'tumu':tur;
  if(tur==='dogumgunu'){
    // Doğum günü özel liste
    const box='background:#fff;border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:14px';
    const bugun=new Date();
    let h=pageHeader('Doğum Günleri','Danışman doğum günü takvimi');
    h+='<div style="'+box+'">';
    if(!D.dans.filter(d=>d.dogum_gunu).length){
      h+='<div style="text-align:center;padding:24px;color:#94a3b8;font-size:12px">Henüz doğum günü kaydı yok. Skorboard → Danışman Bilgi bölümünden ekleyin.</div>';
    }else{
      const sorted=D.dans.filter(d=>d.dogum_gunu).map(d=>{
        const dg=new Date(d.dogum_gunu);
        const buYil=new Date(bugun.getFullYear(),dg.getMonth(),dg.getDate());
        const fark=Math.ceil((buYil-bugun)/(1000*60*60*24));
        const adjFark=fark<0?fark+365:fark;
        return{...d,fark:adjFark,dg};
      }).sort((a,b)=>a.fark-b.fark);
      sorted.forEach(d=>{
        const yakinda=d.fark<=30;
        h+='<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f5f5f5">';
        h+='<div style="font-size:20px">'+(d.fark===0?'🎉':'🎂')+'</div>';
        h+='<div style="flex:1"><div style="font-size:13px;font-weight:700;color:#0f172a">'+d.ad+'</div>';
        h+='<div style="font-size:11px;color:#94a3b8">'+d.dg.toLocaleDateString('tr-TR',{day:'numeric',month:'long'})+'</div></div>';
        h+='<div style="text-align:right"><div style="font-size:12px;font-weight:700;color:'+(yakinda?'#5b21b6':'#94a3b8')+'">'+(d.fark===0?'Bugün!':d.fark+' gün sonra')+'</div></div>';
        h+='</div>';
      });
    }
    h+='</div>';
    c.innerHTML=h;
  }else{
    window._calFiltre=tur;
    rTakvim(c);
  }
}

// Helper: seçili danışman sayısını güncelle
function skorEtkCbGuncelle(){
  const cnt=document.querySelectorAll('.skor-etk-cb:checked').length;
  const el=document.getElementById('sev_secili_say');
  if(el)el.textContent=cnt+' seçili';
}
function skorEtkTumSec(){
  document.querySelectorAll('.skor-etk-cb').forEach(cb=>{if(cb.closest('label').style.display!=='none')cb.checked=true;});
  skorEtkCbGuncelle();
}
function skorEtkTemizle(){
  document.querySelectorAll('.skor-etk-cb').forEach(cb=>cb.checked=false);
  skorEtkCbGuncelle();
}
function skorEtkAra(q){
  const qq=q.toLowerCase();
  document.querySelectorAll('#sev_cblist label').forEach(lbl=>{
    const txt=lbl.textContent.toLowerCase();
    lbl.style.display=txt.includes(qq)?'':'none';
  });
}

// Etkinlik kaydet + attendance oluştur
async function svSkorEtkinlik(){
  const tur=document.getElementById('sev_tur').value;
  const baslik=document.getElementById('sev_baslik').value.trim();
  const tarih=document.getElementById('sev_tarih').value;
  const saat=document.getElementById('sev_saat').value||null;
  const aciklama=document.getElementById('sev_aciklama').value.trim()||null;
  const msg=document.getElementById('sev_msg');

  if(!baslik||!tarih){msg.innerHTML='<div class="err-m">Başlık ve tarih zorunludur!</div>';return;}

  const seciliDans=[...document.querySelectorAll('.skor-etk-cb:checked')].map(cb=>cb.value);
  if(!seciliDans.length){msg.innerHTML='<div class="err-m">En az 1 danışman seçin!</div>';return;}

  msg.innerHTML='<div style="color:var(--blue);font-size:12px;padding:6px">⏳ Kaydediliyor...</div>';

  try{
    // 1. Etkinliği kaydet
    const evRows=await api('skor_events','POST',{tur,baslik,tarih,saat,aciklama,olusturan:CU.name||'Admin'});
    const ev=Array.isArray(evRows)?evRows[0]:evRows;
    if(!ev||!ev.id)throw new Error('Etkinlik ID alınamadı');

    // 2. Her danışman için attendance kaydı
    for(const dan of seciliDans){
      await api('skor_event_attendance','POST',{event_id:ev.id,danisman_ad:dan,durum:'Katılmadı'});
    }

    // 3. Paralel olarak dan_toplanti veya dan_egitim tablosuna da yaz (skor hesabı için)
    for(const dan of seciliDans){
      if(tur==='Toplantı'){
        await api('dan_toplanti','POST',{danisman_ad:dan,toplanti_tarihi:tarih,toplanti_adi:baslik,durum:'Katılmadı'}).catch(()=>{});
      }else if(tur==='Eğitim'){
        await api('dan_egitim','POST',{danisman_ad:dan,egitim_tarihi:tarih,egitim_adi:baslik,egitim_tipi:'Yüz yüze',durum:'Katılmadı'}).catch(()=>{});
      }
    }

    msg.innerHTML='<div class="ok-m">✅ Etkinlik oluşturuldu. '+seciliDans.length+' danışman için katılım kaydı hazırlandı.</div>';
    document.getElementById('sev_baslik').value='';document.getElementById('sev_aciklama').value='';
    skorEtkTemizle();
    await load();
    setTimeout(()=>rSkorEtkinlik(document.getElementById('ct')),900);
  }catch(e){msg.innerHTML='<div class="err-m">❌ '+e.message+'</div>';}
}

// Katılım durumu güncelle
async function updAttDurum(attId,durum){
  try{
    await api('skor_event_attendance','PATCH',{durum},'id=eq.'+attId);
    toast('✅ '+durum);
  }catch(e){toast('Hata: '+e.message,false);}
}

// Toplu katılım kaydet
async function topluKaydetAtt(eventId){
  const wrapper=document.getElementById('att_'+eventId);
  if(!wrapper)return;
  const selects=wrapper.querySelectorAll('select');
  let ok=0;
  for(const sel of selects){
    const attId=sel.closest('[onclick]')?.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
    if(!attId)continue;
    try{await api('skor_event_attendance','PATCH',{durum:sel.value},'id=eq.'+attId);ok++;}catch(e){}
  }
  // Ayrıca dan_toplanti/dan_egitim tablosunu da güncelle (skor hesabı için)
  toast(ok+' kayıt güncellendi');
  await load();
}

// Etkinlik sil
async function delSkorEtkinlik(id){
  if(!confirm('Etkinliği ve tüm katılım kayıtlarını silmek istiyor musunuz?'))return;
  try{
    await api('skor_event_attendance','DELETE',null,'event_id=eq.'+id);
    await api('skor_events','DELETE',null,'id=eq.'+id);
    toast('✅ Silindi');
    rSkorEtkinlik(document.getElementById('ct'));
  }catch(e){toast('Hata: '+e.message,false);}
}

  updAttDurum()        → Tek katılım durumu güncelle (skor_event_attendance PATCH)
  topluKaydetAtt()     → Toplu katılım durumu kaydet
  delSkorEtkinlik()    → Etkinlik ve attendance kayıtlarını sil

DEĞİŞTİRİLEN FONKSİYONLAR:
  rTabs()              → Gruplu yapıya dönüştürüldü
  rC()                 → 20+ yeni route eklendi, setActiveTab çağrısı eklendi
  rDash() → rDash2Kokpit() üzerinden yönlendirildi (eskisi korundu)

KORUNAN YAPILAR:
  Login/PIN sistemi     → Dokunulmadı
  Portföy veri girişi  → Dokunulmadı (rPF)
  Recruiting veri girişi→ Dokunulmadı (rRecruit)
  Danışman token/PIN   → Dokunulmadı
  Supabase api()       → Dokunulmadı
  rSkorboard()         → Korundu, yeni sayfalara bağlandı

YENİ SUPABASE TABLOLARI (oluşturulması önerilen):
  skor_events: id, tur, baslik, tarih, saat, aciklama, olusturan, created_at
  skor_event_attendance: id, event_id, danisman_ad, durum, created_at
═══════════════════════════════════════════════════════════════
*/

function expReport(type){
  let rows=[],keys=[];
  if(type==='haftalik'){
    const haftaMap={};
    const now=new Date();
    for(let i=7;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i*7);const lbl=getWeekLabel(d.toISOString().split('T')[0]);if(!haftaMap[lbl])haftaMap[lbl]=0;}
    D.leads.forEach(l=>{const lbl=getWeekLabel(l.tarih||l.created_at||'');if(haftaMap[lbl]!==undefined)haftaMap[lbl]++;});
    keys=['Hafta','Lead Adedi'];
    rows=Object.entries(haftaMap).map(([h,c])=>({Hafta:h,'Lead Adedi':c}));
  } else if(type==='danisman'){
    keys=['Danışman','Atanan','Kazanılan','Oran %'];
    const danMap={};
    D.leads.forEach(l=>{if(!l.danisman)return;if(!danMap[l.danisman])danMap[l.danisman]={ad:l.danisman,atanan:0,kazanilan:0};danMap[l.danisman].atanan++;if(l.durum==='Kazanıldı')danMap[l.danisman].kazanilan++;});
    rows=Object.values(danMap).sort((a,b)=>b.atanan-a.atanan).map(d=>({'Danışman':d.ad,'Atanan':d.atanan,'Kazanılan':d.kazanilan,'Oran %':d.atanan>0?Math.round(d.kazanilan/d.atanan*100):0}));
  } else if(type==='kaynak'){
    keys=['Kaynak','Toplam','Kazanılan','Oran %'];
    const d30=new Date();d30.setDate(d30.getDate()-30);const d30s=d30.toISOString().split('T')[0];
    const srcMap={};
    D.leads.filter(l=>(l.tarih||l.created_at||'').slice(0,10)>=d30s).forEach(l=>{const k=l.kaynak||'Belirsiz';if(!srcMap[k])srcMap[k]={kaynak:k,toplam:0,kazanilan:0};srcMap[k].toplam++;if(l.durum==='Kazanıldı')srcMap[k].kazanilan++;});
    rows=Object.values(srcMap).sort((a,b)=>b.toplam-a.toplam).slice(0,10).map(k=>({'Kaynak':k.kaynak,'Toplam':k.toplam,'Kazanılan':k.kazanilan,'Oran %':k.toplam>0?Math.round(k.kazanilan/k.toplam*100):0}));
  }
  if(!rows.length){alert('Veri yok!');return;}
  let csv=keys.join(',')+'\n';
  rows.forEach(r=>{csv+=keys.map(k=>'"'+(r[k]??'').toString().replace(/"/g,'""')+'"').join(',')+'\n';});
  const b=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='rapor_'+type+'_'+td()+'.csv';a.click();
}

</script>
