<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RE/MAX LAVANDA - Ofis Takip</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--red:#DC1C2E; --blue:#003DA5; --darkblue:#0C2749; --gray:#404041; --bg:#F5F6F8; --card:#FFFFFF; --border:#E3E6EB; --success:#1C8C4B; --warning:#C9821A;}
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:system-ui, sans-serif; background:var(--bg); color:var(--gray);}
  .header{background:var(--darkblue); color:#fff; padding:16px 20px; display:flex; justify-content:space-between; align-items:center;}
  .logo{font-size:18px; font-weight:700;}
  .tabs{display:flex; gap:0; background:#fff; padding:0 20px; border-bottom:1px solid var(--border);}
  .tab{padding:12px 16px; font-size:13px; border:none; background:none; cursor:pointer; border-bottom:3px solid transparent; color:#999;}
  .tab.active{color:var(--darkblue); border-bottom-color:var(--red);}
  .content{max-width:1200px; margin:0 auto; padding:20px;}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px;}
  @media(max-width:768px){.grid{grid-template-columns:1fr;}}
  .card{background:#fff; border:1px solid var(--border); border-radius:10px; padding:16px;}
  .card h2{font-size:15px; color:var(--darkblue); margin-bottom:8px;}
  .num{font-size:28px; font-weight:700; color:var(--red);}
  table{width:100%; border-collapse:collapse; background:#fff; border:1px solid var(--border); border-radius:10px; overflow:hidden;}
  th{background:var(--bg); padding:12px; text-align:left; font-size:12px; font-weight:600; border-bottom:1px solid var(--border);}
  td{padding:12px; font-size:13px; border-bottom:1px solid #f0f0f0;}
  tr:hover{background:#fafafa;}
  .badge{display:inline-block; padding:3px 10px; border-radius:16px; font-size:11px; font-weight:600;}
  .badge-hot{background:#FBEEDB; color:var(--warning);}
  .badge-ok{background:#E2F2E8; color:var(--success);}
  .tab-pane{display:none;}
  .tab-pane.show{display:block;}
  .loading{text-align:center; padding:20px; color:#999;}
</style>
</head>
<body>

<div class="header">
  <div class="logo">RE/MAX LAVANDA</div>
  <div id="userInfo" style="font-size:12px;"></div>
</div>

<div class="tabs" id="navTabs"></div>

<div class="content" id="content">
  <div class="loading">Yükleniyor...</div>
</div>

<script>
const SUPABASE_URL = 'https://vfqkmluqaihpgxhqiql.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmcWttbHVxYWlocGd4aHFpaSIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzE5NzA2NzA1LCJleHAiOjE5ODA5NjY3MDV9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmcWttbHVxYWlocGd4aHFpaSIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzE5NzA2NzA1LCJleHAiOjE5ODA5NjY3MDV9';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let data = { gd_leads: [], recruiting_candidates: [] };

function getUserFromURL() {
  const params = new URLSearchParams(window.location.search);
  if (params.has('role') && params.get('role') === 'admin') return { type: 'admin', name: 'admin' };
  if (params.has('danisman')) return { type: 'danisman', name: params.get('danisman') };
  if (params.has('santral')) return { type: 'santral', name: 'santral' };
  return null;
}

async function init() {
  currentUser = getUserFromURL();
  if (!currentUser) {
    document.getElementById('content').innerHTML = '<div style="color:red;">❌ Geçerli link bulunamadı</div>';
    return;
  }
  document.getElementById('userInfo').textContent = currentUser.name + ' (' + currentUser.type + ')';
  await loadData();
  renderUI();
}

async function loadData() {
  try {
    const [leadsRes, recruitRes] = await Promise.all([
      supabase.from('gd_leads').select('*'),
      supabase.from('recruiting_candidates').select('*')
    ]);
    data.gd_leads = leadsRes.data || [];
    data.recruiting_candidates = recruitRes.data || [];
  } catch (e) {
    console.error('Veri yüklenirken hata:', e);
  }
}

function renderUI() {
  const navbar = document.getElementById('navTabs');
  navbar.innerHTML = '';
  
  const tabs = [];
  if (currentUser.type === 'admin') {
    tabs.push({id: 'panel', label: '📊 Panel'});
    tabs.push({id: 'leads', label: '👤 GD Leads'});
    tabs.push({id: 'recruiting', label: '👥 Recruiting'});
  }
  
  tabs.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.textContent = t.label;
    btn.onclick = () => switchTab(t.id);
    navbar.appendChild(btn);
  });
  
  renderContent(tabs[0].id);
}

function switchTab(tabId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderContent(tabId);
}

function renderContent(tabId) {
  const content = document.getElementById('content');
  
  if (tabId === 'panel') {
    const openLeads = data.gd_leads.filter(l => l.durum === 'Arandı' || l.durum === 'Çağrıldı').length;
    const recruiting = data.recruiting_candidates.filter(r => r.durum !== 'Olumsuz').length;
    
    content.innerHTML = `
      <div class="grid">
        <div class="card">
          <h2>👤 Açık GD Lead'ler</h2>
          <p>Takip edileniyor</p>
          <div class="num">${openLeads}</div>
        </div>
        <div class="card">
          <h2>👥 Recruiting Adayları</h2>
          <p>Aktif adaylar</p>
          <div class="num">${recruiting}</div>
        </div>
      </div>
      <h3>Son GD Leads</h3>
      <table>
        <thead><tr><th>Ad</th><th>Telefon</th><th>Kaynak</th><th>Durum</th><th>Danışman</th></tr></thead>
        <tbody>
          ${data.gd_leads.slice(0, 5).map(l => `
            <tr>
              <td>${l.ad}</td>
              <td>${l.telefon}</td>
              <td>${l.kaynak}</td>
              <td><span class="badge ${l.durum === 'Kazanıldı' ? 'badge-ok' : 'badge-hot'}">${l.durum}</span></td>
              <td>${l.danisman || '—'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  } else if (tabId === 'leads') {
    content.innerHTML = `<table>
      <thead><tr><th>Ad</th><th>Telefon</th><th>Kaynak</th><th>Açıklama</th><th>Durum</th></tr></thead>
      <tbody>
        ${data.gd_leads.map(l => `<tr><td>${l.ad}</td><td>${l.telefon}</td><td>${l.kaynak}</td><td>${l.aciklama || '—'}</td><td><span class="badge ${l.durum === 'Kazanıldı' ? 'badge-ok' : 'badge-hot'}">${l.durum}</span></td></tr>`).join('')}
      </tbody>
    </table>`;
  } else if (tabId === 'recruiting') {
    content.innerHTML = `<table>
      <thead><tr><th>Ad</th><th>Telefon</th><th>Kaynak</th><th>Durum</th><th>Açıklama</th></tr></thead>
      <tbody>
        ${data.recruiting_candidates.map(r => `<tr><td>${r.ad}</td><td>${r.telefon}</td><td>${r.kaynak}</td><td><span class="badge ${r.durum === 'Olumsuz' ? '' : 'badge-ok'}">${r.durum || '—'}</span></td><td>${r.aciklama || '—'}</td></tr>`).join('')}
      </tbody>
    </table>`;
  }
}

init();
</script>
</body>
</html>
