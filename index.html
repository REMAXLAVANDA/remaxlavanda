:root{
  --red:#E31837;
  --red-dark:#B5122C;
  --navy:#003087;
  --gray:#404041;
  --gray-light:#f5f5f5;
  --white:#ffffff;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
body{font-family:'Montserrat',sans-serif;color:var(--gray);background:var(--white);line-height:1.6;-webkit-font-smoothing:antialiased;}
a{text-decoration:none;color:inherit;}
img{max-width:100%;display:block;}

/* NAV */
nav{background:var(--white);border-bottom:3px solid var(--red);position:sticky;top:0;z-index:100;}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:64px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo img{height:30px;width:auto;}
.logo-name{font-weight:800;font-size:20px;color:var(--navy);letter-spacing:0;}
.nav-links{display:flex;align-items:center;gap:6px;}
.nav-links a{font-size:13px;font-weight:600;color:var(--gray);padding:7px 12px;border-radius:4px;white-space:nowrap;}
.nav-links a:hover{color:var(--red);} 
.nav-toggle{display:none;background:none;border:none;cursor:pointer;padding:6px;}
.nav-toggle span{display:block;width:22px;height:2px;background:var(--gray);margin:4px 0;transition:.3s;}
.nav-mobile{display:none;flex-direction:column;background:var(--white);border-top:1px solid #eee;padding:12px 20px 16px;}
.nav-mobile a{display:block;padding:10px 0;font-size:14px;font-weight:600;border-bottom:1px solid #f0f0f0;color:var(--gray);} 
.nav-mobile a:last-child{border:none;}

/* HERO — iki sütun */

.hero-panel.right{background:var(--white);color:var(--gray);} 
.hero-label{font-size:12px;font-weight:700;letter-spacing:2px;opacity:.9;margin-bottom:16px;text-transform:uppercase;}
.hero-panel.left .hero-label{color:rgba(255,255,255,.7);} 
.hero-panel.right .hero-label{color:var(--red);} 
.hero-panel h1{font-size:36px;font-weight:800;line-height:1.2;margin-bottom:20px;}

.hero-panel.right .hero-list li{background:#f7f8fa;color:var(--navy);border-bottom:1px solid #eaecf0;}
.hero-panel.right .hero-list li:last-child{border-bottom:none;} 
.hero-list li::before{content:"✓";font-weight:800;font-size:11px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hero-panel.left .hero-list li::before{background:rgba(255,255,255,.15);color:#fff;}
.hero-panel.right .hero-list li::before{background:#E31837;color:#fff;}
.hero-img{width:100%;height:220px;border-radius:8px;object-fit:cover;margin-bottom:28px;display:block;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 24px;border-radius:4px;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .2s;text-align:center;justify-content:center;}
.btn-red{background:var(--red);color:var(--white);} 
.btn-red:hover{background:var(--red-dark);} 
.btn svg{width:18px;height:18px;fill:currentColor;flex-shrink:0;}
